<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>VDC CRM - Load Excel v7.3</title>
    <script src="../js/exceljs.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @keyframes fade-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fade-in 0.4s ease-out; }
        
        .sidebar-gradient { background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%); }
        
        /* Vùng chọn file to, hiện đại */
        .file-drop-area {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            border: 2px dashed #e2e8f0;
            border-radius: 24px;
            transition: all 0.3s ease;
            background-color: #ffffff;
        }
        .file-drop-area:hover { border-color: #3b82f6; background-color: #eff6ff; }
        .file-drop-area input { position: absolute; inset: 0; opacity: 0; cursor: pointer; z-index: 10; }

        /* Giao diện Bảng rộng rãi */
        .main-table-wrapper {
            background: #ffffff;
            border-radius: 30px;
            box-shadow: 0 10px 50px -12px rgba(0, 0, 0, 0.05);
            border: 1px solid #f1f5f9;
            display: flex;
            flex-direction: column;
            height: calc(100vh - 180px);
            overflow: hidden;
        }

        .table-scroll { flex: 1; overflow-y: auto; padding: 0 24px 24px 24px; }
        
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        
        th { 
            position: sticky; top: 0; background: white; z-index: 20; padding: 20px 15px;
            text-transform: uppercase; font-size: 11px; font-weight: 900; color: #94a3b8;
            letter-spacing: 0.1em; border-bottom: 1px solid #f1f5f9; text-align: left;
        }

        .row-card td { padding: 15px; background: white; border-top: 1px solid #f8fafc; border-bottom: 1px solid #f8fafc; transition: all 0.2s; }
        .row-card td:first-child { border-left: 1px solid #f8fafc; border-radius: 15px 0 0 15px; text-align: center; }
        .row-card td:last-child { border-right: 1px solid #f8fafc; border-radius: 0 15px 15px 0; text-align: right; }
        .row-card:hover td { background: #f8faff; border-color: #e0e7ff; }

        .avatar-frame { width: 45px; height: 60px; border-radius: 8px; object-fit: cover; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); border: 2px solid white; }
    </style>
</head>
<body class="bg-[#fcfdfe] font-sans text-slate-800">

    <div class="flex h-screen overflow-hidden">
        
        <div class="w-96 sidebar-gradient border-r border-slate-200 p-8 flex flex-col shadow-2xl z-20 overflow-y-auto">
            
            <div class="mb-10 flex items-center justify-between">
                <div>
                    <h1 class="text-2xl font-black tracking-tighter text-slate-800 leading-none">VDC<span class="text-blue-600">.CRM</span></h1>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-[0.2em] mt-2">Safety Cloud Sync</p>
                </div>
                <span class="text-[10px] bg-blue-600 text-white px-3 py-1 rounded-full font-black shadow-lg">V7.3</span>
            </div>

            <div class="space-y-8 flex-1">
                <div class="space-y-3">
                    <label class="flex items-center gap-2 text-[11px] font-black text-slate-500 uppercase px-1">
                        <i class="fa-solid fa-file-excel text-blue-500"></i> Nguồn dữ liệu Excel
                    </label>
                    <div class="file-drop-area group">
                        <i class="fa-solid fa-cloud-arrow-up text-4xl text-slate-300 group-hover:text-blue-500 mb-3 transition-colors"></i>
                        <p class="text-xs font-bold text-slate-600">Chọn file .xlsx</p>
                        <input type="file" id="fileExcel" accept=".xlsx">
                    </div>
                    <p id="fileNameShow" class="text-[10px] text-blue-600 font-bold text-center truncate"></p>
                </div>

                <div class="space-y-3">
                    <label class="flex items-center gap-2 text-[11px] font-black text-slate-500 uppercase px-1">
                        <i class="fa-solid fa-building text-blue-500"></i> Xác nhận đơn vị
                    </label>
                    <div class="bg-white rounded-2xl border border-slate-200 p-5 space-y-4 shadow-sm">
                        <input type="text" id="inputMST" placeholder="Mã số thuế" class="w-full text-xs font-black text-slate-800 bg-transparent border-none focus:ring-0">
                        <input type="text" id="inputTenCty" placeholder="Tên đơn vị công ty" class="w-full text-xs font-bold text-blue-600 bg-transparent border-t border-slate-100 pt-3 focus:ring-0 italic">
                    </div>
                </div>

                <div class="space-y-3">
                    <button id="btnPreview" class="w-full bg-slate-800 hover:bg-black text-white font-black py-4 rounded-2xl shadow-xl transition-all flex items-center justify-center gap-3">
                        <i class="fa-solid fa-wand-magic-sparkles"></i>
                        <span class="text-xs uppercase tracking-widest">Trích xuất dữ liệu</span>
                    </button>

                    <div id="syncSection" class="hidden space-y-4 pt-4 border-t border-slate-100 animate-fade-in">
                        <button id="btnSync" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-5 rounded-2xl shadow-xl transition-all flex items-center justify-center gap-3">
                            <i class="fa-solid fa-bolt animate-pulse"></i>
                            <span class="text-xs uppercase tracking-widest">Bắt đầu đồng bộ Cloud</span>
                        </button>
                        
                        <div class="space-y-2">
                            <div class="flex justify-between text-[10px] font-black text-slate-400">
                                <span id="statusText">Sẵn sàng...</span>
                                <span id="percentText">0%</span>
                            </div>
                            <div class="bg-slate-200 rounded-full h-1.5 overflow-hidden">
                                <div id="progressFill" class="h-full bg-blue-600 transition-all w-0"></div>
                            </div>
                        </div>

                        <div id="liveBox" class="hidden bg-white p-4 rounded-2xl border-2 border-blue-50 shadow-lg text-center">
                            <img id="liveImg" class="w-20 h-28 object-cover rounded-xl border-4 border-white shadow-md mx-auto">
                            <p id="liveName" class="text-[10px] font-black text-slate-800 mt-3 uppercase"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="flex-1 p-8 flex flex-col">
            <div class="flex justify-between items-end mb-6 px-4">
                <div>
                    <h3 class="text-xl font-black text-slate-800 tracking-tight text-uppercase">Danh sách học viên</h3>
                    <p class="text-xs text-slate-400 font-medium">Hệ thống trích xuất dữ liệu từ file Excel VDC</p>
                </div>
                <div class="bg-white px-5 py-2 rounded-xl shadow-sm border border-slate-100">
                    <p class="text-[9px] font-black text-slate-400 uppercase">Học viên</p>
                    <p id="countAll" class="text-sm font-black text-blue-600">0</p>
                </div>
            </div>

            <div class="main-table-wrapper">
                <div class="table-scroll">
                    <table id="hocVienTable">
                        <thead>
                            <tr>
                                <th class="w-16">STT</th>
                                <th class="w-24">Ảnh</th>
                                <th>Họ và Tên</th>
                                <th>CCCD</th>
                                <th>Nhóm/Đơn vị</th>
                                <th>Trạng thái</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr id="emptyRow">
                                <td colspan="6" class="p-20 text-center opacity-20">
                                    <i class="fa-solid fa-folder-open text-6xl mb-4 block"></i>
                                    <p class="text-sm font-black uppercase">Chưa có dữ liệu</p>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { db, ref, set } from '../js/firebase-config.js';

        const GAS_URL = "https://script.google.com/macros/s/AKfycbxKY8mO5USmDe3DyiYPNLpt0x64l8YN_Z_4TgoEdUs1F0Nw_pnjZd1XU6V2lL_Wl_lS/exec";
        let hocVienList = [];

        // 1. TRÍCH XUẤT DỮ LIỆU
        document.getElementById('btnPreview').onclick = async () => {
            const file = document.getElementById('fileExcel').files[0];
            if (!file) return alert("Vui lòng chọn file Excel!");

            document.getElementById('btnPreview').innerText = "⏳ ĐANG QUÉT...";
            const workbook = new ExcelJS.Workbook();
            await workbook.xlsx.load(await file.arrayBuffer());
            const sheet = workbook.getWorksheet(1);

            // Lấy MST & Tên Cty
            document.getElementById('inputTenCty').value = sheet.getCell('A3').text.replace(/Công ty[:\s]*/gi, "");
            document.getElementById('inputMST').value = sheet.getCell('A4').text.match(/[0-9]+/)?.[0] || "";

            const imageMap = {};
            sheet.getImages().forEach(img => {
                const row = img.range.tl.nativeRow + 1;
                imageMap[row] = workbook.getImage(img.imageId).buffer;
            });

            hocVienList = [];
            sheet.eachRow((row, rowNum) => {
                const stt = row.getCell(1).text;
                if (rowNum >= 10 && stt && !isNaN(stt)) {
                    hocVienList.push({
                        stt: stt,
                        hoten: row.getCell(2).text,
                        cccd: row.getCell(7).text,
                        donvi: row.getCell(5).text || "VDC",
                        photo: imageMap[rowNum] || null
                    });
                }
            });

            renderTable();
            document.getElementById('syncSection').classList.remove('hidden');
            document.getElementById('btnPreview').innerText = "🔍 TRÍCH XUẤT LẠI";
            document.getElementById('countAll').innerText = hocVienList.length;
        };

        function renderTable() {
            const tbody = document.querySelector("#hocVienTable tbody");
            tbody.innerHTML = hocVienList.map(h => `
                <tr class="row-card">
                    <td>${h.stt}</td>
                    <td>${h.photo ? `<img src="${URL.createObjectURL(new Blob([h.photo]))}" class="avatar-frame">` : '❌'}</td>
                    <td class="font-bold text-slate-700">${h.hoten}</td>
                    <td class="font-mono text-slate-500">${h.cccd}</td>
                    <td class="text-slate-400 text-[11px] font-bold uppercase">${h.donvi}</td>
                    <td id="status-${h.cccd}" class="text-blue-300 italic text-[10px]">Chờ đồng bộ</td>
                </tr>
            `).join('');
        }

        // 2. ĐỒNG BỘ CLOUD (Drive & Firebase)
        document.getElementById('btnSync').onclick = async () => {
            const mst = document.getElementById('inputMST').value;
            const tenCty = document.getElementById('inputTenCty').value;
            if (!mst) return alert("Thiếu Mã số thuế!");

            document.getElementById('btnSync').disabled = true;
            document.getElementById('liveBox').classList.remove('hidden');

            for (let i = 0; i < hocVienList.length; i++) {
                const hv = hocVienList[i];
                const pct = Math.round(((i + 1) / hocVienList.length) * 100);
                document.getElementById('progressFill').style.width = pct + "%";
                document.getElementById('percentText').innerText = pct + "%";
                document.getElementById('statusText').innerText = `Sync: ${hv.hoten}`;

                let driveUrl = "";
                if (hv.photo) {
                    const base64 = btoa(new Uint8Array(hv.photo).reduce((d, b) => d + String.fromCharCode(b), ''));
                    try {
                        const res = await fetch(GAS_URL, {
                            method: 'POST',
                            body: JSON.stringify({ type: "upload", mst: mst, tenCty: tenCty, cccd: hv.cccd, base64: base64 })
                        });
                        const resJson = await res.json();
                        if (resJson.status === "success") {
                            driveUrl = resJson.fileUrl;
                            document.getElementById(`status-${hv.cccd}`).innerHTML = `<span class="text-emerald-500 font-black tracking-tighter uppercase text-[9px]">✅ Drive OK</span>`;
                            document.getElementById('liveImg').src = driveUrl;
                            document.getElementById('liveName').innerText = hv.hoten;
                        }
                    } catch (e) { console.error(e); }
                }

                // Ghi Firebase
                await set(ref(db, `HocVien/${mst}/${hv.cccd}`), {
                    ...hv, PhotoUrl: driveUrl, photo: null, NgaySync: new Date().toLocaleString('vi-VN')
                });
            }

            document.getElementById('statusText').innerText = "HOÀN TẤT ĐỒNG BỘ!";
            alert("🚀 Hệ thống VDC đã đồng bộ thành công tất cả học viên!");
        };

        document.getElementById('fileExcel').onchange = (e) => {
            document.getElementById('fileNameShow').innerText = "📁 " + e.target.files[0].name;
        };
    </script>
</body>
</html>
