<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hệ Thống In Ấn Chuyên Nghiệp</title>
    <script src="./js/exceljs.min.js"></script>
    <style>
        @page { size: A4; margin: 0; }
        @page cert { size: 130mm 190mm; margin: 0; }
        @media print {
            .no-print { display: none; }
            body { background: none; margin: 0; padding: 0; }
            .page-break { page-break-after: always; display: block; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            .is-cert { page: cert; }
        }
        body { font-family: "Times New Roman", Times, serif; margin: 0; padding: 20px; background: #f4f7f9; }
        .no-print { background: white; padding: 20px; border-radius: 8px; margin: 0 auto 20px auto; max-width: 900px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .grid-container { display: grid; margin: 0 auto; background: white; justify-content: center; align-content: center; }
        
        /* Định dạng 3 loại biểu mẫu */
        .grid-9 { width: 210mm; height: 297mm; grid-template-columns: repeat(3, 62mm); grid-template-rows: repeat(3, 90mm); gap: 5px; }
        .grid-8 { width: 210mm; height: 297mm; grid-template-columns: repeat(2, 85mm); grid-template-rows: repeat(4, 53mm); gap: 10mm 5mm; }
        .grid-1 { width: 130mm; height: 190mm; grid-template-columns: 130mm; grid-template-rows: 190mm; }

        .card { box-sizing: border-box; position: relative; overflow: hidden; border: 0.1mm solid #000; display: flex; flex-direction: column; justify-content: center; text-align: center; }
        .photo-box { border: 1px solid #000; margin: 0 auto; background: #fff; width: 25mm; height: 35mm; overflow: hidden; }
        img.avatar { width: 100%; height: 100%; object-fit: cover; }
        .btn-action { padding: 10px 20px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

<div class="no-print">
    <h2>🛠 CẤU HÌNH IN (GitHub Mode)</h2>
    <div style="display: flex; gap: 15px; flex-wrap: wrap;">
        <select id="formType" style="padding: 10px;">
            <option value="9">Thẻ ATVSLĐ (9 thẻ/A4)</option>
            <option value="8">Thẻ An Toàn Điện (8 thẻ/A4 - Vàng)</option>
            <option value="1">Giấy Chứng Nhận (Phôi 13x19cm)</option>
        </select>
        <input type="file" id="excelInput" accept=".xlsx">
        <button class="btn-action" style="background: #28a745; color: white;" onclick="runProcess()">🚀 TRÍCH XUẤT</button>
        <button class="btn-action" style="background: #007bff; color: white;" onclick="window.print()">🖨️ IN NGAY</button>
    </div>
    <p id="status" style="margin-top: 10px; color: blue; font-weight: bold;"></p>
</div>

<div id="printArea"></div>

<script>
    async function runProcess() {
        const file = document.getElementById('excelInput').files[0];
        const type = parseInt(document.getElementById('formType').value);
        const status = document.getElementById('status');
        if (!file) return alert("Vui lòng chọn file Excel!");

        status.innerText = "⏳ Đang trích xuất...";
        const area = document.getElementById('printArea');
        area.innerHTML = "";

        try {
            const wb = new ExcelJS.Workbook();
            await wb.xlsx.load(await file.arrayBuffer());
            const sh = wb.worksheets[0];

            // 1. Lấy ảnh từ cột I (index 8) [cite: 2]
            const imgMap = {};
            sh.getImages().forEach(img => {
                if (img.range.tl.nativeCol === 8) {
                    const blob = new Blob([wb.getImage(img.imageId).buffer]);
                    imgMap[img.range.tl.nativeRow] = URL.createObjectURL(blob);
                }
            });

            // 2. Đọc dữ liệu từ dòng 10 [cite: 1]
            let list = []; let grp = "";
            sh.eachRow((row, i) => {
                if (i >= 10) {
                    const a = row.getCell(1).text.trim(); // Cột A: Đơn vị
                    const b = row.getCell(2).text.trim(); // Cột B: Họ tên
                    const c = row.getCell(3).text.trim(); // Cột C: CCCD
                    if (a && !b) grp = a;
                    else if (b) list.push({ dv: grp, ten: b, cccd: c, img: imgMap[i-1] || "" });
                }
            });

            // 3. Dàn trang
            const step = (type === 1) ? 1 : type;
            for (let i = 0; i < list.length; i += step) {
                const chunk = list.slice(i, i + step);
                const page = document.createElement('div');
                page.className = `grid-container grid-${type} page-break ${type === 1 ? 'is-cert' : ''}`;
                
                chunk.forEach(s => {
                    const bgColor = (type === 8) ? "#FFEA00" : "#ffffff";
                    page.innerHTML += `
                        <div class="card" style="background-color: ${bgColor}">
                            <div style="font-size: 8pt; font-weight: bold;">${s.dv}</div>
                            <div style="font-weight: bold; margin: 2px 0;">${type === 1 ? 'GIẤY CHỨNG NHẬN' : 'THẺ AN TOÀN'}</div>
                            <div class="photo-box">${s.img ? `<img class="avatar" src="${s.img}">` : ''}</div>
                            <div style="font-size: 11pt; font-weight: bold; text-transform: uppercase;">${s.ten}</div>
                            <div style="font-size: 10pt;">Số: ${s.cccd}</div>
                        </div>`;
                });
                area.appendChild(page);
            }
            status.innerText = `✅ Đã trích xuất ${list.length} nhân viên.`;
        } catch (e) { status.innerText = "❌ Lỗi: " + e.message; }
    }
</script>
</body>
</html>
