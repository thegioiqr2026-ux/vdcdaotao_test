<div class="p-6 h-full flex flex-col bg-[#f1f5f9] animate-fade-in overflow-hidden">
    
    <div class="flex justify-between items-center mb-6 bg-white p-5 rounded-[24px] shadow-sm border-2 border-slate-200">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-blue-600 text-white rounded-2xl flex items-center justify-center shadow-lg shadow-blue-100">
                <i class="fa-solid fa-chalkboard-user text-xl"></i>
            </div>
            <div>
                <h2 class="text-xl font-black text-slate-900 tracking-tighter uppercase leading-none">Điều phối huấn luyện</h2>
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-[0.2em] mt-1 italic">VDC CRM Operations System</p>
            </div>
        </div>
        
        <button onclick="document.getElementById('modalCreate').classList.remove('hidden')" 
                class="bg-slate-900 text-white px-8 py-3.5 rounded-2xl shadow-xl hover:bg-black transition-all flex items-center gap-2 text-xs font-black uppercase tracking-widest active:scale-95">
            <i class="fa-solid fa-plus text-blue-400"></i> Lên Đơn Mới
        </button>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-5 gap-5 flex-1 overflow-hidden pb-4">
        
        <div class="flex flex-col bg-slate-200/50 rounded-[30px] p-4 border-2 border-slate-300/50 overflow-hidden">
            <h3 class="font-black text-slate-600 mb-4 px-2 flex justify-between items-center uppercase text-[10px] tracking-widest">
                <span><i class="fa-solid fa-file-invoice-dollar mr-1"></i> 1. Báo Giá</span>
                <span id="count_B1" class="bg-slate-900 text-white px-2.5 py-0.5 rounded-lg text-[10px]">0</span>
            </h3>
            <div id="col_B1_BaoGia" ondrop="dropCard(event, 'B1_BaoGia')" ondragover="allowDrop(event)" 
                 class="space-y-4 overflow-y-auto flex-1 pr-1 scroll-thin min-h-[150px]"></div>
        </div>

        <div class="flex flex-col bg-blue-100/40 rounded-[30px] p-4 border-2 border-blue-200/50 overflow-hidden">
            <h3 class="font-black text-blue-700 mb-4 px-2 flex justify-between items-center uppercase text-[10px] tracking-widest">
                <span><i class="fa-solid fa-box-open mr-1"></i> 2. Chuẩn Bị</span>
                <span id="count_B4" class="bg-blue-600 text-white px-2.5 py-0.5 rounded-lg text-[10px]">0</span>
            </h3>
            <div id="col_B4_ChuanBi" ondrop="dropCard(event, 'B4_ChuanBi')" ondragover="allowDrop(event)" 
                 class="space-y-4 overflow-y-auto flex-1 pr-1 scroll-thin min-h-[150px]"></div>
        </div>

        <div class="flex flex-col bg-amber-100/40 rounded-[30px] p-4 border-2 border-amber-200/50 overflow-hidden">
            <h3 class="font-black text-amber-700 mb-4 px-2 flex justify-between items-center uppercase text-[10px] tracking-widest">
                <span><i class="fa-solid fa-person-chalkboard mr-1"></i> 3. Đang Dạy</span>
                <span id="count_B5" class="bg-amber-600 text-white px-2.5 py-0.5 rounded-lg text-[10px]">0</span>
            </h3>
            <div id="col_B5_DangDay" ondrop="dropCard(event, 'B5_DangDay')" ondragover="allowDrop(event)" 
                 class="space-y-4 overflow-y-auto flex-1 pr-1 scroll-thin min-h-[150px]"></div>
        </div>

        <div class="flex flex-col bg-indigo-100/40 rounded-[30px] p-4 border-2 border-indigo-200/50 overflow-hidden">
            <h3 class="font-black text-indigo-700 mb-4 px-2 flex justify-between items-center uppercase text-[10px] tracking-widest">
                <span><i class="fa-solid fa-print mr-1"></i> 4. In Phôi</span>
                <span id="count_B6" class="bg-indigo-600 text-white px-2.5 py-0.5 rounded-lg text-[10px]">0</span>
            </h3>
            <div id="col_B6_ChoInPhoi" ondrop="dropCard(event, 'B6_ChoInPhoi')" ondragover="allowDrop(event)" 
                 class="space-y-4 overflow-y-auto flex-1 pr-1 scroll-thin min-h-[150px]"></div>
        </div>

        <div class="flex flex-col bg-emerald-100/40 rounded-[30px] p-4 border-2 border-emerald-200/50 overflow-hidden">
            <h3 class="font-black text-emerald-700 mb-4 px-2 flex justify-between items-center uppercase text-[10px] tracking-widest">
                <span><i class="fa-solid fa-circle-check mr-1"></i> 5. Hoàn Tất</span>
                <span id="count_B7" class="bg-emerald-600 text-white px-2.5 py-0.5 rounded-lg text-[10px]">0</span>
            </h3>
            <div id="col_B7_HoanTat" ondrop="dropCard(event, 'B7_HoanTat')" ondragover="allowDrop(event)" 
                 class="space-y-4 overflow-y-auto flex-1 pr-1 scroll-thin min-h-[150px]"></div>
        </div>
    </div>
</div>

<style>
    .scroll-thin::-webkit-scrollbar { width: 5px; }
    .scroll-thin::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    
    .kanban-card { 
        background: white; border-radius: 20px; padding: 18px; 
        border: 2px solid #e2e8f0; box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        cursor: grab; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        position: relative;
    }
    .kanban-card:hover { 
        transform: translateY(-5px); 
        box-shadow: 0 15px 30px -10px rgba(0,0,0,0.1); 
        border-color: #3b82f6; 
    }
    .kanban-card:active { cursor: grabbing; scale: 0.98; }
    
    /* Hiệu ứng nhãn nội dung trong card */
    .card-tag {
        font-size: 9px; font-weight: 900; text-transform: uppercase;
        padding: 2px 8px; border-radius: 6px; background: #f1f5f9; color: #64748b;
    }
</style>

<div id="modalCreate" class="fixed inset-0 bg-slate-900/60 hidden flex items-center justify-center z-[100] p-4 backdrop-blur-md">
    <div class="bg-white rounded-[32px] shadow-2xl w-full max-w-md overflow-hidden animate-slide-up border-4 border-white">
        <div class="bg-slate-900 p-6 text-white flex justify-between items-center">
            <div>
                <h3 class="font-black uppercase tracking-widest text-sm">Lên Đơn Huấn Luyện</h3>
                <p class="text-[9px] text-slate-400 font-bold mt-1 uppercase tracking-tighter">Khởi tạo quy trình báo giá mới</p>
            </div>
            <button onclick="document.getElementById('modalCreate').classList.add('hidden')" 
                    class="w-10 h-10 rounded-2xl bg-white/10 flex items-center justify-center hover:bg-red-500 transition-all shadow-inner">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
        
        <form id="formCreateClass" class="p-8 space-y-5">
            <div class="space-y-4">
                <div class="group">
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-1 mb-1 block">Thông tin định danh</label>
                    <div class="relative">
                        <i class="fa-solid fa-fingerprint absolute left-4 top-4 text-slate-300"></i>
                        <input type="text" id="newMST" placeholder="Mã số thuế..." 
                               class="w-full pl-12 pr-4 py-4 bg-slate-100 border-2 border-transparent rounded-2xl focus:border-blue-500 focus:bg-white outline-none font-black text-blue-700 tracking-wider transition-all">
                    </div>
                </div>

                <div class="space-y-3">
                    <input type="text" id="newTenCTY" placeholder="Tên công ty (Tự động)" 
                           class="w-full px-5 py-4 bg-slate-50 border-2 border-slate-100 rounded-2xl text-xs font-black text-slate-800 placeholder:text-slate-300">
                    
                    <input type="text" id="newDiaChi" placeholder="Địa chỉ trụ sở" 
                           class="w-full px-5 py-4 bg-slate-50 border-2 border-slate-100 rounded-2xl text-[10px] font-bold text-slate-500">
                    
                    <textarea id="newNoiDung" placeholder="Nội dung huấn luyện (Nhóm 1, 3, 4...)" 
                              class="w-full px-5 py-4 bg-slate-50 border-2 border-slate-100 rounded-2xl text-xs font-bold text-slate-800 outline-none focus:border-blue-500 transition-all" rows="3"></textarea>
                </div>
            </div>
            
            <button type="submit" 
                    class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black shadow-xl shadow-blue-100 hover:bg-blue-700 transition-all uppercase tracking-widest text-xs active:scale-95">
                <i class="fa-solid fa-paper-plane mr-2"></i>TẠO MỚI & BÁO GIÁ
            </button>
        </form>
    </div>
</div>
