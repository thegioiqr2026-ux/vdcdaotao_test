<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hệ Thống In Thẻ & Giấy Chứng Nhận</title>
    
    <script src="./js/exceljs.min.js"></script>
    <script src="./js/jszip.min.js"></script>
    
    <style>
        @page { size: A4; margin: 0; }
        @page cert { size: 130mm 190mm; margin: 0; }
        @media print {
            .no-print { display: none; }
            body { background: none; margin: 0; padding: 0; }
            .page-break { page-break-after: always; display: block; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            .is-cert { page: cert; }
        }
        body { font-family: "Times New Roman", Times, serif; background: #f4f7f9; margin: 0; padding: 20px; }
        .no-print { background: white; padding: 25px; border-radius: 12px; margin: 0 auto 30px auto; max-width: 800px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 1px solid #ddd; }
        .grid-container { display: grid; margin: 0 auto; background: white; justify-content: center; align-content: center; }
        .card { box-sizing: border-box; position: relative; overflow: hidden; display: flex; flex-direction: column; justify-content: center; text-align: center; border: 0.1mm solid #000; }
        .photo-box { border: 1px solid #000; margin: 0 auto; background: #fff; display: flex; align-items: center; justify-content: center; }
        img.avatar { width: 100%; height: 100%; object-fit: cover; }
        .btn-group { display: flex; gap: 15px; justify-content: center; margin-top: 20px; }
        button { padding: 12px 25px; cursor: pointer; border-radius: 6px; border: none; font-weight: bold; font-size: 16px; transition: 0.3s; }
        .btn-process { background: #27ae60; color: white; }
        .btn-print { background: #2980b9; color: white; display: none; }
        #status { text-align: center; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>

<div class="no-print">
    <h2 style="text-align: center; color: #2c3e50;">CÔNG CỤ IN BIỂU MẪU ĐÀO TẠO</h2>
    
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
        <div style="display: flex; flex-direction: column;">
            <label><b>1. Loại biểu mẫu:</b></label>
            <select id="formType" style="padding: 10px; margin-top: 5px;">
                <option value="9">Thẻ ATVSLĐ Nhóm 3 (9 thẻ/A4)</option>
                <option value="8">Thẻ An Toàn Điện (8 thẻ/A4)</option>
                <option value="1">Giấy Chứng Nhận (Phôi 13x19cm)</option>
            </select>
        </div>
        <div style="display: flex; flex-direction: column;">
            <label><b>2. File Excel (Ảnh cột I):</b></label>
            <input type="file" id="excelInput" accept=".xlsx" style="margin-top: 5px;">
        </div>
    </div>

    <div class="btn-group">
        <button class="btn-process" onclick="handleData()">🚀 XỬ LÝ DỮ LIỆU</button>
        <button class="btn-print" id="btnPrint" onclick="window.print()">🖨️ IN NGAY</button>
    </div>
    
    <div id="status"></div>
</div>

<div id="printArea"></div>

<script>
    // KIỂM TRA THƯ VIỆN NGAY KHI TẢI TRANG
    window.onload = function() {
        const status = document.getElementById('status');
        if (typeof ExcelJS === 'undefined') {
            status.innerHTML = "<span style='color:red;'>❌ LỖI: Không tìm thấy thư viện ExcelJS trong thư mục /js/</span>";
        } else {
            status.innerHTML = "<span style='color:green;'>✅ Hệ thống đã sẵn sàng.</span>";
        }
    };

    async function handleData() {
        if (typeof ExcelJS === 'undefined') return alert("Thư viện ExcelJS chưa được nạp. Vui lòng kiểm tra lại file trong thư mục /js/");
        
        const fileEx = document.getElementById('excelInput').files[0];
        const type = document.getElementById('formType').value;
        const status = document.getElementById('status');
        const area = document.getElementById('printArea');
        
        if (!fileEx) return alert("Vui lòng chọn file Excel!");
        
        area.innerHTML = "";
        status.innerText = "⏳ Đang xử lý...";

        try {
            const wb = new ExcelJS.Workbook();
            await wb.xlsx.load(await fileEx.arrayBuffer());
            const sh = wb.worksheets[0];

            let imgMap = {};
            sh.getImages().forEach(img => {
                if (img.range.tl.nativeCol === 8) { // Cột I
                    const image = wb.getImage(img.imageId);
                    const blob = new Blob([image.buffer]);
                    imgMap[img.range.tl.nativeRow] = URL.createObjectURL(blob);
                }
            });

            let list = []; let grp = "";
            sh.eachRow((row, i) => {
                if (i >= 10) {
                    const dv = row.getCell(1).text.trim();
                    const ten = row.getCell(2).text.trim();
                    const cccd = row.getCell(3).text.trim();
                    if (dv && !ten) grp = dv;
                    else if (ten) {
                        list.push({ dv: grp, ten: ten, cccd: cccd, img: imgMap[i-1] || "" });
                    }
                }
            });

            const step = (type === "1") ? 1 : parseInt(type);
            for (let i = 0; i < list.length; i += step) {
                const chunk = list.slice(i, i + step);
                const page = document.createElement('div');
                page.className = `grid-container page-break ${type === "1" ? 'is-cert' : ''}`;
                
                // Cấu hình kích thước dựa trên loại thẻ
                const gridStyle = type === "9" ? "repeat(3, 62mm)" : (type === "8" ? "repeat(2, 85mm)" : "130mm");
                page.style.gridTemplateColumns = gridStyle;

                chunk.forEach(s => {
                    const cardW = type === "9" ? "62mm" : (type === "8" ? "85mm" : "130mm");
                    const cardH = type === "9" ? "90mm" : (type === "8" ? "53mm" : "190mm");
                    const bg = type === "8" ? "background-color:#FFEA00;" : "background-color:#fff;";
                    
                    page.innerHTML += `
                        <div class="card" style="width:${cardW}; height:${cardH}; ${bg}">
                            <div style="font-size:8pt; font-weight:bold; padding-top:5px;">${s.dv}</div>
                            <div style="font-weight:bold; margin:2px 0;">${type==="1"?'GIẤY CHỨNG NHẬN':'THẺ AN TOÀN'}</div>
                            <div class="photo-box" style="width:25mm; height:35mm; margin-top:5px;">
                                ${s.img ? `<img src="${s.img}">` : ''}
                            </div>
                            <div style="font-weight:bold; font-size:12pt; text-transform:uppercase; margin-top:5px;">${s.ten}</div>
                            <div style="font-weight:bold; font-size:10pt;">Số: ${s.cccd}</div>
                        </div>`;
                });
                area.appendChild(page);
            }

            status.innerText = `✅ Đã xử lý xong ${list.length} học viên.`;
            document.getElementById('btnPrint').style.display = "block";
        } catch (e) {
            status.innerText = "❌ Lỗi: " + e.message;
        }
    }
</script>
</body>
</html>
