<div class="p-4 max-w-2xl mx-auto mt-10">
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
        <div class="p-6 border-b bg-slate-50">
            <h2 class="text-xl font-bold text-gray-800 uppercase">Hồ sơ cá nhân</h2>
            <p class="text-sm text-gray-500">Quản lý thông tin và bảo mật tài khoản</p>
        </div>
        <div class="p-6 space-y-6">
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Tài khoản Email</label>
                <input type="text" id="profileEmail" disabled class="w-full px-3 py-2 border border-gray-200 rounded-lg bg-gray-100 text-gray-600 font-medium">
            </div>
            <div class="border-t pt-6">
                <h3 class="text-sm font-bold text-red-600 mb-4 uppercase"><i class="fa-solid fa-key mr-2"></i>Đổi mật khẩu</h3>
                <form id="formChangePassword" class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Mật khẩu mới</label>
                        <input type="password" id="newPass" required minlength="6" class="w-full px-3 py-2 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <button type="submit" class="bg-slate-800 text-white px-5 py-2 rounded-lg text-sm font-bold shadow hover:bg-slate-900 transition-all">
                        Cập nhật mật khẩu
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
