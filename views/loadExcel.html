<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VDC CRM - Recovery v7.7</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="../js/exceljs.min.js"></script>
    <script src="../js/jszip.min.js"></script>

    <style>
        /* CSS Khôi phục cấu trúc Dashboard */
        body { margin: 0; padding: 0; background: #f8fafc; overflow: hidden; }
        .sidebar-vdc { 
            width: 360px; height: 100vh; background: white; 
            border-right: 1px solid #e2e8f0; display: flex; 
            flex-direction: column; flex-shrink: 0; z-index: 50;
            box-shadow: 10px 0 30px -15px rgba(0,0,0,0.05);
        }
        .main-vdc { flex: 1; height: 100vh; display: flex; flex-direction: column; padding: 30px; }
        
        /* Vùng chọn file (Làm to và đẹp) */
        .drop-zone {
            border: 2px dashed #e2e8f0; border-radius: 20px; 
            padding: 30px 20px; text-align: center; transition: all 0.3s;
            position: relative; background: #fff; cursor: pointer;
        }
        .drop-zone:hover { border-color: #3b82f6; background: #eff6ff; }
        .drop-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

        /* Khung bảng học viên */
        .table-box {
            background: white; border-radius: 24px; flex: 1;
            display: flex; flex-direction: column; overflow: hidden;
            border: 1px solid #f1f5f9; box-shadow: 0 4px 20px rgba(0,0,0,0.02);
        }
        .scroll-area { flex: 1; overflow: auto; padding: 0 20px 20px 20px; }
        
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        th { 
            position: sticky; top: 0; background: white; z-index: 10; padding: 15px;
            font-size: 11px; font-weight: 900; color: #94a3b8; text-transform: uppercase;
            border-bottom: 1px solid #f1f5f9; text-align: left;
        }
        .row-item td { padding: 12px 15px; background: white; border-top: 1px solid #f8fafc; border-bottom: 1px solid #f8fafc; font-size: 13px; }
        .row-item td:first-child { border-radius: 12px 0 0 12px; text-align: center; font-weight: bold; color: #cbd5e1; }
        .row-item td:last-child { border-radius: 0 12px 12px 0; text-align: right; }
        .row-item:hover td { background: #f8faff; border-color: #e0e7ff; }

        .img-avatar { width: 42px; height: 58px; border-radius: 6px; object-fit: cover; border: 2px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn-vdc { transition: all 0.2s; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .btn-vdc:active { scale: 0.96; }
    </style>
</head>
<body>

    <div class="flex">
        <aside class="sidebar-vdc p-8 animate-fade-in">
            <div class="mb-8">
                <h1 class="text-2xl font-black text-slate-800 tracking-tighter">VDC<span class="text-blue-600">.CRM</span></h1>
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-[0.2em]">Safety Cloud Sync v7.7</p>
            </div>

            <div class="space-y-6 flex-1 overflow-y-auto pr-2">
                <div class="bg-slate-100 p-1 rounded-xl flex gap-1">
                    <button id="m1" class="flex-1 text-[9px] font-bold py-2 rounded-lg bg-white shadow-sm border border-slate-200">ẢNH TRONG EXCEL</button>
                    <button id="m2" class="flex-1 text-[9px] font-bold py-2 rounded-lg text-slate-400">KÈM FILE ZIP</button>
                </div>

                <div class="space-y-3">
                    <div class="drop-zone group">
                        <i class="fa-solid fa-file-excel text-3xl text-slate-300 group-hover:text-blue-500 mb-2"></i>
                        <p class="text-[10px] font-black text-slate-500 uppercase">Chọn file Excel</p>
                        <input type="file" id="fileExcel" accept=".xlsx">
                    </div>
                    <div id="zipSection" class="hidden drop-zone group border-emerald-100 bg-emerald-50/30">
                        <i class="fa-solid fa-file-zipper text-3xl text-emerald-300 group-hover:text-emerald-500 mb-2"></i>
                        <p class="text-[10px] font-black text-emerald-500 uppercase">Chọn file ZIP ảnh</p>
                        <input type="file" id="fileZip" accept=".zip">
                    </div>
                </div>

                <div class="bg-slate-50 rounded-2xl p-4 border border-slate-100 space-y-3">
                    <div>
                        <label class="text-[9px] font-black text-slate-400 uppercase">Mã số thuế</label>
                        <input type="text" id="inputMST" class="w-full bg-transparent text-xs font-black border-none focus:ring-0 p-0" placeholder="...">
                    </div>
                    <div class="border-t border-slate-200 pt-2">
                        <label class="text-[9px] font-black text-slate-400 uppercase">Tên công ty</label>
                        <input type="text" id="inputTenCty" class="w-full bg-transparent text-xs font-bold text-blue-600 border-none focus:ring-0 p-0 italic" placeholder="...">
                    </div>
                </div>

                <button id="btnPreview" class="btn-vdc w-full bg-slate-900 text-white py-4 rounded-2xl shadow-xl hover:bg-black text-[11px]">🔍 TRÍCH XUẤT DỮ LIỆU</button>

                <div id="syncBox" class="hidden space-y-4 pt-4 border-t border-slate-200">
                    <button id="btnSync" class="btn-vdc w-full bg-blue-600 text-white py-5 rounded-2xl shadow-xl hover:bg-blue-700 text-[11px] flex items-center justify-center gap-2">
                        <i class="fa-solid fa-cloud-arrow-up animate-bounce"></i> ĐẨY LÊN VDC CLOUD
                    </button>
                    
                    <div class="space-y-2">
                        <div class="flex justify-between text-[10px] font-black text-slate-400 uppercase">
                            <span id="txtStatus">Sẵn sàng...</span>
                            <span id="txtPercent">0%</span>
                        </div>
                        <div class="bg-slate-200 h-1 rounded-full overflow-hidden">
                            <div id="barFill" class="h-full bg-blue-600 w-0 transition-all duration-300"></div>
                        </div>
                    </div>
                </div>
            </div>
        </aside>

        <main class="main-vdc">
            <header class="flex justify-between items-end mb-8 px-4">
                <div>
                    <h2 class="text-2xl font-black text-slate-800 tracking-tight">HỌC VIÊN ĐÃ QUÉT</h2>
                    <p class="text-xs text-slate-400 font-medium">Hệ thống xử lý ô gộp & dữ liệu đa tầng chuẩn VDC</p>
                </div>
                <div class="bg-white px-6 py-2 rounded-2xl border border-slate-100 shadow-sm flex items-center gap-3">
                    <i class="fa-solid fa-users text-blue-500"></i>
                    <span id="count" class="text-sm font-black text-slate-700">00</span>
                </div>
            </header>

            <div class="table-box">
                <div class="scroll-area">
                    <table id="vdcTable">
                        <thead>
                            <tr>
                                <th class="w-16">STT</th>
                                <th class="w-24">Ảnh</th>
                                <th>Họ và Tên</th>
                                <th>Ngày sinh</th>
                                <th>CCCD</th>
                                <th>Chức vụ</th>
                                <th>Đơn vị</th>
                                <th class="text-right">Trạng thái</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr id="empty"><td colspan="8" class="p-32 text-center opacity-10"><i class="fa-solid fa-box-open text-6xl block mb-4"></i><p class="font-black uppercase">Chưa có dữ liệu</p></td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { db, ref, set } from '../js/firebase-config.js';
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxKY8mO5USmDe3DyiYPNLpt0x64l8YN_Z_4TgoEdUs1F0Nw_pnjZd1XU6V2lL_Wl_lS/exec";
        
        let globalHocVien = [];
        let mode = 1;

        // Xử lý Giao diện
        document.getElementById('m1').onclick = () => { mode = 1; updateUI(); }
        document.getElementById('m2').onclick = () => { mode = 2; updateUI(); }
        function updateUI() {
            document.getElementById('m1').className = mode === 1 ? "flex-1 text-[9px] font-bold py-2 rounded-lg bg-white shadow-sm border border-slate-200" : "flex-1 text-[9px] font-bold py-2 text-slate-400";
            document.getElementById('m2').className = mode === 2 ? "flex-1 text-[9px] font-bold py-2 rounded-lg bg-white shadow-sm border border-slate-200" : "flex-1 text-[9px] font-bold py-2 text-slate-400";
            document.getElementById('zipSection').classList.toggle('hidden', mode === 1);
        }

        // Logic trích xuất (v6.2 logic)
        const getSafeVal = (sheet, addr) => {
            const cell = sheet.getCell(addr);
            const target = cell.isMerged && cell.master ? cell.master : cell;
            let val = target.value;
            if (!val) return "";
            if (typeof val === 'object') {
                if (val.richText) return val.richText.map(t => t.text).join('').trim();
                return (val.result || "").toString().trim();
            }
            return val.toString().trim();
        };

        const superClean = (s) => s ? s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/đ/g, "d").replace(/[^a-z0-9]/g, "") : "";

        document.getElementById('btnPreview').onclick = async () => {
            const fileEx = document.getElementById('fileExcel').files[0];
            const fileZi = document.getElementById('fileZip').files[0];
            if (!fileEx) return alert("Chọn Excel!");

            document.getElementById('btnPreview').innerText = "⏳ ĐANG PHÂN TÍCH...";
            const workbook = new ExcelJS.Workbook();
            await workbook.xlsx.load(await fileEx.arrayBuffer());
            const sheet = workbook.worksheets[0];

            // Trích xuất MST/Cty
            if(mode === 1) {
                document.getElementById('inputTenCty').value = getSafeVal(sheet, 'A3').replace(/Công ty[:\s]*/gi, "");
                document.getElementById('inputMST').value = getSafeVal(sheet, 'A4').replace(/Mã số thuế[:\s]*/gi, "");
            }

            // Bóc ảnh
            const anhExcel = {};
            sheet.getImages().forEach(img => {
                if (img.range.tl.nativeCol >= 7) anhExcel[img.range.tl.nativeRow] = workbook.getImage(img.imageId).buffer;
            });

            let anhZip = {};
            if (mode === 2 && fileZi) {
                const zip = await JSZip.loadAsync(fileZi);
                for (let f in zip.files) if (f.match(/\.(jpg|jpeg|png)$/i)) {
                    const n = f.split('/').pop().split('.').shift();
                    anhZip[superClean(n)] = await zip.files[f].async("arraybuffer");
                }
            }

            globalHocVien = [];
            sheet.eachRow((row, i) => {
                const stt = row.getCell(1).text.trim();
                if (i >= 10 && stt && !isNaN(stt)) {
                    const hoten = mode === 1 ? getSafeVal(sheet, `B${i}`) : getSafeVal(sheet, `C${i}`);
                    globalHocVien.push({
                        stt: globalHocVien.length + 1, hoten,
                        ngaysinh: mode === 1 ? row.getCell(4).text : row.getCell(6).text,
                        cccd: mode === 1 ? getSafeVal(sheet, `G${i}`) : getSafeVal(sheet, `E${i}`),
                        donvi: mode === 1 ? (getSafeVal(sheet, 'A2') || "VDC") : getSafeVal(sheet, `I${i}`),
                        congviec: mode === 1 ? getSafeVal(sheet, `F${i}`) : getSafeVal(sheet, `D${i}`),
                        photo: anhExcel[i-1] || anhZip[superClean(hoten)] || null
                    });
                }
            });

            renderTable();
            document.getElementById('syncBox').classList.remove('hidden');
            document.getElementById('count').innerText = globalHocVien.length;
            document.getElementById('btnPreview').innerText = "🔍 QUÉT LẠI";
        };

        function renderTable() {
            const tbody = document.querySelector("#vdcTable tbody");
            tbody.innerHTML = globalHocVien.map(h => `
                <tr class="row-item">
                    <td>${h.stt}</td>
                    <td>${h.photo ? `<img src="${URL.createObjectURL(new Blob([h.photo]))}" class="img-avatar">` : '❌'}</td>
                    <td class="font-bold text-slate-800">${h.hoten}</td>
                    <td>${h.ngaysinh}</td>
                    <td class="font-mono text-slate-500">${h.cccd}</td>
                    <td class="text-[11px] font-medium">${h.congviec}</td>
                    <td class="text-[10px] font-black text-slate-400 uppercase">${h.donvi}</td>
                    <td id="stt-${h.cccd}" class="text-[10px] text-blue-300 font-black italic">CHỜ ĐỒNG BỘ</td>
                </tr>
            `).join('');
        }

        document.getElementById('btnSync').onclick = async () => {
            const mst = document.getElementById('inputMST').value;
            const ten = document.getElementById('inputTenCty').value;
            if(!mst) return alert("Nhập MST!");

            document.getElementById('btnSync').disabled = true;
            for(let i=0; i<globalHocVien.length; i++) {
                const s = globalHocVien[i];
                const pct = Math.round(((i+1)/globalHocVien.length)*100);
                document.getElementById('barFill').style.width = pct + "%";
                document.getElementById('txtPercent').innerText = pct + "%";
                document.getElementById('txtStatus').innerText = `SYNC: ${s.hoten}`;

                let url = "";
                if(s.photo) {
                    const b64 = btoa(new Uint8Array(s.photo).reduce((d,b)=>d+String.fromCharCode(b),''));
                    try {
                        const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ type:"upload", mst, tenCty:ten, cccd:s.cccd, base64:b64 }) });
                        const json = await res.json();
                        if(json.status === "success") {
                            url = json.fileUrl;
                            document.getElementById(`stt-${s.cccd}`).innerHTML = `<span class="text-emerald-500">✅ DRIVE OK</span>`;
                        }
                    } catch(e) {}
                }
                const {photo, ...cleanData} = s;
                await set(ref(db, `HocVien/${mst}/${s.cccd}`), { ...cleanData, PhotoUrl: url, Update: new Date().toLocaleString() });
            }
            document.getElementById('txtStatus').innerText = "ĐỒNG BỘ HOÀN TẤT!";
        };
    </script>
</body>
</html>
