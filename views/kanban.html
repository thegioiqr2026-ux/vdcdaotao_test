<!-- views/kanban.html - V1.23 -->
<div class="p-4 h-full flex flex-col">
    <div class="flex justify-between items-center mb-6">
        <h2 class="text-xl font-bold text-slate-800 flex items-center gap-2">
            <i class="fa-solid fa-chalkboard-user text-blue-600"></i> Quản lý Tiến độ Huấn luyện
        </h2>
        <button onclick="document.getElementById('modalCreate').classList.remove('hidden')" 
                class="bg-blue-600 text-white px-4 py-2 rounded-lg shadow-md hover:bg-blue-700 transition-all flex items-center gap-2 font-medium">
            <i class="fa-solid fa-plus"></i> Lên Đơn Mới
        </button>
    </div>

    <!-- Bảng Kanban -->
    <div class="flex gap-4 overflow-x-auto pb-4 flex-1 items-start">
        <!-- Cột 1: Báo giá -->
        <div class="min-w-[280px] bg-slate-100 rounded-xl p-3 flex flex-col max-h-full border border-slate-200 shadow-inner">
            <h3 class="font-bold text-slate-600 mb-3 px-2 flex justify-between uppercase text-xs tracking-wider">
                1. Báo Giá <span id="count_B1" class="bg-slate-300 text-slate-700 px-2 rounded-full text-[10px]">0</span>
            </h3>
            <div id="col_B1_BaoGia" ondrop="dropCard(event, 'B1_BaoGia')" ondragover="allowDrop(event)" class="space-y-3 overflow-y-auto flex-1 min-h-[150px]"></div>
        </div>

        <!-- Cột 2: Chuẩn bị (Sau khi gửi mẫu) -->
        <div class="min-w-[280px] bg-blue-50/50 rounded-xl p-3 flex flex-col max-h-full border border-blue-100">
            <h3 class="font-bold text-blue-600 mb-3 px-2 flex justify-between uppercase text-xs tracking-wider">
                2. Chuẩn Bị <span id="count_B4" class="bg-blue-200 text-blue-700 px-2 rounded-full text-[10px]">0</span>
            </h3>
            <div id="col_B4_ChuanBi" ondrop="dropCard(event, 'B4_ChuanBi')" ondragover="allowDrop(event)" class="space-y-3 overflow-y-auto flex-1 min-h-[150px]"></div>
        </div>

        <!-- Các cột khác giữ nguyên... -->
        <div id="col_B5_DangDay" class="hidden"></div>
        <div id="col_B6_ChoInPhoi" class="hidden"></div>
        <div id="col_B7_HoanTat" class="hidden"></div>
    </div>
</div>

<!-- MODAL TẠO MỚI (LÊN ĐƠN) -->
<div id="modalCreate" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-xl shadow-2xl w-full max-w-md overflow-hidden animate-fade-in">
        <div class="bg-blue-600 p-4 text-white flex justify-between items-center">
            <h3 class="font-bold">Lên Đơn Huấn Luyện Mới</h3>
            <button onclick="document.getElementById('modalCreate').classList.add('hidden')" class="hover:rotate-90 transition-transform"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <form id="formCreateClass" class="p-5 space-y-4">
            <div class="grid grid-cols-1 gap-3">
                <input type="text" id="newMST" placeholder="Nhập Mã số thuế..." class="w-full px-4 py-2 border-2 border-slate-100 rounded-lg focus:border-blue-500 outline-none transition-all font-bold text-blue-700" required>
                <input type="text" id="newTenCTY" placeholder="Tên công ty (Tự động)" class="w-full px-4 py-2 border rounded-lg bg-slate-50 text-sm" required>
                <input type="text" id="newDiaChi" placeholder="Địa chỉ trụ sở" class="w-full px-4 py-2 border rounded-lg bg-slate-50 text-xs text-gray-500">
                <input type="text" id="newLop" placeholder="Mã lớp: MST-YYYY-STT" class="w-full px-4 py-2 border rounded-lg bg-blue-50 text-xs font-mono text-blue-800" readonly>
                <textarea id="newNoiDung" placeholder="Nội dung huấn luyện (Nhóm 1, 3, 4...)" class="w-full px-4 py-2 border rounded-lg text-sm outline-none focus:ring-1 focus:ring-blue-400" rows="3"></textarea>
            </div>
            <button type="submit" id="btnSubmitCreate" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold shadow-lg hover:bg-blue-700 transition-all">TẠO MỚI & BÁO GIÁ</button>
        </form>
    </div>
</div>

<!-- MODAL CHI TIẾT & NHẬT KÝ (MỚI) -->
<div id="modalDetail" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-xl w-full max-w-2xl max-h-[90vh] flex flex-col shadow-2xl overflow-hidden">
        <div id="detailHeader" class="p-4 bg-slate-800 text-white flex justify-between items-start">
            <div>
                <h3 id="detTenCty" class="font-bold text-lg leading-tight uppercase">Tên Công Ty</h3>
                <p id="detMST" class="text-xs text-slate-400 mt-1 font-mono"></p>
            </div>
            <button onclick="document.getElementById('modalDetail').classList.add('hidden')" class="p-2 hover:bg-white/10 rounded-full"><i class="fa-solid fa-xmark"></i></button>
        </div>
        
        <div class="p-6 overflow-y-auto flex-1 grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Thông tin & Hành động -->
            <div class="space-y-4">
                <div class="bg-slate-50 p-4 rounded-lg border border-slate-200">
                    <h4 class="text-xs font-bold text-slate-500 uppercase mb-2">Hành động nhanh</h4>
                    <div class="flex flex-col gap-2">
                        <button onclick="printQuote()" class="w-full py-2 bg-emerald-600 text-white rounded text-sm font-medium hover:bg-emerald-700">
                            <i class="fa-solid fa-file-invoice-dollar mr-2"></i> In Báo Giá (PDF)
                        </button>
                        <button onclick="handleSendProfile()" class="w-full py-2 bg-blue-600 text-white rounded text-sm font-medium hover:bg-blue-700">
                            <i class="fa-solid fa-envelope-open-text mr-2"></i> Gửi Hồ Sơ Mẫu & Chốt
                        </button>
                    </div>
                </div>
                <div class="text-xs space-y-2">
                    <p><strong>Địa chỉ:</strong> <span id="detDiaChi" class="text-gray-600"></span></p>
                    <p><strong>Nội dung:</strong> <span id="detNoiDung" class="text-gray-600"></span></p>
                </div>
            </div>

            <!-- Nhật ký Timeline -->
            <div>
                <h4 class="text-sm font-bold text-slate-800 mb-4 flex items-center gap-2">
                    <i class="fa-solid fa-clock-rotate-left text-blue-500"></i> Nhật ký trao đổi
                </h4>
                <div id="timelineList" class="space-y-4 border-l-2 border-slate-100 pl-4 py-2">
                    <!-- Dòng thời gian sẽ render ở đây -->
                </div>
            </div>
        </div>
    </div>
</div>
