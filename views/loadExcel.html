<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>VDC CRM - Dual Sync v7.5</title>
    <script src="../js/exceljs.min.js"></script>
    <script src="../js/jszip.min.js"></script> <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .sidebar-gradient { background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%); }
        .file-drop-area { position: relative; display: flex; flex-direction: column; align-items: center; padding: 25px 15px; border: 2px dashed #e2e8f0; border-radius: 20px; transition: all 0.3s ease; background: #fff; }
        .file-drop-area:hover { border-color: #3b82f6; background: #eff6ff; }
        .file-drop-area input { position: absolute; inset: 0; opacity: 0; cursor: pointer; z-index: 10; }
        .main-table-wrapper { background: #fff; border-radius: 30px; box-shadow: 0 10px 50px -12px rgba(0,0,0,0.05); border: 1px solid #f1f5f9; height: calc(100vh - 180px); overflow: hidden; display: flex; flex-direction: column; }
        .table-scroll { flex: 1; overflow-y: auto; padding: 0 24px 24px 24px; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        th { position: sticky; top: 0; background: white; z-index: 20; padding: 20px 15px; text-transform: uppercase; font-size: 11px; font-weight: 900; color: #94a3b8; border-bottom: 1px solid #f1f5f9; text-align: left; }
        .row-card td { padding: 15px; background: white; border-top: 1px solid #f8fafc; border-bottom: 1px solid #f8fafc; }
        .row-card td:first-child { border-left: 1px solid #f8fafc; border-radius: 15px 0 0 15px; text-align: center; }
        .row-card td:last-child { border-right: 1px solid #f8fafc; border-radius: 0 15px 15px 0; text-align: right; }
        .avatar-frame { width: 45px; height: 60px; border-radius: 8px; object-fit: cover; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 2px solid white; }
        .mode-btn.active { background: #2563eb; color: white; border-color: #2563eb; }
    </style>
</head>
<body class="bg-[#fcfdfe] font-sans text-slate-800">

    <div class="flex h-screen overflow-hidden">
        <div class="w-96 sidebar-gradient border-r border-slate-200 p-8 flex flex-col shadow-2xl z-20 overflow-y-auto">
            <div class="mb-8">
                <h1 class="text-2xl font-black tracking-tighter text-slate-800">VDC<span class="text-blue-600">.CRM</span></h1>
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1">Dual Mode Sync v7.5</p>
            </div>

            <div class="space-y-6 flex-1">
                <div class="flex p-1 bg-slate-100 rounded-xl">
                    <button id="mode1" class="mode-btn active flex-1 text-[10px] font-black py-2 rounded-lg border transition-all">LOẠI 1 (ẢNH TRONG EXCEL)</button>
                    <button id="mode2" class="mode-btn flex-1 text-[10px] font-black py-2 rounded-lg border border-transparent transition-all">LOẠI 2 (KÈM FILE ZIP)</button>
                </div>

                <div class="space-y-3">
                    <div class="file-drop-area group">
                        <i class="fa-solid fa-file-excel text-3xl text-slate-300 group-hover:text-blue-500 mb-2"></i>
                        <p id="labelExcel" class="text-xs font-bold text-slate-600 text-center uppercase tracking-tighter">Chọn File Excel</p>
                        <input type="file" id="fileExcel" accept=".xlsx">
                    </div>
                    
                    <div id="zipArea" class="hidden file-drop-area group border-emerald-200 bg-emerald-50/20">
                        <i class="fa-solid fa-file-zipper text-3xl text-emerald-300 group-hover:text-emerald-500 mb-2"></i>
                        <p class="text-xs font-bold text-emerald-600 uppercase tracking-tighter">Chọn File Ảnh (.zip)</p>
                        <input type="file" id="fileZip" accept=".zip">
                    </div>
                </div>

                <div class="bg-white rounded-2xl border border-slate-200 p-4 shadow-sm">
                    <input type="text" id="inputMST" placeholder="Mã số thuế" class="w-full text-xs font-black border-none focus:ring-0 p-0 mb-2">
                    <input type="text" id="inputTenCty" placeholder="Tên đơn vị công ty" class="w-full text-xs font-bold text-blue-600 border-t border-slate-50 pt-2 focus:ring-0 border-none p-0 italic">
                </div>

                <button id="btnPreview" class="w-full bg-slate-800 hover:bg-black text-white font-black py-4 rounded-2xl shadow-xl transition-all text-xs">TRÍCH XUẤT HỌC VIÊN</button>

                <div id="syncSection" class="hidden space-y-4 pt-4 border-t border-slate-100 animate-fade-in">
                    <button id="btnSync" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-5 rounded-2xl shadow-xl flex items-center justify-center gap-3">
                        <i class="fa-solid fa-cloud-arrow-up animate-bounce"></i> ĐỒNG BỘ CLOUD VDC
                    </button>
                    
                    <div id="statusUI" class="space-y-2">
                        <div class="flex justify-between text-[10px] font-black text-slate-400 uppercase">
                            <span id="statusText">Sẵn sàng...</span>
                            <span id="percentText">0%</span>
                        </div>
                        <div class="bg-slate-200 h-1 rounded-full overflow-hidden">
                            <div id="progressFill" class="h-full bg-blue-600 transition-all w-0"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="flex-1 p-8 flex flex-col">
            <div class="flex justify-between items-end mb-6 px-4">
                <div>
                    <h3 class="text-xl font-black text-slate-800 tracking-tight">VDC DATA PROCESSOR</h3>
                    <p id="modeInfo" class="text-xs text-blue-500 font-bold uppercase tracking-widest mt-1 italic">Chế độ: Ảnh tích hợp Excel</p>
                </div>
                <div id="countAll" class="bg-white px-5 py-2 rounded-xl shadow-sm border border-slate-100 font-black text-blue-600 text-sm">0 học viên</div>
            </div>

            <div class="main-table-wrapper">
                <div class="table-scroll">
                    <table id="hocVienTable">
                        <thead>
                            <tr>
                                <th class="w-16">STT</th>
                                <th class="w-24">Ảnh</th>
                                <th>Họ và Tên</th>
                                <th>CCCD / Định danh</th>
                                <th>Nhóm/Đơn vị</th>
                                <th>Trạng thái Sync</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { db, ref, set } from '../js/firebase-config.js';
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxKY8mO5USmDe3DyiYPNLpt0x64l8YN_Z_4TgoEdUs1F0Nw_pnjZd1XU6V2lL_Wl_lS/exec";
        let hocVienList = [];
        let currentMode = 1;

        // Switch Mode
        document.getElementById('mode1').onclick = () => {
            currentMode = 1;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('mode1').classList.add('active');
            document.getElementById('zipArea').classList.add('hidden');
            document.getElementById('modeInfo').innerText = "Chế độ: Ảnh tích hợp Excel";
        };
        document.getElementById('mode2').onclick = () => {
            currentMode = 2;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('mode2').classList.add('active');
            document.getElementById('zipArea').classList.remove('hidden');
            document.getElementById('modeInfo').innerText = "Chế độ: Ảnh kèm file ZIP";
        };

        document.getElementById('btnPreview').onclick = async () => {
            const fileEx = document.getElementById('fileExcel').files[0];
            if (!fileEx) return alert("Thiếu File Excel!");

            const workbook = new ExcelJS.Workbook();
            await workbook.xlsx.load(await fileEx.arrayBuffer());
            const sheet = workbook.getWorksheet(1);

            document.getElementById('inputTenCty').value = sheet.getCell('A3').text.replace(/Công ty[:\s]*/gi, "");
            document.getElementById('inputMST').value = sheet.getCell('A4').text.match(/[0-9]+/)?.[0] || "";

            let imageMap = {};
            if (currentMode === 1) {
                // LOẠI 1: LẤY ẢNH TỪ EXCEL
                sheet.getImages().forEach(img => {
                    const row = img.range.tl.nativeRow + 1;
                    imageMap[row] = workbook.getImage(img.imageId).buffer;
                });
            } else {
                // LOẠI 2: LẤY ẢNH TỪ ZIP THEO CCCD
                const fileZ = document.getElementById('fileZip').files[0];
                if (!fileZ) return alert("Vui lòng chọn thêm file ZIP ảnh!");
                const zip = await JSZip.loadAsync(fileZ);
                for (let filename in zip.files) {
                    if (filename.match(/\.(jpg|jpeg|png)$/i)) {
                        const cccd = filename.split('.')[0].replace(/[^0-9]/g, '');
                        imageMap[cccd] = await zip.files[filename].async("uint8array");
                    }
                }
            }

            hocVienList = [];
            sheet.eachRow((row, rowNum) => {
                const stt = row.getCell(1).text;
                if (rowNum >= 10 && stt && !isNaN(stt)) {
                    const cccd = row.getCell(7).text.trim();
                    hocVienList.push({
                        stt: stt, hoten: row.getCell(2).text, cccd: cccd,
                        donvi: row.getCell(5).text || "VDC",
                        photo: (currentMode === 1) ? imageMap[rowNum] : imageMap[cccd]
                    });
                }
            });

            renderTable();
            document.getElementById('syncSection').classList.remove('hidden');
            document.getElementById('countAll').innerText = hocVienList.length + " học viên";
        };

        function renderTable() {
            const tbody = document.querySelector("#hocVienTable tbody");
            tbody.innerHTML = hocVienList.map(h => `
                <tr class="row-card">
                    <td>${h.stt}</td>
                    <td>${h.photo ? `<img src="${URL.createObjectURL(new Blob([h.photo]))}" class="avatar-frame">` : '❌'}</td>
                    <td class="font-bold text-slate-700">${h.hoten}</td>
                    <td class="font-mono text-slate-500">${h.cccd}</td>
                    <td class="text-slate-400 font-bold text-[10px] uppercase">${h.donvi}</td>
                    <td id="status-${h.cccd}" class="text-[10px] font-black text-blue-300 italic uppercase">Chờ đẩy...</td>
                </tr>
            `).join('');
        }

        document.getElementById('btnSync').onclick = async () => {
            const mst = document.getElementById('inputMST').value;
            const tenCty = document.getElementById('inputTenCty').value;
            document.getElementById('btnSync').disabled = true;

            for (let i = 0; i < hocVienList.length; i++) {
                const hv = hocVienList[i];
                const pct = Math.round(((i + 1) / hocVienList.length) * 100);
                document.getElementById('progressFill').style.width = pct + "%";
                document.getElementById('percentText').innerText = pct + "%";
                document.getElementById('statusText').innerText = `Sync: ${hv.hoten}`;

                let driveUrl = "";
                if (hv.photo) {
                    const base64 = btoa(new Uint8Array(hv.photo).reduce((d, b) => d + String.fromCharCode(b), ''));
                    try {
                        const res = await fetch(GAS_URL, {
                            method: 'POST',
                            body: JSON.stringify({ type: "upload", mst: mst, tenCty: tenCty, cccd: hv.cccd, base64: base64 })
                        });
                        const resJson = await res.json();
                        if (resJson.status === "success") {
                            driveUrl = resJson.fileUrl;
                            document.getElementById(`status-${hv.cccd}`).innerHTML = `<span class="text-emerald-500 font-black text-[9px]">✅ DRIVE OK</span>`;
                        }
                    } catch (e) { console.error(e); }
                }

                await set(ref(db, `HocVien/${mst}/${hv.cccd}`), {
                    ...hv, PhotoUrl: driveUrl, photo: null, NgaySync: new Date().toLocaleString('vi-VN')
                });
            }
            alert("Đã đồng bộ thành công!");
        };
    </script>
</body>
</html>
