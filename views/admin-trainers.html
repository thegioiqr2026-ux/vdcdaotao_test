<div class="h-full flex flex-col">
    <div class="mb-5 flex justify-between items-end">
        <div>
            <h2 class="text-2xl font-bold text-gray-800 uppercase">Quản lý Giảng viên</h2>
            <p class="text-sm text-gray-500">Danh sách mạng lưới giảng viên trên toàn quốc của VDC.</p>
        </div>
        <button onclick="document.getElementById('modalTrainer').classList.remove('hidden')" class="bg-blue-600 text-white px-5 py-2 rounded-lg font-bold shadow-md hover:bg-blue-700 transition-all">
            <i class="fa-solid fa-user-plus mr-2"></i> Thêm Giảng viên
        </div>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
        <table class="w-full text-left">
            <thead>
                <tr class="bg-slate-100 text-slate-600 text-xs uppercase font-bold">
                    <th class="p-4">Họ và Tên</th>
                    <th class="p-4">Khu vực cư trú</th>
                    <th class="p-4">Ngành giảng</th>
                    <th class="p-4 text-center">Phí/Ngày</th>
                    <th class="p-4 text-center">Thao tác</th>
                </tr>
            </thead>
            <tbody id="trainerTableBody" class="text-sm divide-y divide-gray-100">
                </tbody>
        </table>
    </div>

    <div id="modalTrainer" class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden">
            <div class="p-6 border-b bg-slate-50">
                <h3 class="text-lg font-bold text-slate-800">HỒ SƠ GIẢNG VIÊN MỚI</h3>
            </div>
            <form id="formTrainer" class="p-6 space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase">Họ và Tên *</label>
                        <input type="text" id="gvTen" required class="mt-1 w-full px-3 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase">Số điện thoại *</label>
                        <input type="text" id="gvSdt" required class="mt-1 w-full px-3 py-2 border rounded-lg outline-none">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase">Địa chỉ cư trú (Để tính khoảng cách) *</label>
                    <input type="text" id="gvDiaChi" placeholder="Số nhà, Tên đường, Tỉnh/Thành..." required class="mt-1 w-full px-3 py-2 border rounded-lg outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase">Ngành giảng dạy (Cách nhau dấu phẩy)</label>
                    <input type="text" id="gvNganh" placeholder="Nhóm 3, Nhóm 4, PCCC..." class="mt-1 w-full px-3 py-2 border rounded-lg outline-none">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase">Phí/Ngày (VNĐ)</label>
                        <input type="number" id="gvPhiNgay" value="2000000" class="mt-1 w-full px-3 py-2 border rounded-lg outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase">Điểm ưu tiên (1-10)</label>
                        <input type="number" id="gvDiem" value="5" max="10" class="mt-1 w-full px-3 py-2 border rounded-lg outline-none">
                    </div>
                </div>
                <div class="flex justify-end gap-3 mt-6">
                    <button type="button" onclick="document.getElementById('modalTrainer').classList.add('hidden')" class="px-5 py-2 text-gray-500 font-bold hover:bg-gray-100 rounded-lg">Hủy</button>
                    <button type="submit" class="px-5 py-2 bg-blue-600 text-white font-bold rounded-lg shadow-md hover:bg-blue-700">Lưu hồ sơ</button>
                </div>
            </form>
        </div>
    </div>
</div>
