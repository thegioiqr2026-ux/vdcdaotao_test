<div class="p-6 h-full flex flex-col bg-[#fcfdfe] animate-fade-in">
    
    <div class="flex justify-between items-center mb-8 bg-white p-5 rounded-[24px] shadow-sm border border-slate-100">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-blue-600 text-white rounded-2xl flex items-center justify-center shadow-lg shadow-blue-100">
                <i class="fa-solid fa-chalkboard-user text-xl"></i>
            </div>
            <div>
                <h2 class="text-xl font-black text-slate-800 tracking-tighter uppercase leading-none">Quản lý Tiến độ Huấn luyện</h2>
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-[0.2em] mt-1">Hệ thống điều phối VDC CRM</p>
            </div>
        </div>
        
        <button onclick="document.getElementById('modalCreate').classList.remove('hidden')" 
                class="bg-slate-900 text-white px-6 py-3 rounded-2xl shadow-xl hover:bg-black transition-all flex items-center gap-2 text-xs font-black uppercase tracking-widest active:scale-95">
            <i class="fa-solid fa-plus text-blue-400"></i> Lên Đơn Mới
        </button>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-5 gap-6 flex-1 overflow-hidden pb-4">
        
        <div class="flex flex-col bg-slate-100/50 rounded-[28px] p-4 border border-slate-200/60 shadow-inner overflow-hidden">
            <h3 class="font-black text-slate-500 mb-4 px-2 flex justify-between items-center uppercase text-[10px] tracking-widest">
                <span><i class="fa-solid fa-file-invoice-dollar mr-1 text-slate-400"></i> 1. Báo Giá</span>
                <span id="count_B1" class="bg-white text-slate-600 px-2 py-0.5 rounded-lg border border-slate-200 text-[10px]">0</span>
            </h3>
            <div id="col_B1_BaoGia" ondrop="dropCard(event, 'B1_BaoGia')" ondragover="allowDrop(event)" 
                 class="space-y-4 overflow-y-auto flex-1 min-h-[200px] pr-1 scroll-thin"></div>
        </div>

        <div class="flex flex-col bg-blue-50/50 rounded-[28px] p-4 border border-blue-100 shadow-inner overflow-hidden">
            <h3 class="font-black text-blue-600 mb-4 px-2 flex justify-between items-center uppercase text-[10px] tracking-widest">
                <span><i class="fa-solid fa-box-open mr-1"></i> 2. Chuẩn Bị</span>
                <span id="count_B4" class="bg-white text-blue-700 px-2 py-0.5 rounded-lg border border-blue-100 text-[10px]">0</span>
            </h3>
            <div id="col_B4_ChuanBi" ondrop="dropCard(event, 'B4_ChuanBi')" ondragover="allowDrop(event)" 
                 class="space-y-4 overflow-y-auto flex-1 min-h-[200px] pr-1 scroll-thin"></div>
        </div>

        <div class="flex flex-col bg-amber-50/50 rounded-[28px] p-4 border border-amber-100 shadow-inner overflow-hidden">
            <h3 class="font-black text-amber-600 mb-4 px-2 flex justify-between items-center uppercase text-[10px] tracking-widest">
                <span><i class="fa-solid fa-person-chalkboard mr-1"></i> 3. Đang Dạy</span>
                <span id="count_B5" class="bg-white text-amber-700 px-2 py-0.5 rounded-lg border border-amber-100 text-[10px]">0</span>
            </h3>
            <div id="col_B5_DangDay" ondrop="dropCard(event, 'B5_DangDay')" ondragover="allowDrop(event)" 
                 class="space-y-4 overflow-y-auto flex-1 min-h-[200px] pr-1 scroll-thin"></div>
        </div>

        <div class="flex flex-col bg-indigo-50/50 rounded-[28px] p-4 border border-indigo-100 shadow-inner overflow-hidden">
            <h3 class="font-black text-indigo-600 mb-4 px-2 flex justify-between items-center uppercase text-[10px] tracking-widest">
                <span><i class="fa-solid fa-print mr-1"></i> 4. In Phôi</span>
                <span id="count_B6" class="bg-white text-indigo-700 px-2 py-0.5 rounded-lg border border-indigo-100 text-[10px]">0</span>
            </h3>
            <div id="col_B6_ChoInPhoi" ondrop="dropCard(event, 'B6_ChoInPhoi')" ondragover="allowDrop(event)" 
                 class="space-y-4 overflow-y-auto flex-1 min-h-[200px] pr-1 scroll-thin"></div>
        </div>

        <div class="flex flex-col bg-emerald-50/50 rounded-[28px] p-4 border border-emerald-100 shadow-inner overflow-hidden">
            <h3 class="font-black text-emerald-600 mb-4 px-2 flex justify-between items-center uppercase text-[10px] tracking-widest">
                <span><i class="fa-solid fa-circle-check mr-1"></i> 5. Hoàn Tất</span>
                <span id="count_B7" class="bg-white text-emerald-700 px-2 py-0.5 rounded-lg border border-emerald-100 text-[10px]">0</span>
            </h3>
            <div id="col_B7_HoanTat" ondrop="dropCard(event, 'B7_HoanTat')" ondragover="allowDrop(event)" 
                 class="space-y-4 overflow-y-auto flex-1 min-h-[200px] pr-1 scroll-thin"></div>
        </div>
    </div>
</div>

<style>
    .scroll-thin::-webkit-scrollbar { width: 4px; }
    .scroll-thin::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.05); border-radius: 10px; }
    .kanban-card { 
        background: white; border-radius: 18px; padding: 15px; 
        border: 1px solid #f1f5f9; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02);
        cursor: grab; transition: all 0.2s;
    }
    .kanban-card:hover { transform: translateY(-3px); box-shadow: 0 10px 20px -5px rgba(0,0,0,0.08); border-color: #3b82f6; }
</style>

<div id="modalCreate" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center z-[100] p-4 backdrop-blur-sm">
    <div class="bg-white rounded-[32px] shadow-2xl w-full max-w-md overflow-hidden animate-slide-up">
        <div class="bg-slate-900 p-6 text-white flex justify-between items-center">
            <h3 class="font-black uppercase tracking-widest text-sm">Lên Đơn Huấn Luyện Mới</h3>
            <button onclick="document.getElementById('modalCreate').classList.add('hidden')" class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center hover:bg-white/20 transition-all"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <form id="formCreateClass" class="p-8 space-y-5">
            <div class="space-y-4">
                <div class="relative">
                    <i class="fa-solid fa-fingerprint absolute left-4 top-4 text-slate-300"></i>
                    <input type="text" id="newMST" placeholder="Mã số thuế..." class="w-full pl-12 pr-4 py-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none font-black text-blue-700 tracking-wider">
                </div>
                <input type="text" id="newTenCTY" placeholder="Tên công ty" class="w-full px-5 py-4 bg-slate-50 border-none rounded-2xl text-xs font-bold text-slate-600 italic">
                <input type="text" id="newDiaChi" placeholder="Địa chỉ trụ sở" class="w-full px-5 py-4 bg-slate-50 border-none rounded-2xl text-[10px] text-slate-400">
                <textarea id="newNoiDung" placeholder="Nội dung huấn luyện (Nhóm 1, 3, 4...)" class="w-full px-5 py-4 bg-slate-50 border-none rounded-2xl text-xs font-medium outline-none focus:ring-2 focus:ring-blue-500" rows="3"></textarea>
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black shadow-xl shadow-blue-100 hover:bg-blue-700 transition-all uppercase tracking-widest text-xs">TẠO MỚI & BÁO GIÁ</button>
        </form>
    </div>
</div>
