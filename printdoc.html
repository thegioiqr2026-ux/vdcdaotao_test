<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hệ Thống Quản Lý In Ấn v2.3</title>
    <script src="./js/exceljs.min.js"></script>
    <script src="./js/jszip.min.js"></script>
    <style>
        body { font-family: "Segoe UI", Tahoma, sans-serif; background: #f0f2f5; padding: 20px; }
        .main-panel { background: white; max-width: 1000px; margin: 0 auto; padding: 25px; border-radius: 12px; display: grid; grid-template-columns: 1fr 380px; gap: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .controls { border-right: 1px solid #eee; padding-right: 20px; }
        .control-group { margin-bottom: 15px; background: #f8f9fa; padding: 10px; border-radius: 8px; border: 1px solid #e9ecef; }
        label { font-weight: bold; display: block; margin-bottom: 5px; color: #2c3e50; font-size: 14px; }
        select, input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .btn-run { width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 16px; }
        .zip-options { display: flex; gap: 10px; margin-top: 8px; font-size: 12px; align-items: center; }
        #previewSection { grid-column: 1 / span 2; margin-top: 20px; border-top: 2px solid #007bff; padding-top: 20px; display: none; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; font-size: 13px; }
        th { background: #34495e; color: white; }
        .preview-img { width: 45px; height: 55px; object-fit: cover; border: 1px solid #eee; }
    </style>
</head>
<body>

<div class="main-panel">
    <div class="controls">
        <h2 style="margin-top:0; color:#007bff;">ĐIỀU KHIỂN IN ẤN</h2>

        <div class="control-group" style="background: #fff3cd; border-color: #ffeeba;">
            <label>📂 Loại cấu trúc File Excel:</label>
            <select id="excelType">
                <option value="standard">Mẫu cũ (Ảnh trong Excel - Ô A3)</option>
                <option value="modern">Mẫu mới (Ảnh trong ZIP - Ô A1 Merge)</option>
            </select>
        </div>

        <div class="control-group">
            <label>🎨 Mẫu thẻ in:</label>
            <select id="formType">
                <option value="44">Thẻ ATVSLĐ (9 thẻ/A4)</option>
                <option value="62">Thẻ An Toàn Điện (8 thẻ/A4)</option>
            </select>
        </div>

        <div class="control-group">
            <label>📊 Tải file Excel (.xlsx):</label>
            <input type="file" id="excelInput" accept=".xlsx">
        </div>

        <div id="zipGroup" class="control-group" style="display:none;">
            <label>📦 Tải file ZIP hình ảnh:</label>
            <input type="file" id="zipInput" accept=".zip">
            <div class="zip-options">
                <span>Khớp theo:</span>
                <label><input type="radio" name="matchBy" value="name" checked> Họ tên</label>
                <label><input type="radio" name="matchBy" value="cccd"> Số CCCD</label>
            </div>
        </div>

        <button class="btn-run" onclick="handleData()">🚀 TRÍCH XUẤT DỮ LIỆU</button>
        <div id="status" style="text-align:center; margin-top:10px; font-weight:bold; color:#d9534f;"></div>
    </div>

    <div class="demo-area" style="text-align:center; padding:10px;">
        <label>XEM TRƯỚC MẪU (DEMO)</label>
        <div id="demoCard" style="margin:10px auto; border:1px solid #ddd; width:62mm; height:90mm; background:url('./doctemplate/backgroundTheATVSLD.png') center/100% 100% no-repeat;"></div>
        <p style="font-size:12px; color:#666;">Hệ thống sẽ tự động dàn trang in</p>
    </div>

    <div id="previewSection">
        <h3>Kiểm tra danh sách nhân viên:</h3>
        <table id="previewTable">
            <thead>
                <tr>
                    <th>STT</th>
                    <th>Ảnh</th>
                    <th>Họ và Tên</th>
                    <th>Mã số / CCCD</th>
                    <th>Đơn vị công tác</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
        <button class="btn-run" style="background:#007bff;" onclick="startPrinting()">🖨️ XÁC NHẬN VÀ XUẤT THẺ IN</button>
    </div>
</div>

<script>
    // Hiện/Ẩn mục ZIP dựa trên cấu trúc Excel
    document.getElementById('excelType').onchange = function() {
        document.getElementById('zipGroup').style.display = this.value === 'modern' ? 'block' : 'none';
    };

    function normalizeStr(s) {
        return s ? s.toString().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/đ/g, "d").replace(/\s+/g, "") : "";
    }

    async function handleData() {
        const exType = document.getElementById('excelType').value;
        const fileEx = document.getElementById('excelInput').files[0];
        const status = document.getElementById('status');

        if (!fileEx) return alert("Chưa chọn file Excel!");
        status.innerText = "⏳ Đang trích xuất...";

        const wb = new ExcelJS.Workbook();
        await wb.xlsx.load(await fileEx.arrayBuffer());
        const sh = wb.worksheets[0];
        let students = [];
        let imgMap = {};

        // XỬ LÝ ẢNH
        if (exType === 'standard') {
            sh.getImages().forEach(img => {
                if (img.range.tl.nativeCol === 8) {
                    imgMap[img.range.tl.nativeRow] = URL.createObjectURL(new Blob([wb.getImage(img.imageId).buffer]));
                }
            });
        } else {
            const fZip = document.getElementById('zipInput').files[0];
            if (!fZip) return alert("Mẫu mới yêu cầu phải có file ZIP hình ảnh!");
            const matchBy = document.querySelector('input[name="matchBy"]:checked').value;
            const zip = await JSZip.loadAsync(fZip);
            for (let name in zip.files) {
                if (name.match(/\.(jpg|jpeg|png)$/i)) {
                    const blob = await zip.files[name].async("blob");
                    imgMap[normalizeStr(name.split('/').pop().split('.').shift())] = URL.createObjectURL(blob);
                }
            }
        }

        // XỬ LÝ ĐƠN VỊ & DANH SÁCH
        let company = "";
        let startRow = 10;

        if (exType === 'standard') {
            company = sh.getCell('A3').text.replace(/Công ty[:\s]*/gi, "").trim();
            startRow = 10;
        } else {
            const fullA1 = sh.getCell('A1').text || "";
            company = fullA1.split('\n')[0].replace(/Công ty[:\s]*/gi, "").trim();
            startRow = 4;
        }

        const tbody = document.querySelector("#previewTable tbody");
        tbody.innerHTML = "";
        let count = 0;

        sh.eachRow((row, i) => {
            if (i >= startRow) {
                let name = row.getCell(2).text.trim();
                let cccd = row.getCell(3).text.trim();
                if (name) {
                    count++;
                    let photo = "";
                    if (exType === 'standard') {
                        photo = imgMap[i-1] || "";
                    } else {
                        const matchBy = document.querySelector('input[name="matchBy"]:checked').value;
                        photo = imgMap[normalizeStr(matchBy === 'name' ? name : cccd)] || "";
                    }

                    students.push({ name, cccd, photo, company });
                    tbody.innerHTML += `<tr><td>${count}</td><td><img src="${photo}" class="preview-img"></td><td>${name}</td><td>${cccd}</td><td>${company}</td></tr>`;
                }
            }
        });

        sessionStorage.setItem('final_data', JSON.stringify(students));
        document.getElementById('previewSection').style.display = "block";
        status.innerText = `✅ Đã xử lý ${count} nhân sự.`;
    }

    function startPrinting() {
        const type = document.getElementById('formType').value;
        window.location.href = `./doctemplate/printThe${type}.html`;
    }
</script>
</body>
</html>
