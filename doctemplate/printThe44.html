<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>In Thẻ ATVSLĐ (NĐ44) - Biểu mẫu</title>
    <script src="../js/exceljs.min.js"></script>
    <style>
        @page { size: A4; margin: 0; }
        @media print {
            .no-print { display: none; }
            body { background: none; margin: 0; padding: 0; }
            .page-break { page-break-after: always; display: block; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }
        body { font-family: "Times New Roman", Times, serif; margin: 0; padding: 0; background: #fff; }
        .grid-9 { 
            display: grid; width: 210mm; height: 297mm; 
            grid-template-columns: repeat(3, 62mm); 
            grid-template-rows: repeat(3, 90mm); 
            gap: 5px; margin: 0 auto; justify-content: center; align-content: center;
        }
        .card { 
            width: 62mm; height: 90mm; border: 0.1mm solid #ccc; 
            position: relative; display: flex; flex-direction: column; align-items: center;
            background-image: url('../images/backgroundTheATVSLD.png');
            background-size: 100% 100%; text-align: center; padding: 5mm 0; box-sizing: border-box;
        }
        .info-dv { font-size: 9pt; font-weight: bold; text-transform: uppercase; width: 90%; height: 40px; display: flex; align-items: center; justify-content: center; }
        .info-title { font-size: 10pt; font-weight: bold; color: #003399; margin: 5mm 0; }
        .photo-box { width: 20mm; height: 30mm; border: 0.5px solid #000; background: #fff; }
        img.avatar { width: 100%; height: 100%; object-fit: fill; }
        .info-code { font-size: 10pt; font-weight: bold; margin-top: auto; padding-bottom: 10mm; }
        .btn-back { position: fixed; top: 10px; left: 10px; padding: 10px; background: #6c757d; color: white; border: none; border-radius: 4px; cursor: pointer; z-index: 9999; }
    </style>
</head>
<body>
    <button class="btn-back no-print" onclick="window.location.href='../printdoc.html'">⬅ Quay lại</button>
    <div id="printArea"></div>

    <script>
        window.onload = async function() {
            const dataBase64 = sessionStorage.getItem('excel_data_buffer');
            if (!dataBase64) {
                alert("Không tìm thấy dữ liệu! Vui lòng quay lại trang điều khiển.");
                return;
            }

            try {
                const binaryString = atob(dataBase64);
                const bytes = new Uint8Array(binaryString.length);
                for (let i = 0; i < binaryString.length; i++) bytes[i] = binaryString.charCodeAt(i);

                const wb = new ExcelJS.Workbook();
                await wb.xlsx.load(bytes.buffer);
                const sh = wb.worksheets[0];

                let rawDV = sh.getCell('A3').value ? sh.getCell('A3').value.toString() : "";
                let cleanDV = rawDV.replace(/Công ty[:\s]*/gi, "").trim();
                let shortName = cleanDV.split(/\s+/).filter(w=>w).map(w=>w[0]).join('').toUpperCase() || "THE";
                let currentYear = new Date().getFullYear();

                const imgMap = {};
                sh.getImages().forEach(img => {
                    if (img.range.tl.nativeCol === 8) {
                        const blob = new Blob([wb.getImage(img.imageId).buffer]);
                        imgMap[img.range.tl.nativeRow] = URL.createObjectURL(blob);
                    }
                });

                let students = []; let stt = 1;
                sh.eachRow((row, i) => {
                    let name = row.getCell(2).value;
                    if (i >= 10 && name) {
                        students.push({ img: imgMap[i-1] || "", code: `Số: ${stt++}/${currentYear}/${shortName}` });
                    }
                });

                const area = document.getElementById('printArea');
                for (let i = 0; i < students.length; i += 9) {
                    const chunk = students.slice(i, i + 9);
                    const page = document.createElement('div');
                    page.className = "grid-9 page-break";
                    chunk.forEach(s => {
                        page.innerHTML += `
                            <div class="card">
                                <div class="info-dv">${cleanDV}</div>
                                <div class="info-title">THẺ AN TOÀN VỆ SINH LAO ĐỘNG</div>
                                <div class="photo-box">${s.img ? `<img class="avatar" src="${s.img}">` : ''}</div>
                                <div class="info-code">${s.code}</div>
                            </div>`;
                    });
                    area.appendChild(page);
                }
                window.print();
            } catch (e) { alert("Lỗi xử lý: " + e.message); }
        };
    </script>
</body>
</html>
