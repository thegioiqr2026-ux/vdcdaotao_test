<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>VDC Thông tin học viên v4.4</title>
    <script src="../js/exceljs.min.js"></script>
    <script src="../js/jszip.min.js"></script>
    <script src="../js/firebase-config.js" type="module"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: #fff; overflow: hidden; }
        .sidebar-in { width: 300px; background: #f8fafc; border-right: 1px solid #e2e8f0; padding: 15px; overflow-y: auto; flex-shrink: 0; }
        .main-content { flex: 1; padding: 10px; display: flex; flex-direction: column; overflow: hidden; }
        .form-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 4px; font-weight: bold; font-size: 12px; color: #64748b; }
        input[type="file"], input[type="text"] { width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #cbd5e1; font-size: 13px; box-sizing: border-box; }
        
        /* Bảng dữ liệu */
        .table-container { flex: 1; border: 1px solid #e2e8f0; border-radius: 4px; overflow: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 1600px; }
        th { background: #f1f5f9; color: #475569; position: sticky; top: 0; padding: 10px; font-size: 11px; text-transform: uppercase; border-bottom: 2px solid #e2e8f0; z-index: 10; }
        td { padding: 6px; border-bottom: 1px solid #f1f5f9; text-align: center; font-size: 12px; }
        
        /* UI Trạng thái đồng bộ */
        .progress-container { margin-top: 15px; display: none; background: #e2e8f0; border-radius: 10px; height: 12px; overflow: hidden; }
        #progressBar { height: 100%; width: 0%; background: #10b981; transition: width 0.3s; }
        #syncLog { margin-top: 8px; font-size: 10px; color: #475569; height: 40px; overflow-y: auto; background: #f8fafc; padding: 5px; border-radius: 4px; border: 1px solid #eee; }
        
        .btn { width: 100%; padding: 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; color: white; margin-top: 8px; font-size: 13px; }
        .preview-img { width: 40px; height: 55px; object-fit: cover; border-radius: 2px; }
        #status { margin-top: 8px; font-size: 11px; text-align: center; color: #3b82f6; font-weight: bold; }
    </style>
</head>
<body>

<div class="sidebar-in">
    <div class="form-group"><label>1. FILE EXCEL:</label><input type="file" id="fileExcel" accept=".xlsx" /></div>
    <div class="form-group"><label>2. FILE ZIP ẢNH:</label><input type="file" id="fileZip" accept=".zip" /></div>
    <div style="background: #f1f5f9; padding: 10px; border-radius: 4px;">
        <input type="text" id="inputMST" placeholder="Mã số thuế..." style="margin-bottom: 8px;">
        <input type="text" id="inputTenCty" placeholder="Tên công ty...">
    </div>
    <button class="btn" style="background:#3b82f6;" id="btnPreview">🔍 XEM TRƯỚC</button>
    
    <div id="syncSection" style="display: none;">
        <button id="btnSync" class="btn" style="background:#10b981;">🚀 BẮT ĐẦU ĐỒNG BỘ</button>
        <div class="progress-container" id="pContainer"><div id="progressBar"></div></div>
        <div id="status"></div>
        <div id="syncLog">Chờ lệnh đồng bộ...</div>
    </div>
    
    <p style="font-size: 10px; color: #94a3b8; text-align: center; margin-top: 15px;">v4.4 - Monitoring Mode</p>
</div>

<div class="main-content">
    <div class="table-container">
        <table id="previewTable">
            <thead>
                <tr>
                    <th>STT</th><th>Ảnh</th><th>Họ và Tên</th><th>Ngày sinh</th><th>Giới tính</th>
                    <th>CCCD</th><th>Chức vụ</th><th>Mã NV</th><th>Quốc tịch</th><th>NHÓM</th><th>NỘI DUNG HL</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script type="module">
    import { db, ref, set } from '../js/firebase-config.js';
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxRNpGczbDYLXpJliEOHhcubc41qm-x7DW47MsVz1W6Ne3BJTMWYs98ciWE5SkY2MWY/exec";
    let globalDataHocVien = [];

    function superClean(s) { return s ? s.toString().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/đ/g, "d").replace(/[^a-z0-9]/g, "").trim() : ""; }

    // Logic trích xuất
    document.getElementById('btnPreview').addEventListener('click', async () => {
        const fileEx = document.getElementById('fileExcel').files[0];
        const fileZi = document.getElementById('fileZip').files[0];
        if (!fileEx) return alert("Chưa chọn file!");

        const workbook = new ExcelJS.Workbook();
        await workbook.xlsx.load(await fileEx.arrayBuffer());
        const sheet = workbook.worksheets[0];
        let data = [];

        const anhTuZip = {};
        if (fileZi) {
            const zipData = await JSZip.loadAsync(fileZi);
            for (let f in zipData.files) {
                if (f.match(/\.(jpg|jpeg|png)$/i)) {
                    anhTuZip[superClean(f.split('/').pop().split('.').shift())] = await zipData.files[f].async("arraybuffer");
                }
            }
        }

        const valA8 = sheet.getCell('A8').text || "";
        // Logic mẫu 2 (Long Phương)
        if (valA8.includes("CÔNG TY") || sheet.getCell('A9').text.includes("STT")) {
            document.getElementById('inputTenCty').value = valA8.split('\n')[0].trim();
            sheet.eachRow((row, i) => {
                if (i >= 10) {
                    const sttVal = row.getCell(1).text.trim();
                    const hoTenVal = row.getCell(3).text.trim();
                    if (sttVal && !isNaN(sttVal)) {
                        data.push({
                            stt: data.length + 1, hoten: hoTenVal,
                            manv: row.getCell(2).text.trim(), congviec: row.getCell(4).text.trim(),
                            cccd: row.getCell(5).text.trim(), ngaysinh: row.getCell(6).text,
                            gioitinh: row.getCell(7).text, quoctich: row.getCell(8).text,
                            donvi: row.getCell(9).text.trim(), noidung: row.getCell(10).text.trim(),
                            photo: anhTuZip[superClean(hoTenVal)] || null
                        });
                    }
                }
            });
        }
        // Logic mẫu 1... (Rút gọn cho ngắn)

        globalDataHocVien = data;
        renderTable(data);
        document.getElementById('syncSection').style.display = 'block';
        document.getElementById('status').innerText = `Sẵn sàng đồng bộ ${data.length} người.`;
    });

    function renderTable(data) {
        const tbody = document.querySelector("#previewTable tbody");
        tbody.innerHTML = "";
        data.forEach(s => {
            const url = s.photo ? URL.createObjectURL(new Blob([s.photo])) : "";
            tbody.innerHTML += `<tr><td>${s.stt}</td><td>${url ? `<img src="${url}" class="preview-img">` : '❌'}</td><td>${s.hoten}</td><td>${s.ngaysinh}</td><td>${s.gioitinh}</td><td>${s.cccd}</td><td>${s.congviec}</td><td>${s.manv}</td><td>${s.quoctich}</td><td>${s.donvi}</td><td>${s.noidung}</td></tr>`;
        });
    }

    // ĐỒNG BỘ CÓ GIÁM SÁT
    document.getElementById('btnSync').addEventListener('click', async () => {
        const mst = document.getElementById('inputMST').value.trim();
        const tenCty = document.getElementById('inputTenCty').value.trim();
        if (!mst) return alert("Nhập MST!");

        const log = document.getElementById('syncLog');
        const pBar = document.getElementById('progressBar');
        const pCont = document.getElementById('pContainer');
        const status = document.getElementById('status');
        
        pCont.style.display = 'block';
        status.innerText = "🚀 Đang bắt đầu...";
        log.innerHTML = "";

        let successCount = 0;
        for (let i = 0; i < globalDataHocVien.length; i++) {
            const s = globalDataHocVien[i];
            const percent = Math.round(((i + 1) / globalDataHocVien.length) * 100);
            
            log.innerHTML = `> Đang xử lý: ${s.hoten}...<br>` + log.innerHTML;
            status.innerText = `Đang đồng bộ: ${percent}%`;
            pBar.style.width = percent + "%";

            try {
                let driveUrl = "";
                if (s.photo) {
                    const base64 = btoa(new Uint8Array(s.photo).reduce((d, b) => d + String.fromCharCode(b), ''));
                    const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ type: "upload_student_image", mst: mst, tenCty: tenCty, cccd: s.cccd, base64: base64 }) });
                    const resJson = await res.json();
                    driveUrl = resJson.fileUrl || "";
                }
                await set(ref(db, `HocVien/${mst}/${s.cccd}`), { ...s, PhotoUrl: driveUrl, photo: null, NgayCapNhat: new Date().toISOString() });
                successCount++;
            } catch (e) {
                log.innerHTML = `<span style="color:red">> LỖI: ${s.hoten}</span><br>` + log.innerHTML;
            }
        }
        status.innerText = `✅ HOÀN TẤT: ${successCount}/${globalDataHocVien.length}`;
        pBar.style.background = "#059669";
    });
</script>
</body>
</html>
