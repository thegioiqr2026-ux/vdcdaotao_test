<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>VDC Thông tin học viên v4.7</title>
    <script src="../js/exceljs.min.js"></script>
    <script src="../js/jszip.min.js"></script>
    <script src="../js/firebase-config.js" type="module"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: #fff; overflow: hidden; }
        .sidebar-in { width: 300px; background: #f8fafc; border-right: 1px solid #e2e8f0; padding: 15px; flex-shrink: 0; }
        .main-content { flex: 1; padding: 10px; display: flex; flex-direction: column; overflow: hidden; }
        .form-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 4px; font-weight: bold; font-size: 12px; color: #64748b; }
        input { width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #cbd5e1; font-size: 13px; box-sizing: border-box; }
        .table-container { flex: 1; border: 1px solid #e2e8f0; border-radius: 4px; overflow: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 1600px; }
        th { background: #f1f5f9; position: sticky; top: 0; padding: 10px; font-size: 11px; z-index: 10; border-bottom: 2px solid #e2e8f0; }
        td { padding: 6px; border-bottom: 1px solid #f1f5f9; text-align: center; font-size: 12px; }
        .btn { width: 100%; padding: 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; color: white; margin-top: 8px; }
        .progress-bar { height: 8px; background: #e2e8f0; border-radius: 4px; margin-top: 10px; display: none; overflow: hidden; }
        #progressFill { height: 100%; width: 0%; background: #10b981; transition: width 0.2s; }
        #syncLog { font-size: 10px; color: #64748b; margin-top: 5px; max-height: 50px; overflow-y: auto; }
        .preview-img { width: 40px; height: 55px; object-fit: cover; }
    </style>
</head>
<body>
<div class="sidebar-in">
    <div class="form-group"><label>1. EXCEL:</label><input type="file" id="fileExcel"></div>
    <div class="form-group"><label>2. ZIP ẢNH:</label><input type="file" id="fileZip"></div>
    <div style="background:#f1f5f9; padding:10px; border-radius:4px;">
        <input type="text" id="inputMST" placeholder="Mã số thuế..." style="margin-bottom:8px;">
        <input type="text" id="inputTenCty" placeholder="Tên công ty...">
    </div>
    <button class="btn" style="background:#3b82f6;" id="btnPreview">🔍 XEM TRƯỚC</button>
    <div id="syncSection" style="display:none;">
        <button id="btnSync" class="btn" style="background:#10b981;">🚀 ĐỒNG BỘ HỆ THỐNG</button>
        <div class="progress-bar" id="pBar"><div id="progressFill"></div></div>
        <div id="status" style="font-size:11px; text-align:center; margin-top:5px; font-weight:bold;"></div>
        <div id="syncLog"></div>
    </div>
</div>
<div class="main-content">
    <div class="table-container"><table id="previewTable"><thead><tr><th>STT</th><th>Ảnh</th><th>Họ và Tên</th><th>Ngày sinh</th><th>Giới tính</th><th>CCCD</th><th>Chức vụ</th><th>Mã NV</th><th>Quốc tịch</th><th>NHÓM</th><th>NỘI DUNG HL</th></tr></thead><tbody></tbody></table></div>
</div>

<script type="module">
    import { db, ref, set } from '../js/firebase-config.js';
    const GAS_URL = "DÁN_URL_GAS_CỦA_BẠN_VÀO_ĐÂY"; //
    let globalDataHocVien = [];

    function superClean(s) { return s ? s.toString().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/đ/g, "d").replace(/[^a-z0-9]/g, "").trim() : ""; }

    document.getElementById('btnPreview').addEventListener('click', async () => {
        const fileEx = document.getElementById('fileExcel').files[0];
        const fileZi = document.getElementById('fileZip').files[0];
        if (!fileEx) return alert("Chọn file!");

        const workbook = new ExcelJS.Workbook();
        await workbook.xlsx.load(await fileEx.arrayBuffer());
        const sheet = workbook.worksheets[0];
        let data = [];

        const anhTuZip = {};
        if (fileZi) {
            const zipData = await JSZip.loadAsync(fileZi);
            for (let f in zipData.files) {
                if (f.match(/\.(jpg|jpeg|png)$/i)) {
                    anhTuZip[superClean(f.split('/').pop().split('.').shift())] = await zipData.files[f].async("arraybuffer");
                }
            }
        }

        const valA8 = sheet.getCell('A8').text || "";
        const isMau2 = valA8.includes("CÔNG TY") || sheet.getCell('A9').text.includes("STT");

        sheet.eachRow((row, i) => {
            const startRow = isMau2 ? 10 : 10;
            if (i >= startRow) {
                const stt = row.getCell(1).text.trim();
                const hoten = row.getCell(3).text.trim();
                if (stt && !isNaN(stt) && hoten !== "Họ và tên") {
                    data.push({
                        stt: data.length+1, hoten: hoten, manv: row.getCell(2).text.trim(),
                        congviec: row.getCell(4).text.trim(), cccd: row.getCell(5).text.trim(),
                        ngaysinh: row.getCell(6).text, gioitinh: row.getCell(7).text,
                        quoctich: row.getCell(8).text, donvi: row.getCell(9).text.trim(),
                        noidung: row.getCell(10).text.trim(), photo: anhTuZip[superClean(hoten)] || null
                    });
                }
            }
        });

        if (isMau2) document.getElementById('inputTenCty').value = valA8.split('\n')[0].trim();
        globalDataHocVien = data;
        const tbody = document.querySelector("#previewTable tbody");
        tbody.innerHTML = data.map(s => `<tr><td>${s.stt}</td><td>${s.photo ? '✅' : '❌'}</td><td>${s.hoten}</td><td>${s.ngaysinh}</td><td>${s.gioitinh}</td><td>${s.cccd}</td><td>${s.congviec}</td><td>${s.manv}</td><td>${s.quoctich}</td><td>${s.donvi}</td><td>${s.noidung}</td></tr>`).join('');
        document.getElementById('syncSection').style.display = 'block';
    });

    document.getElementById('btnSync').addEventListener('click', async () => {
        const mst = document.getElementById('inputMST').value.trim();
        const ten = document.getElementById('inputTenCty').value.trim();
        if(!mst) return alert("Nhập MST!");

        const fill = document.getElementById('progressFill');
        const log = document.getElementById('syncLog');
        document.getElementById('pBar').style.display = 'block';

        for (let i = 0; i < globalDataHocVien.length; i++) {
            const s = globalDataHocVien[i];
            const pct = Math.round(((i+1)/globalDataHocVien.length)*100);
            fill.style.width = pct + "%";
            log.innerHTML = `> Đang lưu: ${s.hoten}...<br>` + log.innerHTML;

            let driveUrl = "";
            if (s.photo) {
                const base64 = btoa(new Uint8Array(s.photo).reduce((d, b) => d + String.fromCharCode(b), ''));
                try {
                    const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ type: "upload_student_image", mst: mst, tenCty: ten, cccd: s.cccd, base64: base64 }) });
                    const resJson = await res.json();
                    driveUrl = resJson.fileUrl || "";
                } catch(e) { log.innerHTML = `<span style="color:red">! Lỗi ảnh: ${s.hoten}</span><br>` + log.innerHTML; }
            }
            await set(ref(db, `HocVien/${mst}/${s.cccd}`), { ...s, PhotoUrl: driveUrl, photo: null, NgayCapNhat: new Date().toISOString() });
        }
        document.getElementById('status').innerText = "✅ HOÀN TẤT ĐỒNG BỘ v4.7";
    });
</script>
</body>
</html>
