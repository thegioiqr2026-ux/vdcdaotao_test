<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>VDC CRM - Clear View v8.0</title>
    <script src="../js/exceljs.min.js"></script>
    <script src="../js/jszip.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Tăng độ đậm và rõ nét cho toàn bộ font */
        body { background: #f1f5f9; color: #0f172a; font-weight: 500; }
        
        .sidebar-vdc { 
            width: 360px; height: 100vh; background: white; 
            border-right: 2px solid #cbd5e1; /* Viền đậm hơn */
        }

        /* Label phải đen và rõ */
        label { 
            color: #1e293b !important; 
            font-weight: 800 !important; 
            font-size: 12px !important;
            margin-bottom: 6px;
            display: block;
        }

        /* Ô nhập liệu có viền rõ ràng */
        input[type="text"], select {
            border: 2px solid #cbd5e1 !important;
            color: #000 !important;
            font-weight: 700 !important;
            background: #fff !important;
        }
        input::placeholder { color: #94a3b8; font-weight: 400; }

        /* Vùng chọn file */
        .file-area {
            border: 2px dashed #64748b;
            background: #f8fafc;
            border-radius: 15px;
            padding: 30px 10px;
            text-align: center;
        }

        /* BẢNG DỮ LIỆU CỰC KỲ RÕ NÉT */
        .main-table {
            background: white;
            border-radius: 15px;
            border: 2px solid #cbd5e1;
            overflow: hidden;
        }
        
        table { width: 100%; border-collapse: collapse; }
        
        th { 
            background: #1e293b; /* Nền tối */
            color: #ffffff; /* Chữ trắng */
            padding: 15px;
            font-size: 13px;
            font-weight: 900;
            text-align: left;
            text-transform: uppercase;
        }

        td { 
            padding: 12px 15px; 
            border-bottom: 1px solid #cbd5e1; 
            color: #000; /* Chữ đen tuyệt đối */
            font-size: 14px; /* Tăng size chữ */
        }

        .row-vdc:nth-child(even) { background: #f8fafc; }
        .row-vdc:hover { background: #f1f5f9; }

        /* Avatar to và rõ */
        .img-hv { 
            width: 50px; height: 70px; 
            border: 2px solid #1e293b; 
            object-fit: cover;
            border-radius: 4px;
        }

        .status-ok { color: #059669; font-weight: 900; }
    </style>
</head>
<body class="flex overflow-hidden">

    <aside class="sidebar-vdc p-6 flex flex-col shadow-xl">
        <div class="mb-8 border-b-4 border-blue-600 pb-4">
            <h1 class="text-3xl font-black text-slate-900 tracking-tighter">VDC<span class="text-blue-600">.CRM</span></h1>
            <p class="text-xs font-bold text-slate-500 uppercase tracking-widest mt-1">Hệ thống nạp dữ liệu v8.0</p>
        </div>

        <div class="space-y-6 flex-1 overflow-y-auto pr-2">
            <div>
                <label>PHƯƠNG THỨC NẠP ẢNH:</label>
                <select id="templateType" class="w-full p-3 rounded-xl outline-none focus:border-blue-600">
                    <option value="excel_img">1. ẢNH TRONG FILE EXCEL</option>
                    <option value="zip_img">2. ẢNH TRONG FILE ZIP RIÊNG</option>
                </select>
            </div>

            <div class="space-y-4">
                <div class="file-area group">
                    <label class="mb-2 uppercase text-blue-700">File Excel (.xlsx)</label>
                    <input type="file" id="fileExcel" accept=".xlsx" class="text-xs font-bold">
                </div>

                <div id="zipGroup" class="hidden file-area border-emerald-600">
                    <label class="mb-2 uppercase text-emerald-700">File Ảnh (.zip)</label>
                    <input type="file" id="fileZip" accept=".zip" class="text-xs font-bold">
                </div>
            </div>

            <div class="bg-slate-100 p-4 rounded-xl border-2 border-slate-200">
                <label>MÃ SỐ THUẾ:</label>
                <input type="text" id="inputMST" class="w-full p-2 mb-3 rounded-lg" placeholder="Chờ quét file...">
                <label>TÊN CÔNG TY:</label>
                <input type="text" id="inputTenCty" class="w-full p-2 rounded-lg italic" placeholder="Chờ quét file...">
            </div>

            <button id="btnPreview" class="w-full bg-blue-700 hover:bg-blue-800 text-white font-black py-4 rounded-xl shadow-lg transition-all uppercase tracking-widest">
                🔍 Trích xuất danh sách
            </button>

            <div id="syncSection" class="hidden pt-6 border-t-2 border-slate-200 space-y-4">
                <button id="btnSync" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-black py-5 rounded-xl shadow-xl flex items-center justify-center gap-2 uppercase tracking-tighter">
                    <i class="fa-solid fa-cloud-arrow-up"></i> Đẩy lên VDC Cloud
                </button>
                <div id="statusText" class="text-center font-black text-blue-700 text-xs uppercase animate-pulse"></div>
            </div>
        </div>
    </aside>

    <main class="flex-1 p-8 flex flex-col">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-black text-slate-900 uppercase">Học viên trích xuất từ Excel</h2>
            <div class="bg-slate-900 text-white px-6 py-2 rounded-full font-black text-lg shadow-lg">
                <span id="countAll">00</span> <span class="text-xs uppercase ml-1">Người</span>
            </div>
        </div>

        <div class="main-table shadow-2xl">
            <div class="overflow-auto h-[calc(100vh-180px)]">
                <table id="hocVienTable">
                    <thead>
                        <tr>
                            <th>STT</th>
                            <th>Ảnh</th>
                            <th>Họ và Tên</th>
                            <th>Ngày sinh</th>
                            <th>CCCD / Định danh</th>
                            <th>Đơn vị / Nhóm</th>
                            <th>Trạng thái</th>
                        </tr>
                    </thead>
                    <tbody>
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <script type="module">
        import { db, ref, set } from '../js/firebase-config.js';
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxKY8mO5USmDe3DyiYPNLpt0x64l8YN_Z_4TgoEdUs1F0Nw_pnjZd1XU6V2lL_Wl_lS/exec";

        let hocVienList = [];

        // Logic lấy giá trị ô gộp và rich text chuẩn v6.2
        const getSafeVal = (sheet, addr) => {
            const cell = sheet.getCell(addr);
            const target = cell.isMerged && cell.master ? cell.master : cell;
            let val = target.value;
            if (!val) return "";
            if (typeof val === 'object') {
                if (val.richText) return val.richText.map(t => t.text).join('').trim();
                return (val.result || "").toString().trim();
            }
            return val.toString().trim();
        };

        const superClean = (s) => s ? s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/đ/g, "d").replace(/[^a-z0-9]/g, "") : "";

        document.getElementById('templateType').onchange = (e) => {
            document.getElementById('zipGroup').classList.toggle('hidden', e.target.value !== 'zip_img');
        };

        document.getElementById('btnPreview').onclick = async () => {
            const type = document.getElementById('templateType').value;
            const fileEx = document.getElementById('fileExcel').files[0];
            const fileZi = document.getElementById('fileZip').files[0];
            if (!fileEx) return alert("Chọn file Excel!");
            
            try {
                const workbook = new ExcelJS.Workbook();
                await workbook.xlsx.load(await fileEx.arrayBuffer());
                const sheet = workbook.worksheets[0];

                // Lấy thông tin chung
                document.getElementById('inputTenCty').value = getSafeVal(sheet, 'A3').replace(/Công ty[:\s]*/gi, "");
                document.getElementById('inputMST').value = getSafeVal(sheet, 'A4').replace(/Mã số thuế[:\s]*/gi, "");

                const anhExcel = {};
                sheet.getImages().forEach(img => {
                    if (img.range.tl.nativeCol >= 7) anhExcel[img.range.tl.nativeRow] = workbook.getImage(img.imageId).buffer;
                });

                let anhZip = {};
                if (type === 'zip_img' && fileZi) {
                    const zipData = await JSZip.loadAsync(fileZi);
                    for (let f in zipData.files) if (f.match(/\.(jpg|jpeg|png)$/i)) {
                        const n = f.split('/').pop().split('.').shift();
                        anhZip[superClean(n)] = await zipData.files[f].async("arraybuffer");
                    }
                }

                hocVienList = [];
                sheet.eachRow((row, i) => {
                    const stt = row.getCell(1).text.trim();
                    if (i >= 10 && stt && !isNaN(stt)) {
                        const hoten = (type === 'excel_img') ? getSafeVal(sheet, `B${i}`) : getSafeVal(sheet, `C${i}`);
                        hocVienList.push({
                            stt: hocVienList.length + 1, hoten,
                            ngaysinh: (type === 'excel_img') ? row.getCell(4).text : row.getCell(6).text,
                            cccd: (type === 'excel_img') ? getSafeVal(sheet, `G${i}`) : getSafeVal(sheet, `E${i}`),
                            donvi: (type === 'excel_img') ? (getSafeVal(sheet, 'A2') || "VDC") : getSafeVal(sheet, `I${i}`),
                            photo: anhExcel[i-1] || anhZip[superClean(hoten)] || null
                        });
                    }
                });

                renderTable();
                document.getElementById('syncSection').classList.remove('hidden');
                document.getElementById('countAll').innerText = hocVienList.length;
            } catch (e) { alert(e.message); }
        };

        function renderTable() {
            const tbody = document.querySelector("#hocVienTable tbody");
            tbody.innerHTML = hocVienList.map(h => `
                <tr class="row-vdc">
                    <td class="font-black text-slate-400 text-center">${h.stt}</td>
                    <td>${h.photo ? `<img src="${URL.createObjectURL(new Blob([h.photo]))}" class="img-hv">` : '❌'}</td>
                    <td class="font-black text-slate-900">${h.hoten}</td>
                    <td class="font-bold">${h.ngaysinh}</td>
                    <td class="font-bold text-blue-800">${h.cccd}</td>
                    <td class="font-bold uppercase text-slate-600">${h.donvi}</td>
                    <td id="stt-${h.cccd}" class="font-black italic text-slate-300">CHỜ ĐỒNG BỘ</td>
                </tr>
            `).join('');
        }

        document.getElementById('btnSync').onclick = async () => {
            const mst = document.getElementById('inputMST').value;
            const ten = document.getElementById('inputTenCty').value;
            document.getElementById('btnSync').disabled = true;

            for (let i = 0; i < hocVienList.length; i++) {
                const s = hocVienList[i];
                document.getElementById('statusText').innerText = `Sync: ${s.hoten}`;
                let url = "";
                if (s.photo) {
                    const b64 = btoa(new Uint8Array(s.photo).reduce((d,b)=>d+String.fromCharCode(b),''));
                    try {
                        const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ type:"upload", mst, tenCty:ten, cccd:s.cccd, base64:b64 }) });
                        const json = await res.json();
                        if(json.status === "success") {
                            url = json.fileUrl;
                            document.getElementById(`stt-${s.cccd}`).innerHTML = `<span class="status-ok">✅ DRIVE OK</span>`;
                        }
                    } catch(e) {}
                }
                const { photo, ...clean } = s;
                await set(ref(db, `HocVien/${mst}/${s.cccd}`), { ...clean, PhotoUrl: url, Update: new Date().toLocaleString() });
            }
            document.getElementById('statusText').innerText = "✅ XONG!";
        };
    </script>
</body>
</html>
