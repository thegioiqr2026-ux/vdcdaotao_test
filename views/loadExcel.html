<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>VDC CRM - Smart Load v9.0</title>
    <script src="../js/exceljs.min.js"></script>
    <script src="../js/jszip.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #f1f5f9; color: #000; font-weight: 700; }
        .main-panel { 
            background: white; max-width: 1250px; margin: 20px auto; padding: 25px; 
            border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); 
            display: grid; grid-template-columns: 400px 1fr; gap: 25px; border: 2px solid #e2e8f0;
        }
        .control-group { margin-bottom: 20px; padding: 20px; border-radius: 15px; border: 2px solid #cbd5e1; background: #fff; }
        label { font-weight: 900; display: block; margin-bottom: 8px; color: #1e293b; font-size: 11px; text-transform: uppercase; }
        select, input { width: 100%; padding: 12px; border: 2px solid #94a3b8; border-radius: 10px; font-weight: 800; font-size: 14px; outline: none; }
        
        /* Buttons */
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; transition: 0.3s; margin-top: 10px; font-size: 13px; text-transform: uppercase; }
        .btn-preview { background: #1e293b; color: white; }
        .btn-sync { background: #059669; color: white; font-size: 16px; margin-top: 20px; padding: 20px; box-shadow: 0 10px 20px rgba(5,150,105,0.2); }
        
        /* Table Style */
        table { width: 100%; border-collapse: separate; border-spacing: 0 5px; }
        th { background: #1e293b; color: white; padding: 15px; font-size: 11px; text-transform: uppercase; position: sticky; top: 0; z-index: 10; }
        td { padding: 12px; background: #fcfdfe; border-top: 1px solid #cbd5e1; border-bottom: 1px solid #cbd5e1; text-align: center; font-size: 14px; }
        .img-hv { width: 45px; height: 60px; object-fit: cover; border-radius: 4px; border: 2px solid #1e293b; margin: 0 auto; }

        /* Progress */
        .progress-container { width: 100%; background: #e2e8f0; height: 12px; border-radius: 10px; margin-top: 15px; overflow: hidden; display: none; border: 1px solid #cbd5e1; }
        .progress-fill { height: 100%; width: 0%; background: #059669; transition: width 0.3s; }

        .demo-img { width: 100%; border-radius: 10px; border: 1px solid #ddd; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div class="main-panel">
    <div class="controls">
        <div class="flex items-center gap-3 mb-6">
            <div class="w-10 h-10 bg-blue-600 text-white rounded-xl flex items-center justify-center shadow-lg"><i class="fa-solid fa-file-import"></i></div>
            <h1 class="text-2xl font-black text-slate-800 tracking-tighter uppercase">Nạp Dữ Liệu VDC</h1>
        </div>

        <div class="control-group">
            <label>1. Chọn kiểu File Excel:</label>
            <select id="templateType" onchange="changeTemplate()">
                <option value="excel_img">Mẫu 1: Có chèn hình sẵn</option>
                <option value="zip_img">Mẫu 2: Không hình (Kèm ZIP)</option>
            </select>
        </div>

        <div class="control-group" style="background: #f8fafc;">
            <label>2. Nạp tệp tin:</label>
            <input type="file" id="fileExcel" accept=".xlsx" class="mb-3 text-[10px]">
            <div id="zipGroup" class="hidden mt-2 pt-3 border-t-2 border-slate-100">
                <label>File ZIP hình ảnh:</label>
                <input type="file" id="fileZip" accept=".zip" class="text-[10px]">
            </div>
            <button class="btn btn-preview mt-4" id="btnPreview">🚀 TRÍCH XUẤT THÔNG TIN</button>
        </div>

        <div id="infoSection" class="hidden animate-fade-in">
            <div class="control-group" style="background: #eff6ff; border-color: #bfdbfe;">
                <label>Đơn vị huấn luyện:</label>
                <input type="text" id="inputTenCty" class="mb-3 bg-white" placeholder="Tên công ty...">
                <input type="text" id="inputMST" class="mb-3 bg-white" placeholder="Mã số thuế...">
                <input type="text" id="inputDiaChi" class="bg-white italic !text-slate-500 font-medium" placeholder="Địa chỉ...">
            </div>
            <div id="status" class="text-center font-black text-blue-700 text-[10px] uppercase italic mb-2"></div>
            <div class="progress-container mb-4" id="pContainer"><div class="progress-fill" id="pFill"></div></div>
        </div>
    </div>

    <div class="right-content">
        <div id="demoArea" class="text-center p-6 bg-slate-50 rounded-3xl border-2 border-dashed border-slate-200">
            <label class="mb-4">HÌNH ẢNH MẪU FILE EXCEL TƯƠNG ỨNG</label>
            <div id="demoContent" class="flex justify-center p-4">
                <img id="imgTemplate" src="./img/mau1_excel.png" class="demo-img" alt="Mẫu 1">
            </div>
            <p id="demoDesc" class="text-[10px] font-black text-slate-400 mt-4 uppercase">Mẫu 1: Hình ảnh học viên nằm tại cột H</p>
        </div>

        <div id="previewSection" class="hidden flex flex-col h-full animate-fade-in">
            <div class="flex justify-between items-end mb-4 px-2">
                <h3 class="text-lg font-black text-slate-800 uppercase tracking-tighter">Danh sách học viên sẵn sàng đồng bộ:</h3>
                <div class="bg-slate-900 text-white px-5 py-1 rounded-full font-black text-sm shadow-md">
                    <span id="count">00</span> HV
                </div>
            </div>
            
            <div class="overflow-auto border-2 border-slate-100 rounded-2xl shadow-inner max-h-[600px]">
                <table id="vdcTable">
                    <thead>
                        <tr>
                            <th class="w-16">STT</th>
                            <th class="w-24">Ảnh</th>
                            <th>Họ và Tên</th>
                            <th>Ngày sinh</th>
                            <th>CCCD / Định danh</th>
                            <th>Chức vụ / Nhóm</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>

            <button class="btn btn-sync shadow-2xl" id="btnSync">🚀 BẮT ĐẦU ĐỒNG BỘ LÊN VDC CLOUD</button>
        </div>
    </div>
</div>

<script type="module">
    import { db, ref, set } from '../js/firebase-config.js';
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxKY8mO5USmDe3DyiYPNLpt0x64l8YN_Z_4TgoEdUs1F0Nw_pnjZd1XU6V2lL_Wl_lS/exec";

    let globalHocVien = [];

    // 1. CHUYỂN ĐỔI HÌNH MẪU KHI CHỌN LOẠI FILE
    window.changeTemplate = function() {
        const type = document.getElementById('templateType').value;
        const img = document.getElementById('imgTemplate');
        const desc = document.getElementById('demoDesc');
        const zip = document.getElementById('zipGroup');

        if(type === 'excel_img') {
            img.src = "./img/mau1_excel.png"; // Hãy đảm bảo bạn có file này
            desc.innerText = "Mẫu 1: Hình ảnh học viên nằm trực tiếp tại cột H";
            zip.classList.add('hidden');
        } else {
            img.src = "./img/mau2_excel.png"; // Hãy đảm bảo bạn có file này
            desc.innerText = "Mẫu 2: Không hình trong Excel, phải chọn thêm file ZIP ảnh";
            zip.classList.remove('hidden');
        }
    }

    // Logic lấy dữ liệu an toàn (Bản v8.3)
    const getSafeVal = (sheet, addr) => {
        try {
            const cell = sheet.getCell(addr);
            if (!cell) return "";
            const target = (cell.isMerged && cell.master) ? cell.master : cell;
            let val = target.value;
            if (val === null || val === undefined) return "";
            if (typeof val === 'object') {
                if (val.richText) return val.richText.map(t => t.text).join('').trim();
                if (val instanceof Date) return val.toLocaleDateString('vi-VN');
                if (val.result !== undefined && val.result !== null) return val.result.toString().trim();
                return "";
            }
            return val.toString().trim();
        } catch(e) { return ""; }
    };

    const superClean = (s) => s ? s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/đ/g, "d").replace(/[^a-z0-9]/g, "") : "";

    // 2. XỬ LÝ TRÍCH XUẤT (KHI BẤM NÚT)
    document.getElementById('btnPreview').onclick = async () => {
        const fileEx = document.getElementById('fileExcel').files[0];
        const fileZi = document.getElementById('fileZip').files[0];
        const type = document.getElementById('templateType').value;
        if (!fileEx) return alert("Chọn file Excel!");
        
        try {
            const workbook = new ExcelJS.Workbook();
            await workbook.xlsx.load(await fileEx.arrayBuffer());
            const sheet = workbook.worksheets[0];

            // Tự động tách thông tin công ty
            if (type === 'excel_img') {
                document.getElementById('inputTenCty').value = getSafeVal(sheet, 'A3').replace(/Công ty[:\s]*/gi, "");
                document.getElementById('inputMST').value = getSafeVal(sheet, 'A4').replace(/Mã số thuế[:\s]*/gi, "");
            } else {
                const rawA1 = getSafeVal(sheet, 'A1');
                const lines = rawA1.split('\n');
                document.getElementById('inputTenCty').value = lines[0].trim();
                document.getElementById('inputDiaChi').value = lines[1] ? lines[1].trim() : "";
                const mstMatch = getSafeVal(sheet, 'A8').match(/[0-9]{10,}/);
                document.getElementById('inputMST').value = mstMatch ? mstMatch[0] : "";
            }

            // Bóc ảnh
            const anhExcel = {};
            sheet.getImages().forEach(img => {
                if (img.range.tl.nativeCol >= 7) anhExcel[img.range.tl.nativeRow] = workbook.getImage(img.imageId).buffer;
            });

            let anhZip = {};
            if (type === 'zip_img' && fileZi) {
                const zipData = await JSZip.loadAsync(fileZi);
                for (let f in zipData.files) if (f.match(/\.(jpg|jpeg|png)$/i)) {
                    const n = f.split('/').pop().split('.').shift();
                    anhZip[superClean(n)] = await zipData.files[f].async("arraybuffer");
                }
            }

            globalHocVien = [];
            sheet.eachRow((row, i) => {
                const sttVal = getSafeVal(sheet, `A${i}`);
                if (i >= 10 && sttVal && !isNaN(sttVal)) {
                    const hoten = (type === 'excel_img') ? getSafeVal(sheet, `B${i}`) : getSafeVal(sheet, `C${i}`);
                    if (!hoten) return;
                    globalHocVien.push({
                        stt: globalHocVien.length + 1,
                        hoten: hoten,
                        ngaysinh: (type === 'excel_img') ? getSafeVal(sheet, `D${i}`) : getSafeVal(sheet, `F${i}`),
                        cccd: (type === 'excel_img') ? getSafeVal(sheet, `G${i}`) : getSafeVal(sheet, `E${i}`),
                        donvi: (type === 'excel_img') ? (getSafeVal(sheet, 'A2') || "VDC") : getSafeVal(sheet, `I${i}`),
                        photo: anhExcel[i-1] || anhZip[superClean(hoten)] || null
                    });
                }
            });

            // GIAO DIỆN CHUYỂN ĐỔI: Ẩn demo, Hiện bảng & Info
            document.getElementById('demoArea').classList.add('hidden');
            document.getElementById('infoSection').classList.remove('hidden');
            document.getElementById('previewSection').classList.remove('hidden');
            
            renderTable();
            document.getElementById('count').innerText = globalHocVien.length;

        } catch (e) { alert("Lỗi: " + e.message); }
    };

    function renderTable() {
        const tbody = document.querySelector("#vdcTable tbody");
        tbody.innerHTML = globalHocVien.map(h => `
            <tr>
                <td class="font-black text-slate-400">${h.stt}</td>
                <td>${h.photo ? `<img src="${URL.createObjectURL(new Blob([h.photo]))}" class="img-hv">` : '❌'}</td>
                <td class="font-black text-slate-900 uppercase text-left pl-6">${h.hoten}</td>
                <td class="font-bold">${h.ngaysinh}</td>
                <td class="text-blue-700 font-black">${h.cccd}</td>
                <td class="text-[10px] font-black uppercase text-slate-400">${h.donvi}</td>
            </tr>
        `).join('');
    }

    // 3. ĐỒNG BỘ CLOUD (FIREBASE & DRIVE)
    document.getElementById('btnSync').onclick = async () => {
        const mst = document.getElementById('inputMST').value;
        const ten = document.getElementById('inputTenCty').value;
        const pFill = document.getElementById('pFill');
        const pContainer = document.getElementById('pContainer');
        const status = document.getElementById('status');

        if(!mst) return alert("Vui lòng xác nhận MST!");
        document.getElementById('btnSync').disabled = true;
        pContainer.style.display = 'block';

        for (let i = 0; i < globalHocVien.length; i++) {
            const h = globalHocVien[i];
            const pct = Math.round(((i + 1) / globalHocVien.length) * 100);
            pFill.style.width = pct + "%";
            status.innerText = `Đang tải: ${h.hoten} (${pct}%)`;

            let url = "";
            if (h.photo) {
                const b64 = btoa(new Uint8Array(h.photo).reduce((d,b)=>d+String.fromCharCode(b),''));
                try {
                    const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ type:"upload", mst, tenCty:ten, cccd:h.cccd, base64:b64 }) });
                    const json = await res.json();
                    if(json.status === "success") url = json.fileUrl;
                } catch(e) {}
            }
            const { photo, ...clean } = h;
            await set(ref(db, `HocVien/${mst}/${h.cccd}`), { ...clean, PhotoUrl: url, NgayUpdate: new Date().toLocaleString() });
        }
        status.innerText = "✅ ĐỒNG BỘ HOÀN TẤT!";
        alert("Dữ liệu VDC đã được Cloud hóa thành công!");
    };
</script>
</body>
</html>
