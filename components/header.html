<!-- Phiên bản: 1.9 -->
<header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-4 sm:px-6">
    
    <!-- Ô tìm kiếm -->
    <div class="flex items-center bg-gray-100 rounded-lg px-3 py-2 w-64 focus-within:ring-2 focus-within:ring-blue-500 focus-within:bg-white transition-all border border-transparent focus-within:border-blue-200 shadow-sm">
        <i class="fa-solid fa-magnifying-glass text-gray-400 mr-2"></i>
        <input type="text" placeholder="Tìm MST, tên công ty..." class="bg-transparent border-none outline-none text-sm w-full text-gray-700 placeholder-gray-400">
    </div>

    <!-- Khu vực Người dùng & Thông báo -->
    <div class="flex items-center gap-4 sm:gap-6">
        <!-- Chuông thông báo -->
        <button class="relative text-gray-400 hover:text-blue-600 transition-colors">
            <i class="fa-regular fa-bell text-xl"></i>
            <span class="absolute -top-1 -right-1 flex h-4 w-4">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-4 w-4 bg-red-500 text-[10px] text-white justify-center items-center font-bold shadow-sm">!</span>
            </span>
        </button>

        <!-- Thông tin Tài khoản -->
        <div class="flex items-center gap-4 border-l border-gray-200 pl-4 sm:pl-6">
            <div class="text-right hidden sm:block">
                <p class="text-sm font-bold text-gray-700" id="userEmailDisplay">Đang tải...</p>
                <p class="text-xs text-green-600 font-medium"><i class="fa-solid fa-circle text-[8px] mr-1"></i>Đang trực tuyến</p>
            </div>
            
            <!-- Nút Đăng xuất -->
            <button id="btnLogout" class="bg-red-50 border border-red-100 text-red-600 hover:bg-red-600 hover:text-white px-3 py-1.5 rounded-lg text-sm font-bold transition-all shadow-sm flex items-center gap-2 group">
                <i class="fa-solid fa-right-from-bracket group-hover:translate-x-1 transition-transform"></i> <span class="hidden sm:inline">Thoát</span>
            </button>
        </div>
    </div>
</header>
