<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>VDC CRM - Final Stable v8.8</title>
    <script src="../js/exceljs.min.js"></script>
    <script src="../js/jszip.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* TĂNG ĐỘ RÕ NÉT VÀ TƯƠNG PHẢN CAO */
        body { background: #f1f5f9; color: #000; font-weight: 700; font-size: 14px; margin: 0; }
        .sidebar-vdc { width: 360px; height: 100vh; background: #fff; border-right: 3px solid #1e293b; flex-shrink: 0; }
        label { color: #1e293b !important; font-weight: 900 !important; font-size: 11px !important; text-transform: uppercase; margin-bottom: 5px; display: block; }
        input[type="text"], select { border: 2.5px solid #1e293b !important; color: #000 !important; font-weight: 800 !important; padding: 12px !important; border-radius: 12px !important; width: 100%; margin-bottom: 12px; background: #fff; }
        
        .main-vdc { flex: 1; padding: 30px; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .table-wrapper { background: #fff; border: 2px solid #1e293b; border-radius: 24px; overflow: hidden; flex: 1; display: flex; flex-direction: column; }
        .scroll-area { flex: 1; overflow: auto; padding: 0 20px 20px 20px; }
        
        table { width: 100%; border-collapse: separate; border-spacing: 0 6px; min-width: 1200px; }
        th { position: sticky; top: 0; background: #1e293b; color: #fff; padding: 18px 15px; font-size: 12px; font-weight: 900; text-transform: uppercase; z-index: 20; text-align: left; }
        .row-hv td { padding: 12px 15px; background: #fff; border-top: 1px solid #cbd5e1; border-bottom: 1px solid #cbd5e1; color: #000; font-weight: 800; }
        .row-hv td:first-child { border-radius: 12px 0 0 12px; text-align: center; border-left: 1px solid #cbd5e1; color: #94a3b8; }
        .row-hv td:last-child { border-radius: 0 12px 12px 0; text-align: right; border-right: 1px solid #cbd5e1; }
        
        .img-hv { width: 48px; height: 65px; border-radius: 6px; object-fit: cover; border: 2.5px solid #1e293b; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-vdc { width: 100%; padding: 16px; border-radius: 15px; font-weight: 900; text-transform: uppercase; cursor: pointer; border: none; transition: 0.2s; letter-spacing: 1px; }
        .btn-preview { background: #1e293b; color: #fff; box-shadow: 0 6px 15px rgba(30,41,59,0.3); }
        .btn-sync { background: #059669; color: #fff; margin-top: 15px; box-shadow: 0 6px 15px rgba(5,150,105,0.3); }
        .btn-vdc:active { transform: scale(0.97); }
    </style>
</head>
<body class="flex">

    <aside class="sidebar-vdc p-6 flex flex-col shadow-2xl">
        <div class="mb-10 border-b-4 border-blue-600 pb-4">
            <h1 class="text-3xl font-black text-slate-900 tracking-tighter italic uppercase leading-none">VDC<span class="text-blue-600">.CRM</span></h1>
            <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mt-2">Dữ liệu huấn luyện v8.8</p>
        </div>

        <div class="space-y-4 flex-1 overflow-y-auto pr-2">
            <div>
                <label>LOẠI MẪU EXCEL:</label>
                <select id="templateType">
                    <option value="excel_img" selected>1. Mẫu TTHV (Ảnh trong Excel)</option>
                    <option value="zip_img">2. Mẫu Long Phương (Ảnh ZIP)</option>
                </select>
            </div>

            <div class="bg-slate-50 p-4 rounded-xl border-2 border-slate-200">
                <label>CHỌN FILE EXCEL:</label>
                <input type="file" id="fileExcel" accept=".xlsx" class="text-xs font-bold">
                <div id="zipGroup" class="hidden mt-4 border-t-2 pt-4 border-slate-200">
                    <label>CHỌN FILE ZIP HÌNH ẢNH:</label>
                    <input type="file" id="fileZip" accept=".zip" class="text-xs font-bold">
                </div>
            </div>

            <div class="bg-blue-50 p-4 rounded-xl border-2 border-blue-200">
                <label>MÃ SỐ THUẾ:</label>
                <input type="text" id="inputMST" placeholder="Chờ quét file...">
                <label>TÊN CÔNG TY:</label>
                <input type="text" id="inputTenCty" placeholder="Chờ quét file...">
                <label>ĐỊA CHỈ:</label>
                <input type="text" id="inputDiaChi" class="italic !text-slate-500 font-medium" placeholder="Chờ quét file...">
            </div>

            <button id="btnPreview" class="btn-vdc btn-preview hover:bg-black">🔍 TRÍCH XUẤT HỌC VIÊN</button>
            <div id="syncSection" class="hidden"><button id="btnSync" class="btn-vdc btn-sync hover:bg-emerald-700">🚀 ĐẨY LÊN VDC CLOUD</button></div>
            <div id="status" class="mt-4 text-center font-black text-blue-700 text-[11px] uppercase animate-pulse"></div>
        </div>
    </aside>

    <main class="main-vdc">
        <div class="flex justify-between items-end mb-8 px-4">
            <div>
                <h2 class="text-2xl font-black text-slate-900 uppercase leading-none tracking-tight">Danh sách học viên</h2>
                <p class="text-[11px] text-slate-500 font-bold italic mt-2 tracking-wide uppercase">Công nghệ tách dữ liệu đa tầng VDC v8.8</p>
            </div>
            <div class="bg-slate-900 text-white px-8 py-3 rounded-2xl font-black text-xl shadow-lg border-b-4 border-blue-600">
                <span id="count">00</span> <span class="text-[10px] uppercase ml-1">Người</span>
            </div>
        </div>

        <div class="table-wrapper">
            <div class="scroll-area">
                <table id="vdcTable">
                    <thead>
                        <tr>
                            <th class="w-16 text-center">STT</th>
                            <th class="w-24 text-center">Ảnh</th>
                            <th>Họ và Tên</th>
                            <th>Ngày sinh</th>
                            <th>CCCD / Định danh</th>
                            <th>Chức vụ / Nhóm</th>
                            <th>Đơn vị bộ phận</th>
                            <th class="text-right">Trạng thái</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </main>

<script type="module">
    import { db, ref, set } from '../js/firebase-config.js';
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxKY8mO5USmDe3DyiYPNLpt0x64l8YN_Z_4TgoEdUs1F0Nw_pnjZd1XU6V2lL_Wl_lS/exec";

    let globalHocVien = [];

    // HÀM LẤY GIÁ TRỊ TUYỆT ĐỐI AN TOÀN (FIX LỖI TOSTRING)
    const getSafeVal = (sheet, addr) => {
        try {
            const cell = sheet.getCell(addr);
            if (!cell) return "";
            const target = (cell.isMerged && cell.master) ? cell.master : cell;
            let val = target.value;
            if (val === null || val === undefined) return "";
            if (typeof val === 'object') {
                if (val.richText) return val.richText.map(t => t.text).join('').trim();
                if (val instanceof Date) return val.toLocaleDateString('vi-VN');
                if (val.result !== undefined && val.result !== null) return val.result.toString().trim();
                return "";
            }
            return val.toString().trim();
        } catch(e) { return ""; }
    };

    const superClean = (s) => s ? s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/đ/g, "d").replace(/[^a-z0-9]/g, "") : "";

    document.getElementById('templateType').onchange = (e) => {
        document.getElementById('zipGroup').classList.toggle('hidden', e.target.value !== 'zip_img');
    };

    document.getElementById('btnPreview').onclick = async () => {
        const type = document.getElementById('templateType').value;
        const fileEx = document.getElementById('fileExcel').files[0];
        const fileZi = document.getElementById('fileZip').files[0];
        if (!fileEx) return alert("Vui lòng chọn file Excel!");
        
        try {
            document.getElementById('btnPreview').innerText = "⏳ ĐANG QUÉT DỮ LIỆU...";
            const workbook = new ExcelJS.Workbook();
            await workbook.xlsx.load(await fileEx.arrayBuffer());
            const sheet = workbook.worksheets[0];

            // 1. TRÍCH XUẤT THÔNG TIN CÔNG TY (FIX MẪU 2 TÁCH DÒNG Ô A1)
            if (type === 'excel_img') {
                document.getElementById('inputTenCty').value = getSafeVal(sheet, 'A3').replace(/Công ty[:\s]*/gi, "").trim();
                document.getElementById('inputMST').value = getSafeVal(sheet, 'A4').replace(/Mã số thuế[:\s]*/gi, "").trim();
            } else {
                const rawA1 = getSafeVal(sheet, 'A1');
                if (rawA1.includes('\n')) {
                    const lines = rawA1.split('\n');
                    document.getElementById('inputTenCty').value = lines[0].trim();
                    document.getElementById('inputDiaChi').value = lines[1].trim();
                } else {
                    document.getElementById('inputTenCty').value = rawA1.trim();
                }
                const rawA8 = getSafeVal(sheet, 'A8');
                const mstMatch = rawA8.match(/[0-9]{10,}/);
                if (mstMatch) document.getElementById('inputMST').value = mstMatch[0];
            }

            // 2. BÓC ẢNH EXCEL
            const anhExcel = {};
            sheet.getImages().forEach(img => {
                const row = img.range.tl.nativeRow;
                if (img.range.tl.nativeCol >= 7) anhExcel[row] = workbook.getImage(img.imageId).buffer;
            });

            // 3. BÓC ẢNH ZIP (MẪU 2)
            let anhZip = {};
            if (type === 'zip_img' && fileZi) {
                const zipData = await JSZip.loadAsync(fileZi);
                for (let f in zipData.files) if (f.match(/\.(jpg|jpeg|png)$/i)) {
                    const n = f.split('/').pop().split('.').shift();
                    anhZip[superClean(n)] = await zipData.files[f].async("arraybuffer");
                }
            }

            // 4. DUYỆT DANH SÁCH HỌC VIÊN
            globalHocVien = [];
            sheet.eachRow((row, i) => {
                const sttVal = getSafeVal(sheet, `A${i}`);
                if (i >= 10 && sttVal && !isNaN(sttVal)) {
                    const hoten = (type === 'excel_img') ? getSafeVal(sheet, `B${i}`) : getSafeVal(sheet, `C${i}`);
                    if (!hoten) return;

                    globalHocVien.push({
                        stt: globalHocVien.length + 1,
                        hoten: hoten,
                        ngaysinh: (type === 'excel_img') ? getSafeVal(sheet, `D${i}`) : getSafeVal(sheet, `F${i}`),
                        cccd: (type === 'excel_img') ? getSafeVal(sheet, `G${i}`) : getSafeVal(sheet, `E${i}`),
                        congviec: (type === 'excel_img') ? getSafeVal(sheet, `F${i}`) : getSafeVal(sheet, `D${i}`),
                        donvi: (type === 'excel_img') ? (getSafeVal(sheet, 'A2') || "VDC") : getSafeVal(sheet, `I${i}`),
                        tenCty: document.getElementById('inputTenCty').value,
                        photo: anhExcel[i-1] || anhZip[superClean(hoten)] || null
                    });
                }
            });

            // 5. HIỂN THỊ LÊN BẢNG CỰC NÉT
            const tbody = document.querySelector("#vdcTable tbody");
            tbody.innerHTML = globalHocVien.map(h => `
                <tr class="row-hv">
                    <td class="font-black text-slate-400">${h.stt}</td>
                    <td>${h.photo ? `<img src="${URL.createObjectURL(new Blob([h.photo]))}" class="img-hv">` : '<span class="text-red-600 font-black">❌ KHÔNG ẢNH</span>'}</td>
                    <td class="font-black text-slate-900 uppercase">${h.hoten}</td>
                    <td class="font-black text-slate-700">${h.ngaysinh}</td>
                    <td class="text-blue-800 font-black">${h.cccd}</td>
                    <td class="text-slate-600 italic font-bold text-[11px]">${h.congviec}</td>
                    <td class="text-slate-500 font-black uppercase text-[10px]">${h.donvi}</td>
                    <td id="stt-${h.cccd}" class="font-black italic text-slate-300 text-[10px] uppercase">Chờ Cloud</td>
                </tr>
            `).join('');

            document.getElementById('syncSection').classList.remove('hidden');
            document.getElementById('count').innerText = globalHocVien.length;
            document.getElementById('btnPreview').innerText = "🔍 QUÉT LẠI LẦN NỮA";

        } catch (e) {
            console.error(e);
            alert("Lỗi trích xuất: " + e.message);
        }
    };

    // ĐỒNG BỘ CLOUD VDC (GIỮ NGUYÊN TỐC ĐỘ CAO)
    document.getElementById('btnSync').onclick = async () => {
        const mst = document.getElementById('inputMST').value;
        const ten = document.getElementById('inputTenCty').value;
        if(!mst) return alert("Nhập MST để đồng bộ!");
        document.getElementById('btnSync').disabled = true;

        for (let i = 0; i < globalHocVien.length; i++) {
            const h = globalHocVien[i];
            document.getElementById('status').innerText = `Sync: ${h.hoten}`;
            let url = "";
            if (h.photo) {
                const b64 = btoa(new Uint8Array(h.photo).reduce((d,b)=>d+String.fromCharCode(b),''));
                try {
                    const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ type:"upload", mst, tenCty:ten, cccd:h.cccd, base64:b64 }) });
                    const json = await res.json();
                    if(json.status === "success") {
                        url = json.fileUrl;
                        document.getElementById(`stt-${h.cccd}`).innerHTML = `<span class="text-emerald-600 font-black uppercase">✅ DRIVE OK</span>`;
                    }
                } catch(e) {}
            }
            const { photo, ...cleanData } = h;
            await set(ref(db, `HocVien/${mst}/${h.cccd}`), { ...cleanData, PhotoUrl: url, NgayUpdate: new Date().toLocaleString() });
        }
        document.getElementById('status').innerText = "✅ HOÀN TẤT ĐỒNG BỘ VDC!";
        alert("Thành công rực rỡ! Toàn bộ dữ liệu đã được đẩy lên Cloud.");
    };
</script>
</body>
</html>
