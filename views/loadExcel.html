<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>VDC CRM - Smart Sync v8.9</title>
    <script src="../js/exceljs.min.js"></script>
    <script src="../js/jszip.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ĐỒNG BỘ MÀU SẮC VÀ FONT VỚI PRINTDOC */
        body { background: #f1f5f9; color: #000; font-weight: 700; font-size: 14px; margin: 0; }
        
        /* Layout Grid giống PrintDoc */
        .main-panel { 
            background: white; max-width: 1400px; margin: 20px auto; padding: 25px; 
            border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); 
            display: grid; grid-template-columns: 380px 1fr; gap: 25px; 
            border: 2px solid #e2e8f0; height: calc(100vh - 40px);
        }

        .controls { border-right: 2px solid #f1f5f9; padding-right: 10px; overflow-y: auto; }
        .control-group { margin-bottom: 20px; padding: 20px; border-radius: 15px; border: 2px solid #cbd5e1; background: #fff; }
        
        label { font-weight: 900; display: block; margin-bottom: 8px; color: #1e293b; font-size: 11px; text-transform: uppercase; }
        select, input { width: 100%; padding: 12px; border: 2px solid #94a3b8; border-radius: 10px; font-weight: 800; font-size: 13px; outline: none; transition: 0.3s; }
        select:focus, input:focus { border-color: #2563eb; background: #f8faff; }

        /* Button Style đồng bộ */
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; transition: 0.3s; margin-top: 10px; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; }
        .btn-preview { background: #1e293b; color: white; }
        .btn-sync { background: #059669; color: white; box-shadow: 0 4px 15px rgba(5,150,105,0.3); }
        .btn:active { transform: scale(0.97); }

        /* Bảng hiển thị rộng rãi */
        .table-wrapper { background: #fff; border: 2px solid #cbd5e1; border-radius: 20px; overflow: hidden; display: flex; flex-direction: column; height: 100%; }
        .scroll-area { flex: 1; overflow: auto; padding: 0 15px 15px 15px; }
        
        table { width: 100%; border-collapse: separate; border-spacing: 0 5px; }
        th { background: #1e293b; color: white; padding: 15px; font-size: 11px; text-transform: uppercase; position: sticky; top: 0; z-index: 20; }
        td { padding: 12px; background: #fcfdfe; border-top: 1px solid #f1f5f9; border-bottom: 1px solid #f1f5f9; text-align: center; color: #000; font-size: 13px; }

        /* Progress Bar giống PrintDoc */
        .progress-container { width: 100%; background: #e2e8f0; height: 12px; border-radius: 10px; margin-top: 15px; overflow: hidden; display: none; border: 1px solid #cbd5e1; }
        .progress-fill { height: 100%; width: 0%; background: #059669; transition: width 0.3s; }

        .img-hv { width: 45px; height: 60px; border-radius: 6px; object-fit: cover; border: 2px solid #1e293b; margin: 0 auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="main-panel">
    <div class="controls pr-4">
        <div class="flex items-center gap-3 mb-6">
            <div class="w-10 h-10 bg-blue-600 text-white rounded-xl flex items-center justify-center shadow-lg"><i class="fa-solid fa-file-import"></i></div>
            <h1 class="text-2xl font-black text-slate-800 tracking-tighter uppercase">Nạp Dữ Liệu <span class="text-blue-600">VDC</span></h1>
        </div>

        <div class="control-group">
            <label>1. Loại mẫu Excel:</label>
            <select id="templateType">
                <option value="excel_img" selected>Mẫu TTHV (Ảnh trong Excel)</option>
                <option value="zip_img">Mẫu Long Phương (Ảnh ZIP)</option>
            </select>
        </div>

        <div class="control-group" style="background: #f8fafc;">
            <label><i class="fa-solid fa-file-excel mr-2 text-green-600"></i>Chọn tệp dữ liệu</label>
            <input type="file" id="fileExcel" accept=".xlsx" class="mb-3 text-[10px]">
            <div id="zipGroup" class="hidden mt-2 border-t pt-3">
                <label><i class="fa-solid fa-file-zipper mr-2 text-amber-500"></i>Chọn file ZIP ảnh</label>
                <input type="file" id="fileZip" accept=".zip" class="text-[10px]">
            </div>
            <button class="btn btn-preview mt-4" id="btnPreview">🔍 TRÍCH XUẤT HỌC VIÊN</button>
        </div>

        <div class="control-group" style="background: #eff6ff; border-color: #dbeafe;">
            <label>Thông tin định danh trích xuất:</label>
            <input type="text" id="inputMST" placeholder="Mã số thuế..." class="mb-3">
            <input type="text" id="inputTenCty" placeholder="Tên đơn vị..." class="mb-3">
            <input type="text" id="inputDiaChi" placeholder="Địa chỉ..." class="italic !text-slate-500 !font-medium">
        </div>

        <div id="syncSection" class="hidden">
            <button class="btn btn-sync" id="btnSync">🚀 ĐẨY LÊN VDC CLOUD (FIREBASE)</button>
            <div class="progress-container" id="pContainer"><div class="progress-fill" id="pFill"></div></div>
            <div id="status" class="text-center font-black text-blue-700 text-[10px] mt-2 uppercase italic"></div>
        </div>
    </div>

    <div class="flex flex-col overflow-hidden">
        <div class="flex justify-between items-end mb-4">
            <div>
                <h2 class="text-xl font-black text-slate-800 uppercase tracking-tighter">Bản xem trước dữ liệu</h2>
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Kiểm tra thông tin & ảnh trước khi đồng bộ</p>
            </div>
            <div class="bg-slate-900 text-white px-5 py-2 rounded-xl font-black text-lg shadow-lg">
                <span id="count">00</span> <span class="text-[10px] uppercase ml-1">Người</span>
            </div>
        </div>

        <div class="table-wrapper">
            <div class="scroll-area">
                <table id="vdcTable">
                    <thead>
                        <tr>
                            <th class="w-16">STT</th>
                            <th class="w-24">Ảnh</th>
                            <th>Họ và Tên</th>
                            <th>Ngày sinh</th>
                            <th>CCCD</th>
                            <th>Đơn vị / Nhóm</th>
                            <th class="text-right">Trạng thái</th>
                        </tr>
                    </thead>
                    <tbody>
                        </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { db, ref, set } from '../js/firebase-config.js';
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxKY8mO5USmDe3DyiYPNLpt0x64l8YN_Z_4TgoEdUs1F0Nw_pnjZd1XU6V2lL_Wl_lS/exec";

    let globalHocVien = [];

    const getSafeVal = (sheet, addr) => {
        try {
            const cell = sheet.getCell(addr);
            if (!cell) return "";
            const target = (cell.isMerged && cell.master) ? cell.master : cell;
            let val = target.value;
            if (val === null || val === undefined) return "";
            if (typeof val === 'object') {
                if (val.richText) return val.richText.map(t => t.text).join('').trim();
                if (val instanceof Date) return val.toLocaleDateString('vi-VN');
                if (val.result !== undefined && val.result !== null) return val.result.toString().trim();
                return "";
            }
            return val.toString().trim();
        } catch(e) { return ""; }
    };

    const superClean = (s) => s ? s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/đ/g, "d").replace(/[^a-z0-9]/g, "") : "";

    document.getElementById('templateType').onchange = (e) => {
        document.getElementById('zipGroup').classList.toggle('hidden', e.target.value !== 'zip_img');
    };

    document.getElementById('btnPreview').onclick = async () => {
        const type = document.getElementById('templateType').value;
        const fileEx = document.getElementById('fileExcel').files[0];
        const fileZi = document.getElementById('fileZip').files[0];
        if (!fileEx) return alert("Chọn file Excel!");
        
        try {
            document.getElementById('btnPreview').innerText = "⏳ ĐANG QUÉT...";
            const workbook = new ExcelJS.Workbook();
            await workbook.xlsx.load(await fileEx.arrayBuffer());
            const sheet = workbook.worksheets[0];

            if (type === 'excel_img') {
                document.getElementById('inputTenCty').value = getSafeVal(sheet, 'A3').replace(/Công ty[:\s]*/gi, "").trim();
                document.getElementById('inputMST').value = getSafeVal(sheet, 'A4').replace(/Mã số thuế[:\s]*/gi, "").trim();
            } else {
                const rawA1 = getSafeVal(sheet, 'A1');
                if (rawA1.includes('\n')) {
                    const lines = rawA1.split('\n');
                    document.getElementById('inputTenCty').value = lines[0].trim();
                    document.getElementById('inputDiaChi').value = lines[1].trim();
                } else {
                    document.getElementById('inputTenCty').value = rawA1.trim();
                }
                const rawA8 = getSafeVal(sheet, 'A8');
                const mstMatch = rawA8.match(/[0-9]{10,}/);
                if (mstMatch) document.getElementById('inputMST').value = mstMatch[0];
            }

            const anhExcel = {};
            sheet.getImages().forEach(img => {
                if (img.range.tl.nativeCol >= 7) anhExcel[img.range.tl.nativeRow] = workbook.getImage(img.imageId).buffer;
            });

            let anhZip = {};
            if (type === 'zip_img' && fileZi) {
                const zipData = await JSZip.loadAsync(fileZi);
                for (let f in zipData.files) if (f.match(/\.(jpg|jpeg|png)$/i)) {
                    const n = f.split('/').pop().split('.').shift();
                    anhZip[superClean(n)] = await zipData.files[f].async("arraybuffer");
                }
            }

            globalHocVien = [];
            sheet.eachRow((row, i) => {
                const sttVal = getSafeVal(sheet, `A${i}`);
                if (i >= 10 && sttVal && !isNaN(sttVal)) {
                    const hoten = (type === 'excel_img') ? getSafeVal(sheet, `B${i}`) : getSafeVal(sheet, `C${i}`);
                    if (!hoten) return;
                    globalHocVien.push({
                        stt: globalHocVien.length + 1,
                        hoten: hoten,
                        ngaysinh: (type === 'excel_img') ? getSafeVal(sheet, `D${i}`) : getSafeVal(sheet, `F${i}`),
                        cccd: (type === 'excel_img') ? getSafeVal(sheet, `G${i}`) : getSafeVal(sheet, `E${i}`),
                        congviec: (type === 'excel_img') ? getSafeVal(sheet, `F${i}`) : getSafeVal(sheet, `D${i}`),
                        donvi: (type === 'excel_img') ? (getSafeVal(sheet, 'A2') || "VDC") : getSafeVal(sheet, `I${i}`),
                        tenCty: document.getElementById('inputTenCty').value,
                        photo: anhExcel[i-1] || anhZip[superClean(hoten)] || null
                    });
                }
            });

            const tbody = document.querySelector("#vdcTable tbody");
            tbody.innerHTML = globalHocVien.map(h => `
                <tr>
                    <td class="font-black text-slate-400">${h.stt}</td>
                    <td>${h.photo ? `<img src="${URL.createObjectURL(new Blob([h.photo]))}" class="img-hv">` : '<span class="text-red-500">❌</span>'}</td>
                    <td class="font-black text-slate-900 uppercase">${h.hoten}</td>
                    <td class="font-bold">${h.ngaysinh}</td>
                    <td class="text-blue-700 font-black">${h.cccd}</td>
                    <td class="text-[10px] font-black uppercase text-slate-400">${h.donvi}</td>
                    <td id="stt-${h.cccd}" class="font-black italic text-slate-300 text-[10px]">CHỜ SYNC</td>
                </tr>
            `).join('');

            document.getElementById('syncSection').classList.remove('hidden');
            document.getElementById('count').innerText = globalHocVien.length;
            document.getElementById('btnPreview').innerText = "🔍 QUÉT LẠI";
        } catch (e) { alert("Lỗi: " + e.message); }
    };

    document.getElementById('btnSync').onclick = async () => {
        const mst = document.getElementById('inputMST').value;
        const ten = document.getElementById('inputTenCty').value;
        const pFill = document.getElementById('pFill');
        const pContainer = document.getElementById('pContainer');
        const status = document.getElementById('status');

        if(!mst) return alert("Nhập MST!");
        document.getElementById('btnSync').disabled = true;
        pContainer.style.display = 'block';

        for (let i = 0; i < globalHocVien.length; i++) {
            const h = globalHocVien[i];
            const pct = Math.round(((i + 1) / globalHocVien.length) * 100);
            pFill.style.width = pct + "%";
            status.innerText = `Sync: ${h.hoten}`;

            let url = "";
            if (h.photo) {
                const b64 = btoa(new Uint8Array(h.photo).reduce((d,b)=>d+String.fromCharCode(b),''));
                try {
                    const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ type:"upload", mst, tenCty:ten, cccd:h.cccd, base64:b64 }) });
                    const json = await res.json();
                    if(json.status === "success") {
                        url = json.fileUrl;
                        document.getElementById(`stt-${h.cccd}`).innerHTML = `<span class="text-emerald-600 font-black">✅ DRIVE OK</span>`;
                    }
                } catch(e) {}
            }
            const { photo, ...clean } = h;
            await set(ref(db, `HocVien/${mst}/${h.cccd}`), { ...clean, PhotoUrl: url, NgayUpdate: new Date().toLocaleString() });
        }
        status.innerText = "✅ ĐỒNG BỘ HOÀN TẤT!";
    };
</script>
</body>
</html>
