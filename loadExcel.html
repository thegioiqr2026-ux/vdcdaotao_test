<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>VDC Data Center v2.7 - Full Schema</title>
    <script src="./js/exceljs.min.js"></script>
    <script src="./js/jszip.min.js"></script>
    <script src="./js/firebase-config.js" type="module"></script>
    <style>
        /* Giữ nguyên CSS của bản v2.6 và điều chỉnh bảng rộng hơn */
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: #f4f7f6; }
        .sidebar { width: 320px; background: #2c3e50; color: white; padding: 20px; overflow-y: auto; }
        .main-content { flex: 1; padding: 20px; display: flex; flex-direction: column; overflow: hidden; }
        .table-container { flex: 1; background: white; border-radius: 8px; overflow: auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; min-width: 1200px; }
        th { background: #34495e; color: white; position: sticky; top: 0; padding: 10px; font-size: 12px; }
        td { padding: 8px; border-bottom: 1px solid #eee; text-align: center; font-size: 12px; }
        .preview-img { width: 45px; height: 60px; object-fit: cover; border: 1px solid #ddd; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; color: white; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="color:#3498db; text-align:center;">VDC CRM</h2>
    <div style="margin-bottom:15px;"><label>1. EXCEL:</label><input type="file" id="fileExcel" accept=".xlsx"></div>
    <div style="margin-bottom:15px;"><label>2. ZIP ẢNH:</label><input type="file" id="fileZip" accept=".zip"></div>
    <div style="background:#1a252f; padding:10px; border-radius:5px;">
        <label style="color:#f1c40f;">THÔNG TIN ĐƠN VỊ:</label>
        <input type="text" id="inputMST" placeholder="Mã số thuế..." style="margin-bottom:8px; width:100%;">
        <input type="text" id="inputTenCty" placeholder="Tên công ty..." style="width:100%;">
    </div>
    <button class="btn" style="background:#3498db;" onclick="docDuLieuPreview()">🔍 XEM TRƯỚC</button>
    <button id="btnSync" class="btn" style="background:#27ae60; display:none;" onclick="xuatDuLieuLenHethong()">🚀 ĐỒNG BỘ CLOUD</button>
    <div id="status" style="margin-top:10px; font-size:12px; text-align:center;"></div>
</div>

<div class="main-content">
    <div class="table-container">
        <table id="previewTable">
            <thead>
                <tr>
                    <th>STT</th><th>Ảnh</th><th>Họ và Tên</th><th>Ngày sinh</th><th>Giới tính</th>
                    <th>CCCD</th><th>Mã NV</th><th>Quốc tịch</th><th>Nhóm/Đơn vị</th><th>Nội dung HL</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script type="module">
    import { db, ref, set } from './js/firebase-config.js';
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxRNpGczbDYLXpJliEOHhcubc41qm-x7DW47MsVz1W6Ne3BJTMWYs98ciWE5SkY2MWY/exec";
    let globalDataHocVien = [];

    function cleanStr(s) { return s ? s.toString().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/đ/g, "d").replace(/\s+/g, "") : ""; }

    window.docDuLieuPreview = async function() {
        const fileEx = document.getElementById('fileExcel').files[0];
        const fileZi = document.getElementById('fileZip').files[0];
        if (!fileEx) return alert("Chưa chọn file!");

        const workbook = new ExcelJS.Workbook();
        await workbook.xlsx.load(await fileEx.arrayBuffer());
        const sheet = workbook.worksheets[0];
        let data = [];

        // Đọc ZIP
        const anhTuZip = {};
        if (fileZi) {
            const zipData = await JSZip.loadAsync(fileZi);
            for (let f in zipData.files) {
                if (f.match(/\.(jpg|jpeg|png)$/i)) {
                    anhTuZip[cleanStr(f.split('/').pop().split('.').shift())] = await zipData.files[f].async("arraybuffer");
                }
            }
        }

        const valA1 = sheet.getCell('A1').text || "";
        const valA3 = sheet.getCell('A3').text || "";

        if (valA1 && !valA3.includes("Công ty:")) {
            // MẪU LONG PHƯƠNG
            const lines = valA1.split('\n');
            document.getElementById('inputTenCty').value = lines[0].replace(/Công ty[:\s]*/gi, "").trim();
            const noiDungHL = sheet.getCell('A2').text.trim(); // Lấy từ dòng 2

            sheet.eachRow((row, i) => {
                if (i >= 3) {
                    const ten = row.getCell(3).text.trim();
                    if (ten && ten !== "Họ và tên") {
                        data.push({
                            stt: data.length+1, hoten: ten, ngaysinh: row.getCell(5).text, gioitinh: row.getCell(6).text,
                            cccd: row.getCell(4).text, manv: row.getCell(8).text, quoctich: row.getCell(7).text,
                            donvi: row.getCell(9).text, noidung: noiDungHL, photo: anhTuZip[cleanStr(ten)] || null
                        });
                    }
                }
            });
        } else {
            // MẪU TTHV
            document.getElementById('inputTenCty').value = valA3.replace(/Công ty[:\s]*/gi, "").trim();
            document.getElementById('inputMST').value = sheet.getCell('A4').text.replace(/Mã số thuế[:\s]*/gi, "").trim();
            const noiDungHL = sheet.getCell('A8').text.trim(); // Lấy từ dòng 8

            const anhExcel = {};
            sheet.getImages().forEach(img => { if (img.range.tl.nativeCol === 8) anhExcel[img.range.tl.nativeRow] = workbook.getImage(img.imageId).buffer; });

            let nhomHienTai = "";
            sheet.eachRow((row, i) => {
                if (i >= 10) {
                    const colA = row.getCell(1).text.trim();
                    const colB = row.getCell(2).text.trim();
                    if (colA && !colB) nhomHienTai = colA;
                    else if (colB) {
                        data.push({
                            stt: data.length+1, hoten: colB, ngaysinh: row.getCell(4).text, gioitinh: row.getCell(5).text,
                            cccd: row.getCell(3).text, manv: row.getCell(7).text, quoctich: row.getCell(6).text,
                            donvi: nhomHienTai, noidung: noiDungHL, photo: anhExcel[i-1] || anhTuZip[cleanStr(colB)] || null
                        });
                    }
                }
            });
        }

        globalDataHocVien = data;
        const tbody = document.querySelector("#previewTable tbody");
        tbody.innerHTML = "";
        data.forEach(s => {
            const url = s.photo ? URL.createObjectURL(new Blob([s.photo])) : "";
            tbody.innerHTML += `<tr><td>${s.stt}</td><td>${url ? `<img src="${url}" class="preview-img">`: '❌'}</td><td>${s.hoten}</td><td>${s.ngaysinh}</td><td>${s.gioitinh}</td><td>${s.cccd}</td><td>${s.manv}</td><td>${s.quoctich}</td><td>${s.donvi}</td><td>${s.noidung}</td></tr>`;
        });
        document.getElementById('btnSync').style.display = 'block';
    }

    window.xuatDuLieuLenHethong = async function() {
        const mst = document.getElementById('inputMST').value.trim();
        const ten = document.getElementById('inputTenCty').value.trim();
        if (!mst || !ten) return alert("Nhập đủ MST và Tên!");
        
        for (let s of globalDataHocVien) {
            let driveUrl = "";
            if (s.photo) {
                const base64 = btoa(new Uint8Array(s.photo).reduce((d, b) => d + String.fromCharCode(b), ''));
                const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ type: "upload_student_image", mst: mst, tenCty: ten, cccd: s.cccd, base64: base64 }) });
                const driveData = await res.json();
                driveUrl = driveData.fileUrl || "";
            }
            // Đồng bộ full dữ liệu lên Firebase
            await set(ref(db, `HocVien/${mst}/${s.cccd}`), { 
                HoTen: s.hoten, NgaySinh: s.ngaysinh, GioiTinh: s.gioitinh, CCCD: s.cccd, 
                MaNV: s.manv, QuocTich: s.quoctich, DonVi: s.donvi, NoiDungHL: s.noidung, 
                PhotoUrl: driveUrl, NgayCapNhat: new Date().toISOString() 
            });
        }
        alert("✅ Đã đồng bộ toàn bộ dữ liệu học viên lên hệ thống!");
    }
</script>
</body>
</html>
