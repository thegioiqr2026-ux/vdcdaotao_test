<style>
    .kanban-wrapper { display: flex; flex-direction: column; height: 100%; background: #f8fafc; padding: 1.5rem; font-family: sans-serif; }
    .kanban-header { display: flex; justify-content: space-between; align-items: center; background: white; padding: 1.25rem; border-radius: 20px; margin-bottom: 2rem; border: 2px solid #e2e8f0; }
    .kanban-board { display: grid; grid-template-columns: repeat(5, 1fr); gap: 1.25rem; flex: 1; min-width: 1200px; }
    .kanban-col { background: rgba(241, 245, 249, 0.8); border-radius: 24px; padding: 1rem; border: 2px solid #e2e8f0; display: flex; flex-direction: column; }
    .col-title { font-size: 10px; font-weight: 900; text-transform: uppercase; color: #64748b; margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center; }
    .drop-zone { flex: 1; overflow-y: auto; min-height: 400px; padding-bottom: 50px; }
    
    .kanban-card { background: white; border-radius: 16px; padding: 15px; border: 2px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); cursor: grab; margin-bottom: 12px; transition: 0.2s; }
    .kanban-card:hover { transform: translateY(-3px); border-color: #3b82f6; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
    .card-mst { font-size: 11px; font-weight: 900; color: #2563eb; font-family: monospace; }
    .card-name { font-size: 12px; font-weight: 800; color: #1e293b; margin: 4px 0; text-transform: uppercase; }
    .card-desc { font-size: 10px; color: #64748b; line-height: 1.4; }

    /* HIỆU ỨNG XOAY TRÒN (SPINNER) */
    .spinner {
        display: none; width: 18px; height: 18px; border: 3px solid rgba(255,255,255,.3);
        border-radius: 50%; border-top-color: #fff; animation: spin 1s ease-in-out infinite;
        margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading .spinner { display: inline-block; }
    .loading span { opacity: 0.7; }
</style>

<div class="kanban-wrapper">
    <div class="kanban-header shadow-sm">
        <div class="flex items-center gap-4 text-slate-800">
            <div style="background:#2563eb; width:45px; height:45px; border-radius:12px; display:flex; align-items:center; justify-content:center; color:white;"><i class="fa-solid fa-chalkboard-user"></i></div>
            <div>
                <h2 style="margin:0; font-size:18px; font-weight:900; text-transform:uppercase;">Tiến độ huấn luyện</h2>
                <p style="margin:0; font-size:10px; color:#94a3b8; font-weight:bold; letter-spacing:1px;">VDC CRM OPERATIONAL</p>
            </div>
        </div>
        <button onclick="document.getElementById('modalCreate').style.display='flex'" style="background:#0f172a; color:white; border:none; padding:12px 25px; border-radius:12px; font-weight:900; cursor:pointer; font-size:11px;">+ LÊN ĐƠN MỚI</button>
    </div>

    <div class="kanban-board">
        <div class="kanban-col"><div class="col-title"><span>1. Báo Giá</span> <span id="count_B1_BaoGia" class="bg-white px-2 rounded shadow-sm">0</span></div><div id="col_B1_BaoGia" ondrop="dropCard(event, 'B1_BaoGia')" ondragover="allowDrop(event)" class="drop-zone"></div></div>
        <div class="kanban-col" style="background:#eff6ff;"><div class="col-title" style="color:#1d4ed8;"><span>2. Chuẩn Bị</span> <span id="count_B4_ChuanBi" class="bg-white px-2 rounded shadow-sm">0</span></div><div id="col_B4_ChuanBi" ondrop="dropCard(event, 'B4_ChuanBi')" ondragover="allowDrop(event)" class="drop-zone"></div></div>
        <div class="kanban-col" style="background:#fffbeb;"><div class="col-title" style="color:#b45309;"><span>3. Đang Dạy</span> <span id="count_B5_DangDay" class="bg-white px-2 rounded shadow-sm">0</span></div><div id="col_B5_DangDay" ondrop="dropCard(event, 'B5_DangDay')" ondragover="allowDrop(event)" class="drop-zone"></div></div>
        <div class="kanban-col" style="background:#f5f3ff;"><div class="col-title" style="color:#4338ca;"><span>4. In Phôi</span> <span id="count_B6_ChoInPhoi" class="bg-white px-2 rounded shadow-sm">0</span></div><div id="col_B6_ChoInPhoi" ondrop="dropCard(event, 'B6_ChoInPhoi')" ondragover="allowDrop(event)" class="drop-zone"></div></div>
        <div class="kanban-col" style="background:#f0fdf4;"><div class="col-title" style="color:#047857;"><span>5. Hoàn Tất</span> <span id="count_B7_HoanTat" class="bg-white px-2 rounded shadow-sm">0</span></div><div id="col_B7_HoanTat" ondrop="dropCard(event, 'B7_HoanTat')" ondragover="allowDrop(event)" class="drop-zone"></div></div>
    </div>
</div>

<div id="modalCreate" style="position:fixed; inset:0; background:rgba(15,23,42,0.7); backdrop-filter:blur(4px); display:none; align-items:center; justify-content:center; z-index:9999;">
    <div style="background:white; width:400px; border-radius:24px; padding:30px; box-shadow:0 25px 50px -12px rgba(0,0,0,0.25);">
        <h3 style="margin-top:0; text-transform:uppercase; font-size:14px; font-weight:900; color:#1e293b; border-bottom:2px solid #f1f5f9; padding-bottom:15px; margin-bottom:20px;">Lên đơn huấn luyện mới</h3>
        <p id="modalStatus" style="font-size:10px; font-weight:bold; color:#64748b; margin-top:-10px; margin-bottom:15px; text-transform:uppercase;">Nhập MST để tự động điền...</p>
        
        <form id="formCreateClass">
            <input type="text" id="newMST" placeholder="Mã số thuế..." required style="width:100%; padding:14px; margin-bottom:12px; border-radius:12px; border:2px solid #e2e8f0; font-weight:900; color:#2563eb; outline:none; box-sizing:border-box;">
            <input type="text" id="newTenCTY" placeholder="Tên công ty..." required style="width:100%; padding:14px; margin-bottom:12px; border-radius:12px; border:2px solid #e2e8f0; box-sizing:border-box; font-weight:700;">
            <input type="text" id="newDiaChi" placeholder="Địa chỉ trụ sở..." style="width:100%; padding:14px; margin-bottom:12px; border-radius:12px; border:2px solid #e2e8f0; box-sizing:border-box; font-size:11px; color:#64748b;">
            <textarea id="newNoiDung" placeholder="Nội dung huấn luyện..." rows="3" style="width:100%; padding:14px; margin-bottom:20px; border-radius:12px; border:2px solid #e2e8f0; box-sizing:border-box; font-weight:600; outline:none; font-family:sans-serif;"></textarea>
            
            <div style="display:flex; gap:12px;">
                <button type="submit" id="btnSubmitCreate" class="flex items-center justify-center" style="flex:2; background:#2563eb; color:white; border:none; padding:15px; border-radius:12px; font-weight:900; cursor:pointer; text-transform:uppercase;">
                    <div class="spinner"></div><span>KHỞI TẠO ĐƠN</span>
                </button>
                <button type="button" onclick="document.getElementById('modalCreate').style.display='none'" style="flex:1; background:#f1f5f9; border:none; padding:15px; border-radius:12px; font-weight:900; cursor:pointer; color:#64748b;">HỦY</button>
            </div>
        </form>
    </div>
</div>

<script type="module">
    import { db, ref, set, push, onValue, update, get, child } from '../js/firebase-config.js';

    // 1. TỰ ĐỘNG ĐIỀN THÔNG TIN KHI NHẬP MST
    const inputMST = document.getElementById('newMST');
    inputMST.addEventListener('input', async (e) => {
        const mst = e.target.value.trim();
        const statusLabel = document.getElementById('modalStatus');
        if (mst.length >= 10) {
            statusLabel.innerText = "⏳ Đang tìm kiếm đơn vị...";
            try {
                const snapshot = await get(child(ref(db), `HocVien/${mst}`));
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    const firstStudent = Object.values(data)[0];
                    document.getElementById('newTenCTY').value = firstStudent.tenCty || firstStudent.donvi || "";
                    document.getElementById('newDiaChi').value = firstStudent.diaChi || firstStudent.diaChiTruSo || "Địa chỉ theo hồ sơ VDC";
                    statusLabel.innerText = "✅ Đã tìm thấy dữ liệu cũ.";
                } else { statusLabel.innerText = "ℹ️ MST MỚI (CHƯA CÓ DỮ LIỆU)."; }
            } catch (err) { statusLabel.innerText = "❌ LỖI KẾT NỐI DATABASE."; }
        }
    });

    // 2. XỬ LÝ KHỞI TẠO ĐƠN (FORM SUBMIT)
    const form = document.getElementById('formCreateClass');
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnSubmitCreate');
        
        // Bật trạng thái Loading
        btn.classList.add('loading');
        btn.disabled = true;

        const mst = document.getElementById('newMST').value.trim();
        const ten = document.getElementById('newTenCTY').value.trim();
        const dia = document.getElementById('newDiaChi').value.trim();
        const noi = document.getElementById('newNoiDung').value.trim();

        try {
            const newOrderRef = push(ref(db, 'Classes'));
            await set(newOrderRef, {
                mst, tenCty: ten, diaChi: dia, noiDung: noi,
                status: 'B1_BaoGia',
                createdAt: new Date().toISOString()
            });
            
            document.getElementById('modalCreate').style.display = 'none';
            form.reset();
            document.getElementById('modalStatus').innerText = "Nhập MST để tự động điền...";
        } catch (err) { alert("Lỗi: " + err.message); }
        
        btn.classList.remove('loading');
        btn.disabled = false;
    });

    // 3. LẮNG NGHE DỮ LIỆU KANBAN
    onValue(ref(db, 'Classes'), (snapshot) => {
        document.querySelectorAll('.drop-zone').forEach(z => z.innerHTML = "");
        const counts = { B1_BaoGia:0, B4_ChuanBi:0, B5_DangDay:0, B6_ChoInPhoi:0, B7_HoanTat:0 };
        if (snapshot.exists()) {
            const data = snapshot.val();
            Object.keys(data).forEach(id => {
                const item = data[id];
                const st = item.status || 'B1_BaoGia';
                const col = document.getElementById(`col_${st}`);
                if (col) {
                    counts[st]++;
                    col.innerHTML += `
                        <div class="kanban-card" draggable="true" ondragstart="window.dragCard(event, '${id}')" id="${id}">
                            <div class="card-mst">${item.mst}</div>
                            <div class="card-name">${item.tenCty}</div>
                            <div class="card-desc">${item.noiDung || ''}</div>
                        </div>
                    `;
                }
            });
        }
        Object.keys(counts).forEach(k => { if(document.getElementById(`count_${k}`)) document.getElementById(`count_${k}`).innerText = counts[k]; });
    });

    // 4. KÉO THẢ
    window.dragCard = (ev, id) => ev.dataTransfer.setData("text", id);
    window.allowDrop = (ev) => ev.preventDefault();
    window.dropCard = async (ev, newStatus) => {
        ev.preventDefault();
        const id = ev.dataTransfer.getData("text");
        if (id) await update(ref(db, `Classes/${id}`), { status: newStatus });
    };
</script>
