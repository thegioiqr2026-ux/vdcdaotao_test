<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>VDC Thông tin học viên v5.6</title>
    <script src="../js/exceljs.min.js"></script>
    <script src="../js/jszip.min.js"></script>
    <script src="../js/firebase-config.js" type="module"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: #fff; overflow: hidden; }
        .sidebar-in { width: 310px; background: #f8fafc; border-right: 1px solid #e2e8f0; padding: 15px; overflow-y: auto; flex-shrink: 0; }
        .main-content { flex: 1; padding: 10px; display: flex; flex-direction: column; overflow: hidden; }
        .form-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 4px; font-weight: bold; font-size: 12px; color: #64748b; }
        input, select { width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #cbd5e1; font-size: 13px; box-sizing: border-box; }
        .table-container { flex: 1; border: 1px solid #e2e8f0; border-radius: 4px; overflow: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 1600px; }
        th { background: #f1f5f9; color: #475569; position: sticky; top: 0; padding: 10px; font-size: 11px; text-transform: uppercase; border-bottom: 2px solid #e2e8f0; z-index: 10; }
        td { padding: 6px; border-bottom: 1px solid #f1f5f9; text-align: center; font-size: 12px; }
        .btn { width: 100%; padding: 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; color: white; margin-top: 8px; transition: 0.2s; }
        .btn-preview { background: #3b82f6; }
        .btn-sync { background: #10b981; display: none; }
        
        /* Progress & Live Preview */
        .progress-bar { height: 8px; background: #e2e8f0; border-radius: 4px; margin-top: 10px; display: none; overflow: hidden; }
        #progressFill { height: 100%; width: 0%; background: #10b981; transition: width 0.2s; }
        #live-preview-container { margin-top: 15px; text-align: center; display: none; border: 1px dashed #cbd5e1; padding: 10px; border-radius: 8px; background: #fff; }
        #live-img { width: 80px; height: 110px; object-fit: cover; border-radius: 4px; border: 2px solid #10b981; margin-bottom: 5px; }
        
        .preview-img { width: 40px; height: 55px; object-fit: cover; border-radius: 2px; }
        #status { margin-top: 8px; font-size: 11px; text-align: center; color: #3b82f6; font-weight: bold; }
    </style>
</head>
<body>

<div class="sidebar-in">
    <div class="form-group">
        <label>LOẠI FILE & ẢNH:</label>
        <select id="templateType">
            <option value="zip_img" selected>Mẫu Long Phương (Ảnh trong ZIP)</option>
            <option value="excel_img">Mẫu TTHV (Ảnh trong Excel)</option>
        </select>
    </div>
    
    <div class="form-group"><label>FILE EXCEL:</label><input type="file" id="fileExcel" accept=".xlsx"></div>
    <div class="form-group" id="zipGroup"><label>FILE ZIP HÌNH ẢNH:</label><input type="file" id="fileZip" accept=".zip"></div>

    <div style="background: #f1f5f9; padding: 10px; border-radius: 4px; border: 1px solid #e2e8f0;">
        <input type="text" id="inputMST" placeholder="Mã số thuế..." style="margin-bottom: 8px;">
        <input type="text" id="inputTenCty" placeholder="Tên công ty...">
    </div>

    <button class="btn btn-preview" id="btnPreview">🔍 TRÍCH XUẤT DỮ LIỆU</button>
    
    <div id="syncSection" style="display:none;">
        <button id="btnSync" class="btn btn-sync">🚀 ĐỒNG BỘ VDC CLOUD</button>
        <div class="progress-bar" id="pBar"><div id="progressFill"></div></div>
        
        <div id="live-preview-container">
            <p style="font-size: 10px; color: #64748b; margin-bottom: 5px;">ẢNH VỪA TẢI LÊN DRIVE:</p>
            <img id="live-img" src="" alt="Live Preview">
            <p id="live-name" style="font-size: 11px; font-weight: bold; color: #10b981;"></p>
        </div>

        <div id="status"></div>
    </div>
    <p style="font-size: 10px; color: #94a3b8; text-align: center; margin-top: 15px;">v5.6 - Live Preview Mode</p>
</div>

<div class="main-content">
    <div class="table-container">
        <table id="previewTable">
            <thead>
                <tr>
                    <th>STT</th><th>Ảnh</th><th>Họ và Tên</th><th>Ngày sinh</th><th>Giới tính</th>
                    <th>CCCD</th><th>Chức vụ</th><th>Mã NV</th><th>Quốc tịch</th><th>NHÓM</th><th>NỘI DUNG HL</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script type="module">
    import { db, ref, set } from '../js/firebase-config.js';
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxRNpGczbDYLXpJliEOHhcubc41qm-x7DW47MsVz1W6Ne3BJTMWYs98ciWE5SkY2MWY/exec";

    let globalDataHocVien = [];

    function superClean(s) { return s ? s.toString().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/đ/g, "d").replace(/[^a-z0-9]/g, "").trim() : ""; }

    document.getElementById('templateType').addEventListener('change', (e) => {
        document.getElementById('zipGroup').style.display = (e.target.value === 'zip_img') ? 'block' : 'none';
    });

    document.getElementById('btnPreview').addEventListener('click', async () => {
        const type = document.getElementById('templateType').value;
        const fileEx = document.getElementById('fileExcel').files[0];
        const fileZi = document.getElementById('fileZip').files[0];
        const status = document.getElementById('status');
        if (!fileEx) return alert("Chọn file Excel!");

        const workbook = new ExcelJS.Workbook();
        await workbook.xlsx.load(await fileEx.arrayBuffer());
        const sheet = workbook.worksheets[0];
        let data = [];
        let anhTuZip = {};

        if (type === 'zip_img' && fileZi) {
            const zipData = await JSZip.loadAsync(fileZi);
            for (let f in zipData.files) {
                if (f.match(/\.(jpg|jpeg|png)$/i)) {
                    anhTuZip[superClean(f.split('/').pop().split('.').shift())] = await zipData.files[f].async("arraybuffer");
                }
            }
        }

        if (type === 'zip_img') {
            const valA8 = sheet.getCell('A8').text || "";
            document.getElementById('inputTenCty').value = valA8.split('\n')[0].trim();
            sheet.eachRow((row, i) => {
                if (i >= 10) {
                    const stt = row.getCell(1).text.trim();
                    const hoten = row.getCell(3).text.trim();
                    if (stt && !isNaN(stt)) {
                        data.push({
                            stt: data.length+1, hoten: hoten, manv: row.getCell(2).text.trim(),
                            congviec: row.getCell(4).text.trim(), cccd: row.getCell(5).text.trim(),
                            ngaysinh: row.getCell(6).text, gioitinh: row.getCell(7).text,
                            quoctich: row.getCell(8).text, donvi: row.getCell(9).text.trim(),
                            noidung: row.getCell(10).text.trim(), photo: anhTuZip[superClean(hoten)] || null
                        });
                    }
                }
            });
        } else {
            const valA3 = sheet.getCell('A3').text || "";
            document.getElementById('inputTenCty').value = valA3.replace(/Công ty[:\s]*/gi, "").trim();
            document.getElementById('inputMST').value = sheet.getCell('A4').text.replace(/Mã số thuế[:\s]*/gi, "").trim();
            const anhExcel = {};
            sheet.getImages().forEach(img => { if (img.range.tl.nativeCol === 8) anhExcel[img.range.tl.nativeRow] = workbook.getImage(img.imageId).buffer; });
            sheet.eachRow((row, i) => {
                if (i >= 10) {
                    const colA = row.getCell(1).text.trim();
                    const colB = row.getCell(2).text.trim();
                    if (colB && !isNaN(colA)) {
                        data.push({
                            stt: data.length+1, hoten: colB, gioitinh: row.getCell(3).text,
                            ngaysinh: row.getCell(4).text, quoctich: row.getCell(5).text,
                            congviec: row.getCell(6).text, cccd: row.getCell(7).text,
                            manv: row.getCell(7).text, donvi: sheet.getCell('A2').text,
                            noidung: row.getCell(8).text, photo: anhExcel[i-1] || null
                        });
                    }
                }
            });
        }

        globalDataHocVien = data;
        const tbody = document.querySelector("#previewTable tbody");
        tbody.innerHTML = data.map(s => {
            const url = s.photo ? URL.createObjectURL(new Blob([s.photo])) : "";
            return `<tr><td>${s.stt}</td><td>${url ? `<img src="${url}" class="preview-img">` : '❌'}</td><td>${s.hoten}</td><td>${s.ngaysinh}</td><td>${s.gioitinh}</td><td>${s.cccd}</td><td>${s.congviec}</td><td>${s.manv}</td><td>${s.quoctich}</td><td>${s.donvi}</td><td>${s.noidung}</td></tr>`;
        }).join('');
        document.getElementById('syncSection').style.display = 'block';
        document.getElementById('btnSync').style.display = 'block';
    });

    document.getElementById('btnSync').addEventListener('click', async () => {
        const mst = document.getElementById('inputMST').value.trim();
        const ten = document.getElementById('inputTenCty').value.trim();
        if(!mst) return alert("Vui lòng nhập Mã số thuế!");

        const fill = document.getElementById('progressFill');
        const liveContainer = document.getElementById('live-preview-container');
        const liveImg = document.getElementById('live-img');
        const liveName = document.getElementById('live-name');
        
        document.getElementById('pBar').style.display = 'block';
        document.getElementById('btnSync').style.display = 'none';

        for (let i = 0; i < globalDataHocVien.length; i++) {
            const s = globalDataHocVien[i];
            const pct = Math.round(((i + 1) / globalDataHocVien.length) * 100);
            fill.style.width = pct + "%";
            document.getElementById('status').innerText = `Đang tải: ${s.hoten} (${pct}%)`;

            let driveUrl = "";
            if (s.photo) {
                const base64 = btoa(new Uint8Array(s.photo).reduce((d, b) => d + String.fromCharCode(b), ''));
                try {
                    const res = await fetch(GAS_URL, { 
                        method: 'POST', 
                        body: JSON.stringify({ type: "upload", mst: mst, tenCty: ten, cccd: s.cccd, base64: base64 }) 
                    });
                    const resJson = await res.json();
                    if (resJson.status === "success") {
                        driveUrl = resJson.fileUrl;
                        // Hiển thị ảnh vừa tải lên xong
                        liveContainer.style.display = 'block';
                        liveImg.src = driveUrl;
                        liveName.innerText = s.hoten;
                    }
                } catch(e) { console.error("Lỗi upload ảnh cho: " + s.hoten); }
            }
            
            await set(ref(db, `HocVien/${mst}/${s.cccd}`), { 
                hoten: s.hoten, ngaysinh: s.ngaysinh, gioitinh: s.gioitinh, cccd: s.cccd, 
                congviec: s.congviec, manv: s.manv, quoctich: s.quoctich, donvi: s.donvi, 
                noidung: s.noidung, PhotoUrl: driveUrl, NgayCapNhat: new Date().toISOString() 
            });
        }
        document.getElementById('status').innerText = "✅ ĐỒNG BỘ HOÀN TẤT v5.6";
        setTimeout(() => { liveContainer.style.display = 'none'; }, 5000); // Ẩn preview sau 5s hoàn tất
    });
</script>
</body>
</html>
