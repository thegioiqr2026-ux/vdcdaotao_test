<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hệ Thống Quản Lý In Ấn v1.7</title>
    <script src="./js/exceljs.min.js"></script>
    <style>
        body { font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; padding: 40px; }
        .main-panel { background: white; max-width: 600px; margin: 0 auto; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .header { text-align: center; border-bottom: 2px solid #007bff; padding-bottom: 15px; margin-bottom: 25px; }
        .control-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #333; }
        select, input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .btn-run { width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-run:hover { background: #218838; }
        #status { margin-top: 20px; text-align: center; font-weight: bold; color: #007bff; }
        .footer { font-size: 11px; color: #888; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>

<div class="main-panel">
    <div class="header">
        <h2>TRUNG TÂM ĐIỀU KHIỂN IN</h2>
    </div>

    <div class="control-group">
        <label>1. Chọn mẫu in (trong /doctemplate/):</label>
        <select id="templatePath">
            <option value="./doctemplate/printThe44.html">Mẫu Thẻ ATVSLĐ (Nghị định 44)</option>
            <option value="./doctemplate/printThe62.html">Mẫu Thẻ An Toàn Điện (Nghị định 62)</option>
        </select>
    </div>

    <div class="control-group">
        <label>2. Nạp dữ liệu Excel:</label>
        <input type="file" id="excelInput" accept=".xlsx">
    </div>

    <button class="btn-run" onclick="startPrinting()">🚀 XỬ LÝ & MỞ TRANG IN</button>
    
    <div id="status"></div>
    <div class="footer">Phiên bản 1.7 | Hệ thống điều hướng biểu mẫu</div>
</div>

<script>
    function startPrinting() {
        const file = document.getElementById('excelInput').files[0];
        const template = document.getElementById('templatePath').value;
        const status = document.getElementById('status');

        if (!file) return alert("Vui lòng chọn file Excel trước!");

        status.innerText = "⏳ Đang chuyển dữ liệu...";

        // Đọc file dưới dạng ArrayBuffer để truyền qua sessionStorage
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                // Lưu dữ liệu vào bộ nhớ đệm trình duyệt để trang biểu mẫu lấy ra dùng
                const base64Data = btoa(new Uint8Array(e.target.result).reduce((data, byte) => data + String.fromCharCode(byte), ''));
                sessionStorage.setItem('excel_data_buffer', base64Data);
                
                // Mở trang biểu mẫu trong tab mới hoặc chính trang này
                window.location.href = template;
            } catch (err) {
                alert("Lỗi lưu trữ dữ liệu: " + err.message);
            }
        };
        reader.readAsArrayBuffer(file);
    }
</script>
</body>
</html>
