<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>VDC - Load Excel v7.2</title>
    <script src="../js/exceljs.min.js"></script>
    <script src="../js/firebase-config.js" type="module"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .table-container { height: calc(100vh - 250px); overflow: auto; }
        table { min-width: 1200px; border-collapse: separate; border-spacing: 0; }
        th { position: sticky; top: 0; background: #f8fafc; z-index: 10; border-bottom: 2px solid #e2e8f0; }
        .progress-fill { transition: width 0.4s ease-in-out; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800">

    <div class="flex h-screen overflow-hidden">
        <div class="w-80 bg-white border-right border-slate-200 p-6 flex flex-col shadow-xl z-20">
            <div class="mb-8 text-center">
                <h1 class="text-xl font-black tracking-tighter text-blue-600">VDC CRM <span class="text-[10px] bg-blue-100 px-2 py-0.5 rounded text-blue-500">v7.2</span></h1>
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1">Đồng bộ Cloud Học Viên</p>
            </div>

            <div class="space-y-4 flex-1">
                <div>
                    <label class="block text-[10px] font-black text-slate-400 mb-1 uppercase">1. Chọn File Excel học viên</label>
                    <input type="file" id="fileExcel" accept=".xlsx" class="w-full text-xs border border-slate-200 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none">
                </div>

                <div class="bg-slate-50 p-4 rounded-xl border border-slate-100">
                    <label class="block text-[10px] font-black text-slate-400 mb-1 uppercase">Mã số thuế & Công ty</label>
                    <input type="text" id="inputMST" placeholder="Tự động lấy từ Excel..." class="w-full text-xs font-bold bg-transparent border-none focus:ring-0 mb-2">
                    <input type="text" id="inputTenCty" placeholder="Tên công ty..." class="w-full text-[11px] text-slate-500 bg-transparent border-none focus:ring-0 italic">
                </div>

                <button id="btnPreview" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-3 rounded-xl shadow-lg transition-all active:scale-95 text-xs">
                    <i class="fa-solid fa-magnifying-glass mr-2"></i> TRÍCH XUẤT DỮ LIỆU
                </button>

                <div id="syncSection" class="hidden space-y-3 pt-4 border-t border-slate-100">
                    <button id="btnSync" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-black py-4 rounded-xl shadow-xl transition-all active:scale-95 text-xs">
                        <i class="fa-solid fa-cloud-arrow-up mr-2"></i> ĐẨY LÊN VDC CLOUD
                    </button>
                    
                    <div class="progress-container bg-slate-100 rounded-full h-2 overflow-hidden hidden" id="pContainer">
                        <div id="progressFill" class="progress-fill h-full bg-emerald-500 w-0"></div>
                    </div>
                    
                    <div id="status" class="text-[10px] font-bold text-center text-blue-500 uppercase"></div>
                    
                    <div id="liveBox" class="hidden mt-4 p-3 bg-white border border-emerald-100 rounded-xl shadow-sm text-center animate-pulse">
                        <img id="liveImg" class="w-24 h-32 object-cover mx-auto rounded-lg border-2 border-white shadow-md">
                        <p id="liveName" class="text-[10px] font-black text-emerald-600 mt-2 uppercase"></p>
                    </div>
                </div>
            </div>

            <div class="pt-4 text-[9px] text-slate-300 text-center font-bold">VDC SAFETY TRAINING SYSTEM</div>
        </div>

        <div class="flex-1 p-6 flex flex-col">
            <div class="table-container bg-white rounded-2xl shadow-sm border border-slate-200">
                <table id="hocVienTable" class="w-full text-left text-[12px]">
                    <thead>
                        <tr class="text-[10px] font-black uppercase text-slate-400">
                            <th class="p-4">STT</th>
                            <th class="p-4">Ảnh</th>
                            <th class="p-4">Họ và Tên</th>
                            <th class="p-4">CCCD</th>
                            <th class="p-4">Nhóm/Đơn vị</th>
                            <th class="p-4">Trạng thái Cloud</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-50">
                        <tr><td colspan="6" class="p-10 text-center text-slate-300 italic">Vui lòng nạp file Excel để bắt đầu...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { db, ref, set } from '../js/firebase-config.js';

        // LINK WEB APP v6.9 IM LẶNG CỦA BẠN
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxKY8mO5USmDe3DyiYPNLpt0x64l8YN_Z_4TgoEdUs1F0Nw_pnjZd1XU6V2lL_Wl_lS/exec";

        let hocVienList = [];

        // 1. Trích xuất Excel
        async function handlePreview() {
            const file = document.getElementById('fileExcel').files[0];
            if (!file) return alert("Chưa chọn file!");

            document.getElementById('btnPreview').innerText = "⏳ ĐANG QUÉT EXCEL...";
            const workbook = new ExcelJS.Workbook();
            await workbook.xlsx.load(await file.arrayBuffer());
            const sheet = workbook.getWorksheet(1);

            // Lấy ảnh từ Excel
            const imageMap = {};
            sheet.getImages().forEach(img => {
                const row = img.range.tl.nativeRow + 1;
                imageMap[row] = workbook.getImage(img.imageId).buffer;
            });

            // Lấy MST và Tên Cty (Giả định vị trí chuẩn của VDC)
            document.getElementById('inputTenCty').value = sheet.getCell('A3').text.replace(/Công ty[:\s]*/gi, "");
            document.getElementById('inputMST').value = sheet.getCell('A4').text.match(/[0-9]+/)?.[0] || "";

            hocVienList = [];
            sheet.eachRow((row, rowNum) => {
                const stt = row.getCell(1).text;
                if (rowNum >= 10 && stt && !isNaN(stt)) {
                    hocVienList.push({
                        stt: stt,
                        hoten: row.getCell(2).text,
                        ngaysinh: row.getCell(4).text,
                        cccd: row.getCell(7).text,
                        gioitinh: row.getCell(3).text,
                        donvi: row.getCell(5).text || "VDC",
                        photo: imageMap[rowNum] || null,
                        rowIdx: rowNum
                    });
                }
            });

            renderTable();
            document.getElementById('syncSection').classList.remove('hidden');
            document.getElementById('btnPreview').innerText = "🔍 TRÍCH XUẤT LẠI";
        }

        function renderTable() {
            const tbody = document.querySelector("#hocVienTable tbody");
            tbody.innerHTML = hocVienList.map(h => `
                <tr class="hover:bg-slate-50">
                    <td class="p-4 font-bold text-slate-400">${h.stt}</td>
                    <td class="p-4">${h.photo ? `<img src="${URL.createObjectURL(new Blob([h.photo]))}" class="w-10 h-14 object-cover rounded shadow-sm border border-white">` : '❌'}</td>
                    <td class="p-4 font-bold text-slate-700">${h.hoten}</td>
                    <td class="p-4 text-slate-500 font-mono">${h.cccd}</td>
                    <td class="p-4 text-slate-500 text-[11px]">${h.donvi}</td>
                    <td class="p-4" id="status-${h.cccd}"><span class="text-slate-300 italic">Chờ đồng bộ...</span></td>
                </tr>
            `).join('');
        }

        // 2. Đồng bộ Drive & Firebase
        async function handleSync() {
            const mst = document.getElementById('inputMST').value;
            const tenCty = document.getElementById('inputTenCty').value;
            if (!mst) return alert("Thiếu Mã số thuế!");

            document.getElementById('btnSync').disabled = true;
            document.getElementById('pContainer').classList.remove('hidden');
            document.getElementById('liveBox').classList.remove('hidden');

            for (let i = 0; i < hocVienList.length; i++) {
                const hv = hocVienList[i];
                const progress = Math.round(((i + 1) / hocVienList.length) * 100);
                document.getElementById('progressFill').style.width = progress + "%";
                document.getElementById('status').innerText = `ĐANG XỬ LÝ: ${hv.hoten}`;

                let finalDriveUrl = "";

                // TẢI ẢNH LÊN DRIVE (TỐC ĐỘ CAO)
                if (hv.photo) {
                    const base64 = btoa(new Uint8Array(hv.photo).reduce((d, b) => d + String.fromCharCode(b), ''));
                    try {
                        const res = await fetch(GAS_URL, {
                            method: 'POST',
                            body: JSON.stringify({ type: "upload", mst: mst, tenCty: tenCty, cccd: hv.cccd, base64: base64 })
                        });
                        const resJson = await res.json();
                        if (resJson.status === "success") {
                            finalDriveUrl = resJson.fileUrl;
                            document.getElementById(`status-${hv.cccd}`).innerHTML = `<span class="text-emerald-500 font-bold">✅ DRIVE OK</span>`;
                            document.getElementById('liveImg').src = finalDriveUrl;
                            document.getElementById('liveName').innerText = hv.hoten;
                        }
                    } catch (e) {
                        console.error("Lỗi Drive: ", e);
                        document.getElementById(`status-${hv.cccd}`).innerHTML = `<span class="text-red-400 italic">Lỗi Drive</span>`;
                    }
                }

                // GHI DỮ LIỆU LÊN FIREBASE
                await set(ref(db, `HocVien/${mst}/${hv.cccd}`), {
                    ...hv,
                    PhotoUrl: finalDriveUrl,
                    photo: null, // Không lưu buffer ảnh gốc vào Firebase để nhẹ database
                    NgayCapNhat: new Date().toISOString()
                });
            }

            document.getElementById('status').innerText = "🚀 TẤT CẢ ĐÃ LÊN CLOUD!";
            document.getElementById('liveBox').classList.remove('animate-pulse');
        }

        document.getElementById('btnPreview').onclick = handlePreview;
        document.getElementById('btnSync').onclick = handleSync;
    </script>
</body>
</html>
