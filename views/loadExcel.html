<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>VDC CRM - Fix Preview v8.1</title>
    <script src="../js/exceljs.min.js"></script>
    <script src="../js/jszip.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #f1f5f9; color: #000; font-weight: 600; font-size: 14px; }
        .sidebar-vdc { width: 360px; height: 100vh; background: #fff; border-right: 3px solid #cbd5e1; flex-shrink: 0; }
        label { color: #1e293b !important; font-weight: 900 !important; font-size: 12px !important; text-transform: uppercase; margin-bottom: 4px; display: block; }
        input[type="text"], select { border: 2px solid #94a3b8 !important; color: #000 !important; font-weight: 800 !important; padding: 10px !important; border-radius: 8px !important; width: 100%; margin-bottom: 10px; }
        .main-vdc { flex: 1; padding: 30px; display: flex; flex-direction: column; overflow: hidden; }
        .table-wrapper { background: #fff; border: 2px solid #cbd5e1; border-radius: 20px; overflow: hidden; flex: 1; display: flex; flex-direction: column; }
        .scroll-area { flex: 1; overflow: auto; padding: 0 20px 20px 20px; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 5px; min-width: 1200px; }
        th { position: sticky; top: 0; background: #0f172a; color: #fff; padding: 15px; font-size: 12px; font-weight: 900; text-transform: uppercase; z-index: 20; text-align: left; }
        .row-hv td { padding: 12px 15px; background: #fff; border-top: 1px solid #e2e8f0; border-bottom: 1px solid #e2e8f0; color: #000; font-weight: 700; }
        .row-hv td:first-child { border-left: 1px solid #e2e8f0; border-radius: 10px 0 0 10px; text-align: center; color: #94a3b8; }
        .row-hv td:last-child { border-right: 1px solid #e2e8f0; border-radius: 0 10px 10px 0; text-align: right; }
        .img-hv { width: 45px; height: 60px; border-radius: 4px; object-fit: cover; border: 2px solid #0f172a; }
        .btn-vdc { width: 100%; padding: 15px; border-radius: 12px; font-weight: 900; text-transform: uppercase; cursor: pointer; transition: all 0.2s; border: none; }
        .btn-preview { background: #1e293b; color: #fff; }
        .btn-sync { background: #059669; color: #fff; display: none; margin-top: 15px; }
    </style>
</head>
<body class="flex">

    <aside class="sidebar-vdc p-6 flex flex-col shadow-2xl">
        <div class="mb-8">
            <h1 class="text-3xl font-black text-slate-900 leading-none tracking-tighter italic">VDC<span class="text-blue-600">.CRM</span></h1>
            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mt-2">v8.1 - High Stability Fix</p>
        </div>

        <div class="space-y-4 flex-1 overflow-y-auto pr-2">
            <div>
                <label>PHÂN LOẠI MẪU & ẢNH:</label>
                <select id="templateType">
                    <option value="excel_img" selected>1. Mẫu TTHV (Ảnh trong Excel)</option>
                    <option value="zip_img">2. Mẫu ZIP (Ảnh rời bên ngoài)</option>
                </select>
            </div>

            <div class="bg-slate-50 p-4 rounded-xl border-2 border-slate-200">
                <label>FILE EXCEL (.xlsx):</label>
                <input type="file" id="fileExcel" accept=".xlsx" class="text-xs">
                
                <div id="zipGroup" class="hidden mt-4 border-t pt-4 border-slate-200">
                    <label>FILE ZIP HÌNH ẢNH:</label>
                    <input type="file" id="fileZip" accept=".zip" class="text-xs">
                </div>
            </div>

            <div class="bg-blue-50 p-4 rounded-xl border-2 border-blue-100">
                <label>MÃ SỐ THUẾ:</label>
                <input type="text" id="inputMST" placeholder="Tự động trích xuất...">
                <label>TÊN CÔNG TY:</label>
                <input type="text" id="inputTenCty" placeholder="Tự động trích xuất...">
            </div>

            <button id="btnPreview" class="btn-vdc btn-preview">🔍 TRÍCH XUẤT DỮ LIỆU</button>
            
            <div id="syncSection" class="hidden">
                <button id="btnSync" class="btn-vdc btn-sync">🚀 ĐỒNG BỘ VDC CLOUD</button>
                <div id="status" class="mt-4 text-center font-black text-blue-700 text-xs uppercase animate-pulse"></div>
            </div>
        </div>
    </aside>

    <main class="main-vdc">
        <div class="flex justify-between items-end mb-6 px-4">
            <div>
                <h2 class="text-2xl font-black text-slate-900 uppercase">Học viên trích xuất</h2>
                <p class="text-xs text-slate-500 font-bold italic">Khắc phục lỗi ô gộp & tốc độ đẩy Drive v8.1</p>
            </div>
            <div class="bg-slate-900 text-white px-6 py-2 rounded-xl font-black text-lg">
                <span id="count">00</span> <span class="text-[10px] uppercase">Người</span>
            </div>
        </div>

        <div class="table-wrapper">
            <div class="scroll-area">
                <table id="vdcTable">
                    <thead>
                        <tr>
                            <th class="w-16">STT</th>
                            <th class="w-24">Ảnh</th>
                            <th>Họ và Tên</th>
                            <th>Ngày sinh</th>
                            <th>CCCD</th>
                            <th>Chức vụ</th>
                            <th>Đơn vị/Nhóm</th>
                            <th class="text-right">Trạng thái</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </main>

<script type="module">
    import { db, ref, set } from '../js/firebase-config.js';
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxKY8mO5USmDe3DyiYPNLpt0x64l8YN_Z_4TgoEdUs1F0Nw_pnjZd1XU6V2lL_Wl_lS/exec";

    let globalHocVien = [];

    // HÀM LẤY DỮ LIỆU Ô GỘP CHUẨN (v6.2 FIX)
    const getSafeVal = (sheet, addr) => {
        try {
            const cell = sheet.getCell(addr);
            const target = cell.isMerged && cell.master ? cell.master : cell;
            let val = target.value;
            if (val === null || val === undefined) return "";
            if (typeof val === 'object') {
                if (val.richText) return val.richText.map(t => t.text).join('').trim();
                if (val.result !== undefined) return val.result.toString().trim();
                return "";
            }
            return val.toString().trim();
        } catch(e) { return ""; }
    };

    const superClean = (s) => s ? s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/đ/g, "d").replace(/[^a-z0-9]/g, "") : "";

    document.getElementById('templateType').onchange = (e) => {
        document.getElementById('zipGroup').classList.toggle('hidden', e.target.value !== 'zip_img');
    };

    document.getElementById('btnPreview').onclick = async () => {
        const type = document.getElementById('templateType').value;
        const fileEx = document.getElementById('fileExcel').files[0];
        const fileZi = document.getElementById('fileZip').files[0];
        if (!fileEx) return alert("Chọn file Excel!");
        
        try {
            document.getElementById('btnPreview').innerText = "⏳ ĐANG PHÂN TÍCH...";
            const workbook = new ExcelJS.Workbook();
            await workbook.xlsx.load(await fileEx.arrayBuffer());
            const sheet = workbook.worksheets[0];

            // 1. Trích xuất MST & Tên Công ty (Chuẩn TTHV)
            const rawTen = getSafeVal(sheet, 'A3').replace(/Công ty[:\s]*/gi, "").trim();
            document.getElementById('inputTenCty').value = rawTen || "Công ty chưa xác định";
            const rawMST = getSafeVal(sheet, 'A4').replace(/Mã số thuế[:\s]*/gi, "").trim();
            document.getElementById('inputMST').value = rawMST || "0000000000";

            // 2. Bóc ảnh Excel
            const anhExcel = {};
            sheet.getImages().forEach(img => {
                const row = img.range.tl.nativeRow;
                // Ảnh thường nằm từ cột H (index 7) trở đi trong mẫu TTHV
                if (img.range.tl.nativeCol >= 7) anhExcel[row] = workbook.getImage(img.imageId).buffer;
            });

            // 3. Bóc ZIP (Nếu có)
            let anhZip = {};
            if (type === 'zip_img' && fileZi) {
                const zipData = await JSZip.loadAsync(fileZi);
                for (let f in zipData.files) if (f.match(/\.(jpg|jpeg|png)$/i)) {
                    const n = f.split('/').pop().split('.').shift();
                    anhZip[superClean(n)] = await zipData.files[f].async("arraybuffer");
                }
            }

            // 4. Duyệt danh sách từ dòng 10
            globalHocVien = [];
            sheet.eachRow((row, i) => {
                const sttVal = row.getCell(1).text.trim();
                if (i >= 10 && sttVal && !isNaN(sttVal)) {
                    const hoten = (type === 'excel_img') ? getSafeVal(sheet, `B${i}`) : getSafeVal(sheet, `C${i}`);
                    if (!hoten) return; // Bỏ qua dòng trống

                    globalHocVien.push({
                        stt: globalHocVien.length + 1,
                        hoten: hoten,
                        ngaysinh: (type === 'excel_img') ? row.getCell(4).text : row.getCell(6).text,
                        cccd: (type === 'excel_img') ? getSafeVal(sheet, `G${i}`) : getSafeVal(sheet, `E${i}`),
                        congviec: (type === 'excel_img') ? getSafeVal(sheet, `F${i}`) : getSafeVal(sheet, `D${i}`),
                        donvi: (type === 'excel_img') ? (getSafeVal(sheet, 'A2') || "VDC") : getSafeVal(sheet, `I${i}`),
                        photo: anhExcel[i-1] || anhZip[superClean(hoten)] || null
                    });
                }
            });

            // Hiển thị kết quả
            const tbody = document.querySelector("#vdcTable tbody");
            tbody.innerHTML = globalHocVien.map(h => `
                <tr class="row-hv">
                    <td>${h.stt}</td>
                    <td>${h.photo ? `<img src="${URL.createObjectURL(new Blob([h.photo]))}" class="img-hv">` : '<span class="text-red-500 font-black">❌</span>'}</td>
                    <td>${h.hoten}</td>
                    <td>${h.ngaysinh}</td>
                    <td class="text-blue-700 font-black">${h.cccd}</td>
                    <td class="text-[11px] font-bold italic text-slate-500">${h.congviec}</td>
                    <td class="text-[10px] font-black uppercase text-slate-400">${h.donvi}</td>
                    <td id="stt-${h.cccd}" class="font-black italic text-slate-300">CHỜ ĐỒNG BỘ</td>
                </tr>
            `).join('');

            document.getElementById('syncSection').classList.remove('hidden');
            document.getElementById('btnSync').style.display = 'block';
            document.getElementById('count').innerText = globalHocVien.length;
            document.getElementById('btnPreview').innerText = "🔍 QUÉT DỮ LIỆU LẠI";

        } catch (e) {
            console.error(e);
            alert("Lỗi trích xuất: " + e.message);
            document.getElementById('btnPreview').innerText = "🔍 TRÍCH XUẤT DỮ LIỆU";
        }
    };

    document.getElementById('btnSync').onclick = async () => {
        const mst = document.getElementById('inputMST').value;
        const ten = document.getElementById('inputTenCty').value;
        document.getElementById('btnSync').disabled = true;

        for (let i = 0; i < globalHocVien.length; i++) {
            const h = globalHocVien[i];
            document.getElementById('status').innerText = `SYNC: ${h.hoten}`;
            let url = "";
            if (h.photo) {
                const b64 = btoa(new Uint8Array(h.photo).reduce((d,b)=>d+String.fromCharCode(b),''));
                try {
                    const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ type:"upload", mst, tenCty:ten, cccd:h.cccd, base64:b64 }) });
                    const json = await res.json();
                    if(json.status === "success") {
                        url = json.fileUrl;
                        document.getElementById(`stt-${h.cccd}`).innerHTML = `<span class="text-emerald-600 font-black uppercase">✅ DRIVE OK</span>`;
                    }
                } catch(e) {}
            }
            const { photo, ...cleanData } = h;
            await set(ref(db, `HocVien/${mst}/${h.cccd}`), { ...cleanData, PhotoUrl: url, NgayCapNhat: new Date().toLocaleString() });
        }
        document.getElementById('status').innerText = "✅ HOÀN TẤT ĐỒNG BỘ!";
    };
</script>
</body>
</html>
