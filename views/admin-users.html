<!-- Phiên bản: 1.28 -->
<div class="h-full flex flex-col p-2">
    <!-- Header -->
    <div class="mb-5 flex justify-between items-center bg-white p-5 rounded-xl shadow-sm border border-gray-100">
        <div>
            <h2 class="text-xl font-bold text-gray-800 uppercase tracking-tight">Quản lý Giảng viên</h2>
            <p class="text-xs text-gray-500 mt-1">Hệ thống mạng lưới giảng viên trên toàn quốc của VDC</p>
        </div>
        <button onclick="document.getElementById('modalTrainer').classList.remove('hidden')" class="bg-blue-600 text-white px-5 py-2.5 rounded-lg text-sm font-bold shadow-md hover:bg-blue-700 transition-all flex items-center">
            <i class="fa-solid fa-user-plus mr-2"></i> Thêm Giảng viên
        </button>
    </div>

    <!-- Bảng dữ liệu -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden flex-1 flex flex-col">
        <div class="overflow-y-auto flex-1 custom-scrollbar">
            <table class="w-full text-left border-collapse">
                <thead class="bg-slate-50 sticky top-0 z-10 border-b border-gray-200">
                    <tr class="text-slate-500 text-[11px] uppercase font-bold tracking-wider">
                        <th class="p-4">Họ và Tên</th>
                        <th class="p-4">Khu vực cư trú</th>
                        <th class="p-4">Ngành giảng</th>
                        <th class="p-4 text-center">Phí/Ngày</th>
                        <th class="p-4 text-center">Đánh giá</th>
                    </tr>
                </thead>
                <tbody id="trainerTableBody" class="text-sm divide-y divide-gray-100">
                    <!-- Dữ liệu JS đổ vào đây -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Modal Thêm Giảng Viên -->
    <div id="modalTrainer" class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-lg overflow-hidden">
            <div class="p-5 border-b bg-slate-50 flex justify-between items-center">
                <h3 class="text-md font-bold text-slate-800 uppercase tracking-tight">Hồ sơ Giảng viên mới</h3>
                <button type="button" onclick="document.getElementById('modalTrainer').classList.add('hidden')" class="text-gray-400 hover:text-red-500 transition-colors">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>
            <form id="formTrainer" class="p-6 space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[11px] font-bold text-gray-500 uppercase mb-1">Họ và Tên *</label>
                        <input type="text" id="gvTen" required class="w-full px-3 py-2 border border-gray-200 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 text-sm bg-gray-50 focus:bg-white transition-all">
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-gray-500 uppercase mb-1">Số điện thoại *</label>
                        <input type="text" id="gvSdt" required class="w-full px-3 py-2 border border-gray-200 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 text-sm bg-gray-50 focus:bg-white transition-all">
                    </div>
                </div>
                <div>
                    <label class="block text-[11px] font-bold text-gray-500 uppercase mb-1">Địa chỉ cư trú (Để tính khoảng cách) *</label>
                    <input type="text" id="gvDiaChi" placeholder="Số nhà, Tên đường, Tỉnh/Thành..." required class="w-full px-3 py-2 border border-gray-200 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 text-sm bg-gray-50 focus:bg-white transition-all">
                </div>
                <div>
                    <label class="block text-[11px] font-bold text-gray-500 uppercase mb-1">Ngành giảng dạy</label>
                    <input type="text" id="gvNganh" placeholder="VD: Nhóm 3, Nhóm 4, PCCC..." class="w-full px-3 py-2 border border-gray-200 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 text-sm bg-gray-50 focus:bg-white transition-all">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[11px] font-bold text-gray-500 uppercase mb-1">Phí/Ngày (VNĐ)</label>
                        <input type="number" id="gvPhiNgay" value="2000000" class="w-full px-3 py-2 border border-gray-200 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 text-sm bg-gray-50 focus:bg-white transition-all">
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-gray-500 uppercase mb-1">Điểm ưu tiên (1-10)</label>
                        <input type="number" id="gvDiem" value="5" max="10" min="1" class="w-full px-3 py-2 border border-gray-200 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 text-sm bg-gray-50 focus:bg-white transition-all">
                    </div>
                </div>
                <div class="flex justify-end gap-3 mt-6 pt-4 border-t border-gray-100">
                    <button type="button" onclick="document.getElementById('modalTrainer').classList.add('hidden')" class="px-5 py-2 text-sm text-gray-500 font-bold hover:bg-gray-100 rounded-lg transition-colors">Hủy</button>
                    <button type="submit" class="px-5 py-2 text-sm bg-blue-600 text-white font-bold rounded-lg shadow-md hover:bg-blue-700 transition-colors">Lưu hồ sơ</button>
                </div>
            </form>
        </div>
    </div>
</div>
