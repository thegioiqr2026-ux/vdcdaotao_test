<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>VDC Cloud v7.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-md border border-slate-100 relative">
        <div class="absolute top-4 right-4 bg-slate-100 text-slate-400 text-[9px] px-2 py-0.5 rounded font-bold">
            v7.1 STABLE
        </div>

        <div class="text-center mb-6">
            <div class="w-16 h-16 bg-blue-600 text-white rounded-2xl flex items-center justify-center mx-auto mb-3 shadow-lg">
                <i class="fa-solid fa-bolt-lightning text-2xl"></i>
            </div>
            <h2 class="text-xl font-black text-slate-800 uppercase tracking-tighter">VDC High-Speed Sync</h2>
        </div>

        <div class="space-y-4">
            <div class="relative border-2 border-dashed border-slate-200 rounded-2xl p-6 text-center hover:bg-blue-50 transition-all cursor-pointer">
                <input type="file" id="testFile" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-50">
                <div id="local-preview" class="hidden animate-fade-in">
                    <img id="local-img" src="" class="w-full h-40 object-cover rounded-xl border-2 border-white shadow-sm">
                </div>
                <div id="placeholder" class="py-4">
                    <i class="fa-regular fa-image text-slate-300 text-4xl mb-2"></i>
                    <p class="text-xs font-bold text-slate-400">CHỌN ẢNH ĐỂ TEST TỐC ĐỘ</p>
                </div>
            </div>

            <button id="btnStart" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-xl shadow-lg shadow-blue-100 flex items-center justify-center gap-2 active:scale-95 transition-all">
                <i class="fa-solid fa-cloud-arrow-up"></i> TẢI LÊN NGAY
            </button>

            <div id="status" class="hidden p-3 rounded-xl text-[10px] font-black text-center uppercase tracking-widest border"></div>

            <div id="result" class="hidden bg-slate-900 p-4 rounded-2xl shadow-inner animate-slide-up">
                <p class="text-[9px] text-emerald-400 font-bold mb-2 uppercase">● Đã đồng bộ Cloud & Firebase</p>
                <a id="driveLink" href="#" target="_blank" class="text-blue-400 underline text-[10px] break-all block mb-3"></a>
                <img id="driveImg" src="" class="w-full h-40 object-cover rounded-lg border border-slate-700">
            </div>
        </div>
    </div>

    <script type="module">
        import { db, ref, set } from '../js/firebase-config.js';

        // Dán link WebApp v6.9 của bạn vào đây
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxKY8mO5USmDe3DyiYPNLpt0x64l8YN_Z_4TgoEdUs1F0Nw_pnjZd1XU6V2lL_Wl_lS/exec";

        const fileInput = document.getElementById('testFile');
        const status = document.getElementById('status');

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if(file) {
                document.getElementById('placeholder').classList.add('hidden');
                document.getElementById('local-preview').classList.remove('hidden');
                document.getElementById('local-img').src = URL.createObjectURL(file);
                document.getElementById('result').classList.add('hidden');
            }
        };

        document.getElementById('btnStart').onclick = async () => {
            const file = fileInput.files[0];
            if(!file) return alert("Chưa chọn ảnh!");

            status.className = "p-3 rounded-xl text-[10px] font-black text-center block bg-slate-100 text-slate-500 border-slate-200";
            status.innerHTML = "⚡ ĐANG ĐẨY DỮ LIỆU...";

            const reader = new FileReader();
            reader.onload = async (e) => {
                const base64 = e.target.result.split(',')[1];
                try {
                    const start = Date.now();
                    const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({
                        type: "upload", mst: "SPEED_TEST", cccd: "V71", base64: base64
                    })});
                    const resJson = await res.json();
                    
                    if(resJson.status === "success") {
                        // Lưu Firebase
                        await set(ref(db, 'TestUpload/LastImage'), { 
                            url: resJson.fileUrl, 
                            time: new Date().toISOString() 
                        });

                        const end = Date.now();
                        status.className = "p-3 rounded-xl text-[10px] font-black text-center block bg-emerald-50 text-emerald-600 border-emerald-100";
                        status.innerHTML = `✅ XONG TRONG ${(end-start)/1000}s - KHÔNG LỖI`;
                        
                        document.getElementById('result').classList.remove('hidden');
                        document.getElementById('driveLink').href = resJson.fileUrl;
                        document.getElementById('driveLink').innerText = resJson.fileUrl;
                        document.getElementById('driveImg').src = resJson.fileUrl;
                    }
                } catch (err) {
                    status.innerHTML = "❌ LỖI KẾT NỐI";
                }
            };
            reader.readAsDataURL(file);
        };
    </script>
</body>
</html>
