<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống VDC CRM v5.0</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* CSS điều khiển Sidebar thu gọn */
        #layout-sidebar { width: 64px; transition: width 0.3s; overflow: hidden; }
        #layout-sidebar.expanded, #layout-sidebar:hover { width: 260px; }
        .menu-text { display: none; white-space: nowrap; margin-left: 12px; }
        #layout-sidebar.expanded .menu-text, #layout-sidebar:hover .menu-text { display: inline; }
    </style>
</head>
<body class="bg-gray-100 flex h-screen overflow-hidden">

    <aside id="layout-sidebar" class="bg-slate-900 text-white h-full flex-shrink-0 flex flex-col transition-all duration-300">
        <div class="p-4 flex items-center border-b border-slate-800 h-16">
            <div class="w-8 h-8 bg-blue-600 rounded flex items-center justify-center text-white font-bold flex-shrink-0">V</div>
            <span class="menu-text font-bold text-lg text-white">VDC CRM</span>
        </div>
        <div id="sidebar-menu-container" class="flex-1 overflow-y-auto overflow-x-hidden">
            </div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0 bg-white">
        <div id="layout-content" class="h-full w-full overflow-hidden">
            <div class="flex items-center justify-center h-full text-blue-500">
                <i class="fa-solid fa-circle-notch fa-spin text-3xl"></i>
            </div>
        </div>
    </main>

    <script src="js/main.js"></script>
</body>
</html>
